<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: white; font-family: system-ui, sans-serif; margin: 0; overflow: hidden; }
        
        /* נגן מוקטן ל-30% מהמסך כדי לפנות מקום לכפתורים */
        .player-fixed { 
            height: 30vh; width: 100%; background: #000; 
            position: fixed; top: 0; left: 0; z-index: 50;
            border-bottom: 1px solid #1A1A1A; 
        }
        
        /* אזור פקדים שמתחיל מיד אחרי הנגן */
        .scrollable-content { 
            margin-top: 30vh; height: 70vh; 
            overflow-y: auto; padding: 15px; padding-bottom: 160px; 
        }

        .progress-text { font-size: 4rem; font-weight: 900; color: #7C3AED; }
        .tool-btn { background: #0A0A0B; border: 1px solid #1A1A1A; border-radius: 16px; }
        .purple-gradient { background: linear-gradient(135deg, #7C3AED 0%, #4C1D95 100%); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- אזור 1: נגן וידאו/תמונה (30% גובה) -->
    <div class="player-fixed flex flex-col items-center justify-center relative">
        <div id="placeholder" class="flex flex-col items-center opacity-20">
            <i data-lucide="aperture" class="w-10 h-10 mb-1"></i>
            <span class="text-[8px] tracking-[0.3em]">STUDIO ENGINE</span>
        </div>
        
        <img id="mainImage" class="hidden w-full h-full object-contain">
        <video id="mainVideo" class="hidden w-full h-full object-contain" controls playsinline loop></video>

        <!-- מנדול אחוזים ענק ומרכזי -->
        <div id="loader" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-[60]">
            <div id="percentText" class="progress-text">0%</div>
        </div>
    </div>

    <!-- אזור פקדים נגלל (מתחיל גבוה יותר) -->
    <div class="scrollable-content space-y-4" dir="rtl">
        
        <!-- פס תחבורה -->
        <div class="flex justify-around items-center py-2 border-b border-zinc-900">
            <button onclick="seek(-2)"><i data-lucide="rewind" class="w-5 h-5"></i></button>
            <button onclick="togglePlay()"><i data-lucide="play" class="w-8 h-8 fill-current text-[#7C3AED]"></i></button>
            <button onclick="seek(2)"><i data-lucide="fast-forward" class="w-5 h-5"></i></button>
        </div>

        <!-- אזור יצירה -->
        <div class="tool-btn p-4">
            <textarea id="promptInp" placeholder="תאר מה ליצור (באנגלית)..." 
                class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm h-20 mb-3 outline-none focus:border-[#7C3AED] text-right"></textarea>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="generateAI('image')" class="purple-gradient py-3 rounded-xl font-bold text-sm active:scale-95 transition-transform">צור תמונה</button>
                <button onclick="generateAI('video')" class="bg-zinc-800 py-3 rounded-xl font-bold text-sm border border-zinc-700">צור וידאו</button>
            </div>
            
            <div class="flex gap-2 mt-2">
                <button onclick="alert('Extend +10s')" class="flex-1 bg-zinc-900 py-2 rounded-lg text-[9px] border border-zinc-800">הארכה +10ש'</button>
                <button onclick="randomPrompt()" class="flex-1 bg-zinc-900 py-2 rounded-lg text-[9px] border border-zinc-800">הפתע אותי 🎲</button>
            </div>
        </div>

        <!-- העלאה בשורה אחת (תמונות | סרטון | מצלמה) -->
        <div class="grid grid-cols-3 gap-2">
            <label class="tool-btn p-3 flex flex-col items-center gap-1 cursor-pointer active:scale-90 transition-transform">
                <i data-lucide="image" class="text-blue-400 w-5 h-5"></i>
                <span class="text-[9px] font-bold">תמונות</span>
                <input type="file" class="hidden" accept="image/*" onchange="handleUpload(event, 'img')">
            </label>
            <label class="tool-btn p-3 flex flex-col items-center gap-1 cursor-pointer active:scale-90 transition-transform">
                <i data-lucide="clapperboard" class="text-red-400 w-5 h-5"></i>
                <span class="text-[9px] font-bold">סרטון</span>
                <input type="file" class="hidden" accept="video/*" onchange="handleUpload(event, 'vid')">
            </label>
            <label class="tool-btn p-3 flex flex-col items-center gap-1 cursor-pointer active:scale-90 transition-transform">
                <i data-lucide="camera" class="text-green-400 w-5 h-5"></i>
                <span class="text-[9px] font-bold">מצלמה</span>
                <input type="file" class="hidden" accept="image/*,video/*" capture="environment" onchange="handleUpload(event, 'cam')">
            </label>
        </div>

        <!-- פונקציות נוספות -->
        <div class="space-y-2">
            <button onclick="alert('Filters Active')" class="w-full tool-btn p-3 flex justify-between items-center">
                <span class="text-xs font-bold flex items-center gap-2"><i data-lucide="palette" class="w-4 h-4 text-purple-500"></i> פילטרים</span>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-20"></i>
            </button>
            <button onclick="alert('Recording 5s...')" class="w-full tool-btn p-3 flex justify-between items-center">
                <span class="text-xs font-bold flex items-center gap-2"><i data-lucide="mic" class="w-4 h-4 text-purple-500"></i> שיבוט קולי</span>
                <i data-lucide="plus" class="w-4 h-4 opacity-20"></i>
            </button>
            <button onclick="alert('Select Audio')" class="w-full tool-btn p-3 flex justify-between items-center">
                <span class="text-xs font-bold flex items-center gap-2"><i data-lucide="languages" class="w-4 h-4 text-purple-400"></i> סנכרון שפתיים</span>
                <i data-lucide="plus" class="w-4 h-4 opacity-20"></i>
            </button>
        </div>

        <!-- ספרייה קטנה -->
        <div id="libraryGrid" class="grid grid-cols-4 gap-1 pt-2"></div>
    </div>

    <!-- שמירה קבוע למטה -->
    <footer class="fixed bottom-0 w-full bg-black/90 border-t border-zinc-900 p-4 flex gap-2 z-[100]">
        <button onclick="downloadOutput()" class="flex-1 bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
            <i data-lucide="download" class="w-5 h-5"></i> שמור
        </button>
        <button onclick="share()" class="bg-zinc-900 px-4 rounded-2xl">
            <i data-lucide="share-2" class="w-5 h-5 text-zinc-400"></i>
        </button>
    </footer>

    <script>
        lucide.createIcons();

        async function generateAI(mode) {
            const prompt = document.getElementById('promptInp').value.trim();
            if (!prompt) return alert("הזן תיאור");

            const loader = document.getElementById('loader');
            const percent = document.getElementById('percentText');
            const mainImg = document.getElementById('mainImage');

            loader.classList.remove('hidden');
            let p = 0;
            const progressInterval = setInterval(() => {
                p += Math.floor(Math.random() * 15) + 2;
                if (p >= 100) {
                    p = 100;
                    clearInterval(progressInterval);
                    percent.innerText = "100%";
                    
                    const seed = Math.floor(Math.random() * 999999);
                    const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=1920&seed=${seed}&model=flux&nologo=true`;
                    
                    const tempImg = new Image();
                    tempImg.src = url;
                    tempImg.onload = () => {
                        mainImg.src = url;
                        mainImg.classList.remove('hidden');
                        document.getElementById('mainVideo').classList.add('hidden');
                        document.getElementById('placeholder').classList.add('hidden');
                        loader.classList.add('hidden');
                        addToLibrary(url);
                    };
                } else {
                    percent.innerText = p + "%";
                }
            }, 250);
        }

        function handleUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const mainImg = document.getElementById('mainImage');
            const mainVid = document.getElementById('mainVideo');
            document.getElementById('placeholder').classList.add('hidden');
            
            if (file.type.startsWith('image/')) {
                mainImg.src = url; mainImg.classList.remove('hidden'); mainVid.classList.add('hidden');
            } else {
                mainVid.src = url; mainVid.classList.remove('hidden'); mainImg.classList.add('hidden');
            }
        }

        function addToLibrary(url) {
            const grid = document.getElementById('libraryGrid');
            const item = document.createElement('div');
            item.className = "aspect-square bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800";
            item.innerHTML = `<img src="${url}" class="w-full h-full object-cover">`;
            grid.prepend(item);
        }

        function downloadOutput() {
            const img = document.getElementById('mainImage');
            if (img.src) window.open(img.src, '_blank');
        }

        function randomPrompt() {
            const prompts = ["Cyberpunk city neon", "Gold lion 4k", "Astronaut on Mars", "Space car driving"];
            document.getElementById('promptInp').value = prompts[Math.floor(Math.random() * prompts.length)];
        }

        function togglePlay() {
            const vid = document.getElementById('mainVideo');
            if (!vid.classList.contains('hidden')) vid.paused ? vid.play() : vid.pause();
        }

        function seek(val) {
            const vid = document.getElementById('mainVideo');
            if (!vid.classList.contains('hidden')) vid.currentTime += val;
        }

        function share() {
            if (navigator.share) navigator.share({ title: 'Studio AI', url: window.location.href });
        }
    </script>
</body>
</html>
