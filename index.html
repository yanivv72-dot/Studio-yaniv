<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0A0A0B; color: white; font-family: sans-serif; overflow: hidden; }
        .purple-gradient { background: linear-gradient(135deg, #7C3AED 0%, #4C1D95 100%); }
        .scroll-area { height: calc(100vh - 40vh - 70px); overflow-y: auto; padding-bottom: 120px; }
        .loader-ring { border: 4px solid #1A1A1D; border-top: 4px solid #7C3AED; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .active-press:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- אזור 1: נגן מרכזי -->
    <div id="player" class="w-full h-[40vh] bg-black border-b border-zinc-800 flex items-center justify-center relative shadow-2xl">
        <div id="placeholder" class="text-zinc-600 flex flex-col items-center">
            <i data-lucide="video" class="w-12 h-12 mb-2 opacity-20"></i>
            <span class="text-xs font-bold uppercase tracking-widest">4K Preview Engine</span>
        </div>
        <img id="outputImg" class="hidden w-full h-full object-contain">
        <video id="outputVid" class="hidden w-full h-full object-contain" controls playsinline></video>
        
        <!-- לואדר מתוקן -->
        <div id="loader" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-50">
            <div class="loader-ring"></div>
            <p class="mt-4 font-bold text-[#7C3AED]" id="percentLabel">מעבד נתונים... 0%</p>
        </div>
    </section>

    <!-- אזור 2: פס תחבורה -->
    <div class="flex justify-around items-center py-3 bg-[#1A1A1D] border-b border-zinc-800">
        <button onclick="seek(-2)" class="active-press"><i data-lucide="rewind" class="w-6 h-6"></i></button>
        <button onclick="toggleMedia()" class="active-press"><i data-lucide="play" class="w-8 h-8 fill-current text-[#7C3AED]"></i></button>
        <button onclick="seek(2)" class="active-press"><i data-lucide="fast-forward" class="w-6 h-6"></i></button>
    </div>

    <!-- אזור נגלל -->
    <main class="flex-1 scroll-area p-4 space-y-6">
        
        <!-- אזור 3: יצירת AI -->
        <div class="bg-[#1A1A1D] p-4 rounded-3xl border border-zinc-800 shadow-xl">
            <h3 class="text-sm font-bold mb-3 flex items-center gap-2 text-purple-400">
                <i data-lucide="sparkles" class="w-4 h-4"></i> פרומפט ליצירה
            </h3>
            <textarea id="prompt" placeholder="תאר מה ליצור (למשל: Iron Man in desert)..." 
                class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-sm h-24 outline-none focus:border-[#7C3AED] text-right"></textarea>
            
            <button onclick="generateAI()" class="w-full mt-4 purple-gradient py-4 rounded-2xl font-bold active-press shadow-lg shadow-purple-900/20">
                צור יצירת AI
            </button>
        </div>

        <!-- אזור 4: העלאה בשורה (תמונות, סרטון, מצלמה) -->
        <div class="grid grid-cols-3 gap-2">
            <label class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex flex-col items-center gap-2 active-press cursor-pointer">
                <i data-lucide="image" class="text-blue-400 w-5 h-5"></i>
                <span class="text-[10px] font-bold">תמונות</span>
                <input type="file" class="hidden" accept="image/*" onchange="loadFile(event, 'img')">
            </label>
            <label class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex flex-col items-center gap-2 active-press cursor-pointer">
                <i data-lucide="film" class="text-red-400 w-5 h-5"></i>
                <span class="text-[10px] font-bold">סרטון</span>
                <input type="file" class="hidden" accept="video/*" onchange="loadFile(event, 'vid')">
            </label>
            <label class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex flex-col items-center gap-2 active-press cursor-pointer">
                <i data-lucide="camera" class="text-green-400 w-5 h-5"></i>
                <span class="text-[10px] font-bold">מצלמה</span>
                <input type="file" class="hidden" accept="image/*,video/*" capture="environment" onchange="loadFile(event, 'any')">
            </label>
        </div>

        <!-- עורך ופילטרים -->
        <div class="space-y-3">
            <button onclick="alert('עורך אפקטים: אש, גשם, מים - בקרוב בגרסת הפרו')" class="w-full bg-zinc-900/50 p-4 rounded-2xl flex justify-between items-center border border-zinc-800 active-press">
                <span class="text-sm font-medium">✨ עורך אפקטים</span>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-30"></i>
            </button>
            <button onclick="alert('פילטרים: שחור לבן, מסך ירוק - בקרוב')" class="w-full bg-zinc-900/50 p-4 rounded-2xl flex justify-between items-center border border-zinc-800 active-press">
                <span class="text-sm font-medium">🎨 פילטרים</span>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-30"></i>
            </button>
        </div>
    </main>

    <!-- ייצוא קבוע -->
    <footer class="fixed bottom-0 w-full bg-black/80 backdrop-blur-lg border-t border-zinc-800 p-4 flex gap-3 z-[100]">
        <button onclick="saveMedia()" class="flex-1 bg-green-600 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active-press">
            <i data-lucide="download" class="w-5 h-5"></i> שמור לגלריה
        </button>
        <button onclick="window.location.reload()" class="bg-zinc-800 p-4 rounded-2xl active-press">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        </button>
    </footer>

    <script>
        lucide.createIcons();

        // פונקציית העלאת קבצים מתוקנת
        function loadFile(event, mode) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const img = document.getElementById('outputImg');
            const vid = document.getElementById('outputVid');
            const placeholder = document.getElementById('placeholder');

            placeholder.classList.add('hidden');
            
            if (file.type.startsWith('image/')) {
                img.src = url;
                img.classList.remove('hidden');
                vid.classList.add('hidden');
            } else {
                vid.src = url;
                vid.classList.remove('hidden');
                img.classList.add('hidden');
            }
        }

        // יצירת AI - מנוע מתוקן שלא נתקע
        async function generateAI() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) return alert("אנא הזן תיאור ליצירה");

            const loader = document.getElementById('loader');
            const label = document.getElementById('percentLabel');
            const img = document.getElementById('outputImg');
            const placeholder = document.getElementById('placeholder');

            loader.classList.remove('hidden');
            placeholder.classList.add('hidden');
            
            // סימולציית אחוזים חלקה
            let p = 0;
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 15);
                if (p >= 99) { p = 99; clearInterval(interval); }
                label.innerText = `מרנדר בענן... ${p}%`;
            }, 300);

            try {
                const seed = Math.floor(Math.random() * 1000000);
                // שימוש בלינק ישיר למניעת חסימות
                const finalUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=1920&seed=${seed}&model=flux&nologo=true`;
                
                const testImg = new Image();
                testImg.src = finalUrl;
                testImg.onload = () => {
                    clearInterval(interval);
                    label.innerText = "100% - הושלם!";
                    setTimeout(() => {
                        img.src = finalUrl;
                        img.classList.remove('hidden');
                        document.getElementById('outputVid').classList.add('hidden');
                        loader.classList.add('hidden');
                    }, 500);
                };
            } catch (e) {
                alert("שגיאה ברינדור. נסה שוב.");
                loader.classList.add('hidden');
            }
        }

        function saveMedia() {
            const img = document.getElementById('outputImg');
            if (img.src && !img.classList.contains('hidden')) {
                window.open(img.src, '_blank');
            } else {
                alert("אין תוכן לשמירה");
            }
        }

        function toggleMedia() {
            const vid = document.getElementById('outputVid');
            if (!vid.classList.contains('hidden')) {
                vid.paused ? vid.play() : vid.pause();
            }
        }

        function seek(val) {
            const vid = document.getElementById('outputVid');
            if (!vid.classList.contains('hidden')) vid.currentTime += val;
        }
    </script>
</body>
</html>
