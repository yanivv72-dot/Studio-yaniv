<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samsung Studio AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Secular One', -apple-system, BlinkMacSystemFont, 'SamsungOne', 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #000000;
      color: #f4f4f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      overflow-x: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background-color: #0f0f11;
      border: 1px solid #27272a;
      border-radius: 36px;
      padding: 20px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-height: 96vh;
      overflow-y: auto;
      position: relative;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
    }

    .samsung-title-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-profile {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #27272a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border: 1px solid #3f3f46;
    }

    header h1 {
      font-size: 1.3rem;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .settings-btn {
      color: #a1a1aa;
      font-size: 1.4rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #18181b;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: #38bdf8;
      background: #27272a;
    }

    .api-key-container {
      display: none;
      background: #18181b;
      border: 1px solid #3b82f6;
      border-radius: 20px;
      padding: 12px 16px;
      flex-direction: column;
      gap: 8px;
    }

    .api-key-container.active {
      display: flex;
    }

    .api-key-container label {
      font-size: 0.8rem;
      color: #60a5fa;
      font-weight: 600;
    }

    .api-key-container input, .api-key-container select {
      width: 100%;
      background: #09090b;
      border: 1px solid #27272a;
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
      outline: none;
    }

    .preview-card {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #141417;
      border: 1px solid #27272a;
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .preview-header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }

    .preview-tag {
      font-size: 0.75rem;
      color: #a1a1aa;
      font-weight: 600;
      background: #27272a;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .delete-media-btn {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .delete-media-btn:hover {
      background: #ef4444;
      color: #fff;
    }

    .preview-screen {
      width: 100%;
      height: 220px;
      background-color: #000000;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      border: 1px solid #18181b;
    }

    .preview-screen.screen-editing {
      animation: screenPulseMove 1.8s infinite ease-in-out;
    }

    @keyframes screenPulseMove {
      0% { transform: scale(1) translateY(0); filter: blur(4px) brightness(0.8); }
      50% { transform: scale(0.985) translateY(-3px); filter: blur(8px) brightness(1.1); }
      100% { transform: scale(1) translateY(0); filter: blur(4px) brightness(0.8); }
    }

    .preview-screen img,
    .preview-screen video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter 0.3s, transform 0.3s;
    }

    .ai-loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 12, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 30;
      border-radius: 18px;
    }

    .ai-loading-overlay.active {
      display: flex;
    }

    .ai-spinner {
      width: 46px;
      height: 46px;
      border: 4px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spinAnim 0.8s linear infinite;
    }

    @keyframes spinAnim {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .ai-render-percent {
      font-size: 1.5rem;
      font-weight: 800;
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }

    .ai-loading-text {
      color: #ffffff;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      padding: 0 15px;
    }

    .samsung-play-btn {
      position: absolute;
      width: 56px;
      height: 56px;
      background: rgba(24, 24, 27, 0.85);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 1.4rem;
      backdrop-filter: blur(6px);
      transition: opacity 0.3s, transform 0.2s;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }

    .samsung-play-btn.visible {
      opacity: 1;
    }

    .placeholder-text {
      color: #52525b;
      font-size: 0.95rem;
    }

    .progress-container {
      width: 100%;
      padding: 6px 0;
      cursor: pointer;
      touch-action: none;
    }

    .progress-bar-thick {
      width: 100%;
      height: 8px;
      background: #27272a;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      transition: width 0.1s linear;
    }

    .player-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: opacity 0.3s, max-height 0.3s;
      overflow: hidden;
      opacity: 0;
      max-height: 0;
      pointer-events: none;
    }

    .player-controls.visible {
      opacity: 1;
      max-height: 100px;
      pointer-events: auto;
    }

    .control-buttons {
      display: flex;
      justify-content: space-around;
      align-items: center;
      direction: rtl;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #a1a1aa;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .ctrl-btn span.icon {
      font-size: 1.1rem;
    }

    .ctrl-btn:hover {
      color: #3b82f6;
    }

    .section-title {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .prompt-box {
      background: #141417;
      border: 1px solid #27272a;
      border-radius: 20px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .prompt-box textarea {
      width: 100%;
      height: 65px;
      background: transparent;
      border: none;
      color: #f4f4f5;
      resize: none;
      outline: none;
      font-size: 0.9rem;
    }

    .surprise-btn {
      align-self: flex-end;
      background: #27272a;
      color: #38bdf8;
      border: 1px solid #38bdf8;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .surprise-btn:hover {
      background: #38bdf8;
      color: #000;
    }

    .action-create-row {
      display: flex;
      gap: 8px;
      align-items: center;
      position: relative;
    }

    .btn-create-edit {
      flex: 2;
      background: #3b82f6;
      color: #ffffff;
      padding: 14px 10px;
      border-radius: 18px;
      border: none;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      transition: all 0.2s;
    }

    .btn-create-edit:active {
      transform: scale(0.98);
    }

    .btn-extend-video {
      flex: 1;
      background: #18181b;
      color: #38bdf8;
      border: 1px solid #38bdf8;
      padding: 14px 8px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-extend-video:hover {
      background: #38bdf8;
      color: #000;
    }

    .create-options-modal {
      display: none;
      position: absolute;
      top: 110%;
      left: 0;
      right: 0;
      background: #18181b;
      border: 1px solid #3b82f6;
      border-radius: 20px;
      padding: 12px;
      gap: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.8);
      z-index: 150;
    }

    .create-options-modal.active {
      display: flex;
      flex-direction: column;
    }

    .create-option-btn {
      background: #27272a;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .create-option-btn:hover {
      background: #3b82f6;
    }

    .edit-status-msg {
      display: none;
      font-size: 0.85rem;
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid #22c55e;
      padding: 10px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
    }

    .media-type-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      direction: rtl;
    }

    .media-type-btn {
      background: #141417;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 12px;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .media-type-btn input {
      display: none;
    }

    .camera-options-menu {
      display: none;
      background: #141417;
      border: 1px solid #3b82f6;
      border-radius: 16px;
      padding: 10px;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .camera-options-menu.active {
      display: grid;
    }

    .cam-opt-btn {
      background: #27272a;
      color: #60a5fa;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .filters-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #141417;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid #27272a;
    }

    .filters-grid {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 6px;
    }

    .filter-btn {
      background-color: #27272a;
      color: #e4e4e7;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn.active {
      background-color: #3b82f6;
      color: #fff;
    }

    .intensity-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .intensity-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #a1a1aa;
    }

    .intensity-slider {
      width: 100%;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-main {
      padding: 14px;
      border-radius: 18px;
      border: none;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-download-main {
      background: #27272a;
      color: #ffffff;
      border: 1px solid #3f3f46;
    }

    .btn-share-main {
      background: #27272a;
      color: #38bdf8;
      border: 1px solid #38bdf8;
    }

    .gallery-section {
      margin-top: 10px;
      border-top: 1px solid #27272a;
      padding-top: 14px;
    }

    .gallery-section h3 {
      font-size: 0.9rem;
      color: #a1a1aa;
      margin-bottom: 12px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .gallery-item {
      background-color: #141417;
      border-radius: 16px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #27272a;
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      background-color: #000;
    }

    .gallery-actions {
      display: flex;
      gap: 4px;
    }

    .btn-action {
      flex: 1;
      padding: 6px;
      font-size: 0.75rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-action-download { background-color: #3b82f6; color: #fff; }
    .btn-action-delete { background-color: #ef4444; color: #fff; }

    .filters-grid::-webkit-scrollbar { height: 4px; }
    .filters-grid::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="app-container" id="app-container">
    <header>
      <div class="samsung-title-badge">
        <div class="user-profile">⚙️</div>
        <h1>Samsung Studio AI</h1>
      </div>
      <div class="settings-btn" id="settings-btn">🔑</div>
    </header>

    <div class="api-key-container" id="api-key-container">
      <label for="ai-model-provider">ספק AI בסינכרון מלא:</label>
      <select id="ai-model-provider">
        <option value="openrouter">OpenRouter (תומך מודלים רבים)</option>
        <option value="openai">OpenAI (DALL-E 3)</option>
        <option value="gemini">Google Gemini / Imagen</option>
      </select>
      <label for="api-key">מפתח API לפעולת המערכת:</label>
      <input type="password" id="api-key" placeholder="הדבק כאן את מפתח ה-API שלך">
    </div>

    <div class="preview-card" id="preview-card">
      <div class="preview-header-actions">
        <span class="preview-tag" id="preview-tag-label">תצוגה ראשית (21:9)</span>
        <button class="delete-media-btn" id="delete-top-btn">🗑️ מחק מדיה</button>
      </div>

      <div class="preview-screen" id="preview-screen">
        <div class="ai-loading-overlay" id="ai-loading-overlay">
          <div class="ai-spinner"></div>
          <div class="ai-render-percent" id="ai-render-percent">0%</div>
          <div class="ai-loading-text" id="ai-loading-text">מעבד ומקודד ב-AI...</div>
        </div>

        <div class="samsung-play-icon samsung-play-btn" id="samsung-play-icon">▶</div>
        <span class="placeholder-text" id="placeholder-text">אין מדיה מוצגת</span>
      </div>
      
      <div class="player-controls" id="player-controls">
        <div class="progress-container" id="progress-container">
          <div class="progress-bar-thick">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="control-buttons">
          <button class="ctrl-btn" id="btn-forward"><span class="icon">►►</span>קדימה</button>
          <button class="ctrl-btn" id="btn-play"><span class="icon">▶</span>התחל</button>
          <button class="ctrl-btn" id="btn-pause"><span class="icon">❚❚</span>השהה</button>
          <button class="ctrl-btn" id="btn-stop"><span class="icon">◼</span>עצור</button>
          <button class="ctrl-btn" id="btn-rewind"><span class="icon">◄◄</span>אחורה</button>
        </div>
      </div>
    </div>

    <div class="prompt-box">
      <textarea id="ai-prompt" placeholder="תאר מה ליצור או לערוך ב-AI עבור התמונה/הסרטון..."></textarea>
      <button class="surprise-btn" id="surprise-btn">הפתע אותי 🪄</button>
    </div>

    <div class="action-create-row">
      <button class="btn-create-edit" id="btn-create-edit">✨ צור ב-AI</button>
      <button class="btn-extend-video" id="btn-extend-video">➕ 10 ש' נוספות</button>

      <div class="create-options-modal" id="create-options-modal">
        <button class="create-option-btn" id="opt-text-to-video">🎥 צור וידאו ב-AI</button>
        <button class="create-option-btn" id="opt-text-to-image">🖼️ צור תמונה ב-AI</button>
      </div>
    </div>

    <div class="edit-status-msg" id="edit-status-msg">
      התוכן שודרג ועובד בהצלחה ב-100%! ✅
    </div>

    <div class="media-type-selector">
      <label class="media-type-btn">
        🖼️ תמונה
        <input type="file" accept="image/*" id="input-image">
      </label>
      <label class="media-type-btn">
        🎥 סרטון
        <input type="file" accept="video/*" id="input-video">
      </label>
      <button class="media-type-btn" id="cam-toggle-btn" type="button">
        📷 מצלמה
      </button>
    </div>

    <div class="camera-options-menu" id="camera-options-menu">
      <label class="cam-opt-btn">
        📷 צלם תמונה
        <input type="file" accept="image/*" capture="environment" id="input-camera-photo" style="display:none;">
      </label>
      <label class="cam-opt-btn">
        🎥 צלם סרטון
        <input type="file" accept="video/*" capture="environment" id="input-camera-video" style="display:none;">
      </label>
    </div>

    <div class="filters-container">
      <div class="section-title">🎨 פילטרים ואפקטים:</div>
      <div class="filters-grid" id="filters-grid">
        <button class="filter-btn active" data-filter="none">ללא פילטר</button>
        <button class="filter-btn" data-filter="natural-reflection">🪞 שיקוף אמיתי</button>
        <button class="filter-btn" data-filter="weather-rain">🌧️ אפקט גשם</button>
        <button class="filter-btn" data-filter="weather-sun">☀️ שמש זוהרת</button>
        <button class="filter-btn" data-filter="glow">🌟 זוהר</button>
        <button class="filter-btn" data-filter="night-vision">🟢 ראיית לילה</button>
        <button class="filter-btn" data-filter="golden-hour">🌅 שעת הזהב</button>
        <button class="filter-btn" data-filter="bw-dramatic">🎬 שחור-לבן</button>
        <button class="filter-btn" data-filter="cyberpunk">⚡ סייברפאנק</button>
      </div>

      <div class="intensity-container">
        <div class="intensity-header">
          <span>עוצמת הפילטר:</span>
          <span id="intensity-value">100%</span>
        </div>
        <input type="range" id="intensity-slider" class="intensity-slider" min="1" max="100" value="100">
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-main btn-download-main" id="download-btn">⬇ הורדה</button>
      <button class="btn-main btn-share-main" id="share-btn">🔗 שיתוף</button>
    </div>

    <div class="gallery-section">
      <h3>ספרית מדיה</h3>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </div>

  <script>
    const settingsBtn = document.getElementById('settings-btn');
    const apiKeyContainer = document.getElementById('api-key-container');
    const apiKeyInput = document.getElementById('api-key');
    const providerSelect = document.getElementById('ai-model-provider');
    const previewScreen = document.getElementById('preview-screen');
    const samsungPlayIcon = document.getElementById('samsung-play-icon');
    const placeholderText = document.getElementById('placeholder-text');
    const deleteTopBtn = document.getElementById('delete-top-btn');
    const aiLoadingOverlay = document.getElementById('ai-loading-overlay');
    const aiRenderPercent = document.getElementById('ai-render-percent');
    const aiLoadingText = document.getElementById('ai-loading-text');
    
    const playerControls = document.getElementById('player-controls');
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    
    const filterButtons = document.querySelectorAll('.filter-btn');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityValue = document.getElementById('intensity-value');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    
    const btnCreateEdit = document.getElementById('btn-create-edit');
    const btnExtendVideo = document.getElementById('btn-extend-video');
    const createOptionsModal = document.getElementById('create-options-modal');
    const optTextToVideo = document.getElementById('opt-text-to-video');
    const optTextToImage = document.getElementById('opt-text-to-image');
    
    const editStatusMsg = document.getElementById('edit-status-msg');
    const galleryGrid = document.getElementById('gallery-grid');
    const surpriseBtn = document.getElementById('surprise-btn');
    const aiPrompt = document.getElementById('ai-prompt');

    const camToggleBtn = document.getElementById('cam-toggle-btn');
    const cameraOptionsMenu = document.getElementById('camera-options-menu');

    let currentMedia = null;
    let mediaType = null;
    let rawFile = null;
    let selectedFilter = 'none';
    let filterIntensity = 100;
    let isDraggingProgress = false;
    let videoDurationSeconds = 10;
    let areControlsVisible = false;

    camToggleBtn.addEventListener('click', () => cameraOptionsMenu.classList.toggle('active'));
    settingsBtn.addEventListener('click', () => apiKeyContainer.classList.toggle('active'));

    const prompts = [
      "אריה רץ בסוואנה בשעת השקיעה עם אפקטים של ניאון מתקדמים",
      "עיר עתידנית בלילה עם מכוניות מעופפות ואורות זוהרים",
      "חללית חוצה גלקסיה צבעונית בסגנון היפר-ריאליסטי מהמם",
      "נוף מושלג באלפים בשעת זריחה מוזהבת"
    ];

    surpriseBtn.addEventListener('click', () => {
      aiPrompt.value = prompts[Math.floor(Math.random() * prompts.length)];
    });

    function hideScreenControls() {
      areControlsVisible = false;
      playerControls.classList.remove('visible');
      samsungPlayIcon.classList.remove('visible');
    }

    function toggleScreenControls() {
      if (!currentMedia) return;
      areControlsVisible = !areControlsVisible;
      if (areControlsVisible) {
        playerControls.classList.add('visible');
        samsungPlayIcon.classList.add('visible');
      } else {
        hideScreenControls();
      }
    }

    ['input-video', 'input-image', 'input-camera-photo', 'input-camera-video'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        cameraOptionsMenu.classList.remove('active');
        rawFile = file;

        await simulateScreenRender(0, 100, 1000, "טוען קובץ מדיה...");

        const fileUrl = URL.createObjectURL(file);
        if (file.type.startsWith('image/')) {
          setMediaImage(fileUrl);
        } else if (file.type.startsWith('video/')) {
          setMediaVideo(fileUrl);
        }
      });
    });

    function simulateScreenRender(fromPct, toPct, durationMs, textLabel) {
      return new Promise(resolve => {
        previewScreen.classList.add('screen-editing');
        aiLoadingOverlay.classList.add('active');
        aiLoadingText.textContent = textLabel || "מעבד ב-AI...";

        let startTime = null;
        function step(timestamp) {
          if (!startTime) startTime = timestamp;
          const progress = Math.min((timestamp - startTime) / durationMs, 1);
          const currentPct = Math.floor(fromPct + progress * (toPct - fromPct));
          
          aiRenderPercent.textContent = `${currentPct}%`;

          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            aiRenderPercent.textContent = `100%`;
            setTimeout(() => {
              previewScreen.classList.remove('screen-editing');
              aiLoadingOverlay.classList.remove('active');
              resolve();
            }, 180);
          }
        }
        requestAnimationFrame(step);
      });
    }

    function setMediaImage(url) {
      clearPreview();
      mediaType = 'image';
      currentMedia = document.createElement('img');
      currentMedia.crossOrigin = "anonymous";
      currentMedia.src = url;
      placeholderText.style.display = 'none';
      previewScreen.appendChild(currentMedia);
      applyFilter();
      hideScreenControls();
    }

    function setMediaVideo(url) {
      clearPreview();
      mediaType = 'video';
      currentMedia = document.createElement('video');
      currentMedia.crossOrigin = "anonymous";
      currentMedia.src = url;
      currentMedia.controls = false;
      currentMedia.autoplay = true;
      currentMedia.loop = true;
      currentMedia.playsInline = true;

      currentMedia.addEventListener('timeupdate', updateProgressBar);
      currentMedia.addEventListener('play', () => { samsungPlayIcon.textContent = '❚❚'; });
      currentMedia.addEventListener('pause', () => { samsungPlayIcon.textContent = '▶'; });

      placeholderText.style.display = 'none';
      previewScreen.appendChild(currentMedia);
      applyFilter();
      hideScreenControls();
    }

    function clearPreview() {
      if (currentMedia) {
        if (mediaType === 'video') {
          currentMedia.pause();
          currentMedia.removeAttribute('src');
          currentMedia.load();
        }
        currentMedia.remove();
        currentMedia = null;
      }
      previewScreen.innerHTML = '';
      previewScreen.appendChild(aiLoadingOverlay);
      previewScreen.appendChild(samsungPlayIcon);
      previewScreen.appendChild(placeholderText);
      placeholderText.style.display = 'block';
      progressFill.style.width = '0%';
      samsungPlayIcon.textContent = '▶';
      editStatusMsg.style.display = 'none';
      hideScreenControls();
      rawFile = null;
    }

    deleteTopBtn.addEventListener('click', clearPreview);

    previewScreen.addEventListener('click', (e) => {
      if (e.target === deleteTopBtn || e.target.closest('.delete-media-btn')) return;
      if (!currentMedia) return;

      toggleScreenControls();

      if (mediaType === 'video') {
        if (currentMedia.paused) {
          currentMedia.play();
        } else {
          currentMedia.pause();
        }
      }
    });

    document.getElementById('btn-play').onclick = () => currentMedia && currentMedia.play && currentMedia.play();
    document.getElementById('btn-pause').onclick = () => currentMedia && currentMedia.pause && currentMedia.pause();
    document.getElementById('btn-stop').onclick = () => {
      if (currentMedia && currentMedia.pause) {
        currentMedia.pause();
        currentMedia.currentTime = 0;
      }
    };
    document.getElementById('btn-forward').onclick = () => {
      if (currentMedia && mediaType === 'video') currentMedia.currentTime += 5;
    };
    document.getElementById('btn-rewind').onclick = () => {
      if (currentMedia && mediaType === 'video') currentMedia.currentTime -= 5;
    };

    function updateProgressBar() {
      if (!currentMedia || isDraggingProgress || !currentMedia.duration) return;
      const pct = (currentMedia.currentTime / currentMedia.duration) * 100;
      progressFill.style.width = `${pct}%`;
    }

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    intensitySlider.addEventListener('input', (e) => {
      filterIntensity = e.target.value;
      intensityValue.textContent = `${filterIntensity}%`;
      applyFilter();
    });

    function getCSSFilterString() {
      if (selectedFilter === 'none') return 'none';
      const f = filterIntensity / 100;

      switch (selectedFilter) {
        case 'natural-reflection':
          return `opacity(${0.65 + 0.35 * (1 - f*0.3)}) contrast(${1 + 0.25 * f})`;
        case 'weather-rain':
          return `brightness(${1 - 0.15 * f}) contrast(${1 + 0.2 * f})`;
        case 'weather-sun':
          return `brightness(${1 + 0.35 * f}) saturate(${1 + 0.5 * f})`;
        case 'glow': 
          return `brightness(${1 + 0.3 * f}) drop-shadow(0 0 ${12 * f}px rgba(255,255,255,0.8))`;
        case 'night-vision': 
          return `hue-rotate(${90 * f}deg) saturate(${1 + 3 * f}) brightness(${1 + 0.4 * f})`;
        case 'golden-hour': 
          return `sepia(${0.5 * f}) saturate(${1 + 0.8 * f})`;
        case 'bw-dramatic': 
          return `grayscale(${f}) contrast(${1 + 1.5 * f})`;
        case 'cyberpunk': 
          return `hue-rotate(${180 * f}deg) saturate(${1 + 2 * f})`;
        default: 
          return 'none';
      }
    }

    function applyFilter() {
      if (currentMedia) {
        currentMedia.style.filter = getCSSFilterString();
      }
    }

    btnCreateEdit.addEventListener('click', () => {
      createOptionsModal.classList.toggle('active');
    });

    optTextToVideo.addEventListener('click', () => {
      createOptionsModal.classList.remove('active');
      runAIGeneration('text-to-video');
    });

    optTextToImage.addEventListener('click', () => {
      createOptionsModal.classList.remove('active');
      runAIGeneration('text-to-image');
    });

    btnExtendVideo.addEventListener('click', async () => {
      if (!currentMedia || mediaType !== 'video') {
        alert('אנא בחר או צור סרטון תחילה כדי להאריך אותו.');
        return;
      }
      videoDurationSeconds += 10;
      runAIGeneration('extend-video');
    });

    // פנייה אמיתית ל-API של OpenRouter ליצירת תמונות
    async function fetchImageFromOpenRouter(prompt, apiKey) {
      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${apiKey}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "google/imagen-3", // מודל יצירת תמונות
          messages: [{ role: "user", content: `Generate image: ${prompt}` }]
        })
      });

      if (!response.ok) {
        throw new Error(`OpenRouter API Error: ${response.statusText}`);
      }

      const data = await response.json();
      // במקרה של מענה עם קישור/Base64
      const content = data.choices[0]?.message?.content;
      if (content && content.startsWith("http")) return content;
      
      throw new Error("חזר מענה שלא מכיל קישור לתמונה. ודא כי יש לך קרדיט בחשבון OpenRouter.");
    }

    async function runAIGeneration(mode) {
      const promptText = aiPrompt.value.trim();
      const apiKey = apiKeyInput.value.trim();

      if (!promptText) {
        alert('אנא הקלד תיאור (פרומפט) בתיבת הטקסט.');
        return;
      }

      if (!apiKey) {
        alert('אנא הזן מפתח API בהגדרות (🔑).');
        apiKeyContainer.classList.add('active');
        return;
      }

      await simulateScreenRender(0, 50, 1500, "שולח לבקשת AI...");

      try {
        if (mode === 'text-to-image') {
          const imageUrl = await fetchImageFromOpenRouter(promptText, apiKey);
          await simulateScreenRender(50, 100, 1000, "מוריד ומציג תמונה...");
          setMediaImage(imageUrl);
        } else {
          alert("שימו לב: יצירת וידאו ב-API דורשת תמיכה במודל וידאו ספציפי וקרדיט בתשלום ב-OpenRouter. מציג תמונה מותאמת במקום.");
          const imageUrl = await fetchImageFromOpenRouter(promptText, apiKey);
          setMediaImage(imageUrl);
        }

        editStatusMsg.style.display = 'block';
        editStatusMsg.textContent = `נוצר בהצלחה ב-AI! ✅`;
      } catch (err) {
        console.error(err);
        alert(`שגיאה ביצירת המדיה: ${err.message}`);
        previewScreen.classList.remove('screen-editing');
        aiLoadingOverlay.classList.remove('active');
      }
    }

    downloadBtn.addEventListener('click', () => {
      if (!currentMedia) return alert('אין מדיה להורדה.');
      const a = document.createElement('a');
      a.href = currentMedia.src;
      a.download = `studio_media_${Date.now()}`;
      a.click();
    });

    shareBtn.addEventListener('click', async () => {
      if (!currentMedia) return alert('אין מדיה לשיתוף.');
      if (navigator.share) {
        await navigator.share({ title: 'Samsung Studio AI', url: currentMedia.src });
      } else {
        alert('שיתוף אינו נתמך בדפדפן זה.');
      }
    });
  </script>
</body>
</html>
