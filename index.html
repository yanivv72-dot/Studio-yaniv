<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        /* נגן קבוע למעלה */
        .player-section { height: 40vh; background: #000; position: relative; flex-shrink: 0; border-bottom: 1px solid #1A1A1A; }
        /* אזור פקדים נגלל */
        .controls-section { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .accent-purple { background-color: #7C3AED; }
        .progress-text { font-size: 3rem; font-weight: 800; color: #7C3AED; text-shadow: 0 0 20px rgba(124,58,237,0.5); }
        input, textarea { border: 1px solid #1A1A1A !important; }
    </style>
</head>
<body>

    <!-- אזור 1: נגן קבוע -->
    <div class="player-section flex items-center justify-center">
        <div id="placeholder" class="opacity-20 flex flex-col items-center">
            <i data-lucide="aperture" class="w-12 h-12 mb-2"></i>
            <span class="text-[10px] tracking-[0.3em]">STUDIO READY</span>
        </div>
        
        <img id="outputImg" class="hidden w-full h-full object-contain">
        <video id="outputVid" class="hidden w-full h-full object-contain" controls playsinline loop></video>

        <!-- מנדול: רק אחוזים בלי אותיות -->
        <div id="loader" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-50">
            <div id="percentLabel" class="progress-text animate-pulse">0%</div>
        </div>
    </div>

    <!-- אזור 2: ממשק נגלל -->
    <div class="controls-section space-y-6">
        
        <!-- כפתורי ניגון מהירים -->
        <div class="flex justify-center gap-8 py-2 opacity-50">
            <i data-lucide="rewind" class="w-6 h-6" onclick="seek(-2)"></i>
            <i data-lucide="play" class="w-6 h-6" onclick="togglePlay()"></i>
            <i data-lucide="fast-forward" class="w-6 h-6" onclick="seek(2)"></i>
        </div>

        <!-- תיבת יצירה -->
        <div class="bg-[#0A0A0B] p-4 rounded-3xl border border-[#1A1A1A]">
            <textarea id="prompt" placeholder="תאר מה ליצור..." 
                class="w-full bg-black rounded-2xl p-4 text-sm h-28 outline-none focus:border-[#7C3AED] text-right"></textarea>
            
            <button onclick="generateAI()" class="w-full mt-4 accent-purple py-4 rounded-2xl font-bold active:scale-95 transition-transform">
                צור יצירה
            </button>
        </div>

        <!-- כפתורי העלאה בשורה אחת -->
        <div class="grid grid-cols-3 gap-2">
            <label class="bg-[#0A0A0B] p-4 rounded-2xl border border-[#1A1A1A] flex flex-col items-center gap-2 active:scale-90 transition-transform cursor-pointer">
                <i data-lucide="image" class="text-blue-400"></i>
                <span class="text-[10px]">תמונות</span>
                <input type="file" class="hidden" accept="image/*" onchange="loadFile(event, 'img')">
            </label>
            <label class="bg-[#0A0A0B] p-4 rounded-2xl border border-[#1A1A1A] flex flex-col items-center gap-2 active:scale-90 transition-transform cursor-pointer">
                <i data-lucide="film" class="text-red-400"></i>
                <span class="text-[10px]">סרטון</span>
                <input type="file" class="hidden" accept="video/*" onchange="loadFile(event, 'vid')">
            </label>
            <label class="bg-[#0A0A0B] p-4 rounded-2xl border border-[#1A1A1A] flex flex-col items-center gap-2 active:scale-90 transition-transform cursor-pointer">
                <i data-lucide="camera" class="text-green-400"></i>
                <span class="text-[10px]">מצלמה</span>
                <input type="file" class="hidden" accept="image/*,video/*" capture="environment" onchange="loadFile(event, 'any')">
            </label>
        </div>

        <!-- פונקציות נוספות -->
        <div class="grid grid-cols-2 gap-2 opacity-50">
            <div class="bg-[#0A0A0B] p-3 rounded-xl border border-[#1A1A1A] text-[10px] text-center">✨ אפקטים</div>
            <div class="bg-[#0A0A0B] p-3 rounded-xl border border-[#1A1A1A] text-[10px] text-center">🎨 פילטרים</div>
        </div>
    </div>

    <!-- כפתור שמירה קבוע בתחתית -->
    <div class="absolute bottom-0 w-full bg-black/90 p-4 border-t border-[#1A1A1A] flex gap-2">
        <button onclick="save()" class="flex-1 bg-white text-black py-4 rounded-2xl font-bold active:scale-95 transition-transform flex items-center justify-center gap-2">
            <i data-lucide="download" class="w-5 h-5"></i> שמור
        </button>
    </div>

    <script>
        lucide.createIcons();

        function loadFile(event, mode) {
            const file = event.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const img = document.getElementById('outputImg');
            const vid = document.getElementById('outputVid');
            document.getElementById('placeholder').classList.add('hidden');

            if (file.type.startsWith('image/')) {
                img.src = url; img.classList.remove('hidden'); vid.classList.add('hidden');
            } else {
                vid.src = url; vid.classList.remove('hidden'); img.classList.add('hidden');
            }
        }

        async function generateAI() {
            const prompt = document.getElementById('prompt').value;
            if(!prompt) return alert("רשום תיאור");

            const loader = document.getElementById('loader');
            const label = document.getElementById('percentLabel');
            const img = document.getElementById('outputImg');

            loader.classList.remove('hidden');
            
            // מנדול 1-100% ללא אותיות
            let p = 0;
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 12);
                if (p >= 99) { p = 99; clearInterval(interval); }
                label.innerText = p + "%";
            }, 300);

            try {
                const seed = Math.floor(Math.random() * 999999);
                const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=1920&seed=${seed}&model=flux&nologo=true`;
                
                const tempImg = new Image();
                tempImg.src = url;
                tempImg.onload = () => {
                    clearInterval(interval);
                    label.innerText = "100%";
                    setTimeout(() => {
                        img.src = url;
                        img.classList.remove('hidden');
                        document.getElementById('outputVid').classList.add('hidden');
                        document.getElementById('placeholder').classList.add('hidden');
                        loader.classList.add('hidden');
                    }, 400);
                };
            } catch (e) {
                loader.classList.add('hidden');
                alert("נסה שוב");
            }
        }

        function save() {
            const img = document.getElementById('outputImg');
            if(img.src) window.open(img.src, '_blank');
        }

        function togglePlay() {
            const vid = document.getElementById('outputVid');
            if(!vid.classList.contains('hidden')) vid.paused ? vid.play() : vid.pause();
        }

        function seek(s) {
            const vid = document.getElementById('outputVid');
            if(!vid.classList.contains('hidden')) vid.currentTime += s;
        }
    </script>
</body>
</html>
