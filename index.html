<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio - Grok Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        .grok-card { background: #0A0A0A; border: 1px solid #202327; }
        .accent-purple { background-color: #7C3AED; }
        .accent-text { color: #7C3AED; }
        .scroll-area { height: calc(100vh - 40vh - 80px); overflow-y: auto; padding-bottom: 150px; }
        .active-scale:active { transform: scale(0.96); }
        .loader-bar { width: 0%; height: 2px; background: #7C3AED; transition: width 0.5s; position: absolute; top: 0; left: 0; }
        select { appearance: none; background-image: url("data:image/svg+xml,..."); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- נגן וידאו/תמונה 4K -->
    <div id="player" class="w-full h-[40vh] bg-black relative flex items-center justify-center border-b border-[#202327]">
        <div class="loader-bar" id="progressBar"></div>
        <div id="placeholder" class="flex flex-col items-center opacity-40">
            <i data-lucide="sparkles" class="w-12 h-12 mb-2 accent-text"></i>
            <span class="text-[10px] uppercase tracking-widest font-bold">Grok Engine V2.5</span>
        </div>
        <img id="outputImg" class="hidden w-full h-full object-contain">
        <video id="outputVid" class="hidden w-full h-full object-contain" controls playsinline loop></video>
        
        <!-- שכבת טעינה -->
        <div id="loader" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-50">
            <div class="w-12 h-12 border-2 border-zinc-800 border-t-[#7C3AED] rounded-full animate-spin"></div>
            <p class="mt-4 text-xs font-bold tracking-widest text-zinc-400" id="statusText">מעבד נתונים...</p>
        </div>
    </div>

    <!-- אזור הבקרה (Grok Interface) -->
    <main class="flex-1 scroll-area p-4 space-y-4">
        
        <!-- תיבת הפרומפט המעוצבת -->
        <div class="grok-card rounded-2xl p-4 shadow-2xl">
            <div class="flex items-center gap-2 mb-3">
                <i data-lucide="message-square" class="w-4 h-4 accent-text"></i>
                <span class="text-xs font-bold uppercase">בקשת AI</span>
            </div>
            <textarea id="prompt" placeholder="מה תרצה שגרוק יצור עבורך?" 
                class="w-full bg-transparent border-none text-sm h-20 outline-none resize-none text-right placeholder-zinc-700"></textarea>
            
            <!-- הגדרות מתקדמות (כמו בגרוק) -->
            <div class="flex gap-2 mt-2 border-t border-zinc-900 pt-3 overflow-x-auto">
                <select id="aspect" class="bg-zinc-900 text-[10px] px-3 py-1.5 rounded-full border border-zinc-800 outline-none">
                    <option value="1080x1920">פורטרט (9:16)</option>
                    <option value="1920x1080">סינמטי (16:9)</option>
                    <option value="1080x1080">ריבוע (1:1)</option>
                </select>
                <select id="mode" class="bg-zinc-900 text-[10px] px-3 py-1.5 rounded-full border border-zinc-800 outline-none">
                    <option value="flux">מצב ריאליסטי</option>
                    <option value="any">מצב יצירתי</option>
                </select>
            </div>

            <div class="flex gap-2 mt-4">
                <button onclick="generate('image')" class="accent-purple flex-1 py-3.5 rounded-xl font-bold text-sm active-scale flex items-center justify-center gap-2">
                    <i data-lucide="wand-2" class="w-4 h-4"></i> צור תמונה
                </button>
                <button onclick="generate('video')" class="bg-zinc-800 flex-1 py-3.5 rounded-xl font-bold text-sm active-scale flex items-center justify-center gap-2 border border-zinc-700">
                    <i data-lucide="video" class="w-4 h-4"></i> צור וידאו
                </button>
            </div>
        </div>

        <!-- כפתורי העלאה בשורה (תמונות, סרטון, מצלמה) -->
        <div class="grid grid-cols-3 gap-2">
            <label class="grok-card p-4 rounded-xl flex flex-col items-center gap-2 active-scale cursor-pointer border-none bg-zinc-900/50">
                <i data-lucide="image-plus" class="w-5 h-5 text-blue-400"></i>
                <span class="text-[9px] font-bold">תמונות</span>
                <input type="file" class="hidden" accept="image/*" onchange="loadFile(event, 'img')">
            </label>
            <label class="grok-card p-4 rounded-xl flex flex-col items-center gap-2 active-scale cursor-pointer border-none bg-zinc-900/50">
                <i data-lucide="file-video" class="w-5 h-5 text-red-400"></i>
                <span class="text-[9px] font-bold">סרטון</span>
                <input type="file" class="hidden" accept="video/*" onchange="loadFile(event, 'vid')">
            </label>
            <label class="grok-card p-4 rounded-xl flex flex-col items-center gap-2 active-scale cursor-pointer border-none bg-zinc-900/50">
                <i data-lucide="camera" class="w-5 h-5 text-green-400"></i>
                <span class="text-[9px] font-bold">מצלמה</span>
                <input type="file" class="hidden" accept="image/*,video/*" capture="environment" onchange="loadFile(event, 'any')">
            </label>
        </div>

        <!-- כלים נוספים -->
        <div class="grid grid-cols-2 gap-2">
            <button onclick="alert('Voice Clone: Record 5s')" class="grok-card p-3 rounded-xl text-[11px] flex items-center justify-center gap-2 opacity-60">
                <i data-lucide="mic" class="w-4 h-4"></i> שיבוט קולי
            </button>
            <button onclick="alert('Lip-Sync: Loading...')" class="grok-card p-3 rounded-xl text-[11px] flex items-center justify-center gap-2 opacity-60">
                <i data-lucide="languages" class="w-4 h-4"></i> סנכרון שפתיים
            </button>
        </div>
    </main>

    <!-- סרגל כלים תחתון (Export & Share) -->
    <footer class="fixed bottom-0 w-full bg-black/90 backdrop-blur-xl border-t border-zinc-900 p-4 flex gap-3 z-[100]">
        <button onclick="saveToGallery()" class="flex-1 bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active-scale">
            <i data-lucide="download" class="w-5 h-5"></i> שמור לגלריה
        </button>
        <button onclick="share()" class="bg-zinc-800 p-4 rounded-2xl active-scale">
            <i data-lucide="share-2" class="w-5 h-5"></i>
        </button>
    </footer>

    <script>
        lucide.createIcons();

        // לוגיקת AI מתקדמת
        async function generate(type) {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) return alert("הזן תיאור בבקשה");

            const loader = document.getElementById('loader');
            const statusText = document.getElementById('statusText');
            const prog = document.getElementById('progressBar');
            const img = document.getElementById('outputImg');
            const vid = document.getElementById('outputVid');

            loader.classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            
            if (type === 'image') {
                statusText.innerText = "Grok is painting...";
                prog.style.width = "40%";
                
                try {
                    const seed = Math.floor(Math.random() * 1000000);
                    const size = document.getElementById('aspect').value.split('x');
                    const model = document.getElementById('mode').value;
                    const finalUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=${size[0]}&height=${size[1]}&seed=${seed}&model=${model}&nologo=true`;
                    
                    const testImg = new Image();
                    testImg.src = finalUrl;
                    testImg.onload = () => {
                        prog.style.width = "100%";
                        setTimeout(() => {
                            img.src = finalUrl;
                            img.classList.remove('hidden');
                            vid.classList.add('hidden');
                            loader.classList.add('hidden');
                            prog.style.width = "0%";
                        }, 500);
                    };
                } catch (e) {
                    alert("AI Connection Error");
                    loader.classList.add('hidden');
                }
            } else {
                statusText.innerText = "Rendering Video (Cloud)...";
                // סימולציית וידאו - בגרסה המלאה נחבר ל-Luma/Kling
                setTimeout(() => {
                    alert("רינדור וידאו דורש API Key מקצועי. בגרסה החינמית ניתן לייצר תמונות בלבד.");
                    loader.classList.add('hidden');
                }, 2000);
            }
        }

        function loadFile(event, mode) {
            const file = event.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const img = document.getElementById('outputImg');
            const vid = document.getElementById('outputVid');
            document.getElementById('placeholder').classList.add('hidden');

            if (file.type.startsWith('image/')) {
                img.src = url;
                img.classList.remove('hidden');
                vid.classList.add('hidden');
            } else {
                vid.src = url;
                vid.classList.remove('hidden');
                img.classList.add('hidden');
            }
        }

        function saveToGallery() {
            const img = document.getElementById('outputImg');
            if (!img.src || img.classList.contains('hidden')) return alert("אין תוכן לשמירה");
            window.open(img.src, '_blank');
        }

        function share() {
            if (navigator.share) {
                navigator.share({ title: 'My AI Art', url: window.location.href });
            }
        }
    </script>
</body>
</html>
