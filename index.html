<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Master Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #000000; --card: #0A0A0A; --border: #1A1A1A; --accent: #ffffff; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* אזור תצוגה עליון (30%) */
        .player-viewport { height: 32dvh; background: #000; position: relative; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        /* גוף האפליקציה */
        .app-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        /* שורת הכתיבה בסגנון המקצועי ביותר */
        .input-dock { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 10px 15px; display: flex; items: center; gap: 10px; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { background: transparent; width: 100%; border: none; outline: none; resize: none; font-size: 15px; color: #fff; text-align: right; max-height: 100px; padding: 5px 0; }
        
        .btn-send { background: #fff; color: #000; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .btn-send:active { transform: scale(0.9); }
        
        .tool-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tool-bar::-webkit-scrollbar { display: none; }
        .chip { background: #111; border: 1px solid var(--border); border-radius: 20px; padding: 8px 15px; font-size: 11px; font-weight: 600; white-space: nowrap; display: flex; items: center; gap: 6px; }
        
        .render-screen { position: absolute; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .percent { font-size: 4.5rem; font-weight: 900; letter-spacing: -2px; color: #fff; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- אזור 1: הנגן/תצוגה -->
    <div class="player-viewport">
        <div id="loader" class="render-screen">
            <div id="p-label" class="percent">0%</div>
            <div class="text-[9px] tracking-[0.4em] opacity-40 font-bold uppercase">Synthesizing</div>
        </div>
        
        <div id="placeholder" class="opacity-10"><i data-lucide="scan-eye" class="w-16 h-16"></i></div>
        
        <img id="v-img" class="hidden w-full h-full object-contain">
        <video id="v-vid" class="hidden w-full h-full object-contain" controls playsinline></video>
        <div id="v-txt" class="hidden p-8 text-sm text-right overflow-y-auto max-h-full leading-relaxed text-zinc-300"></div>
    </div>

    <!-- אזור 2: ממשק עבודה (Grok Pro Design) -->
    <div class="app-body" dir="rtl">
        
        <!-- הגדרת מפתח סודית הנשמרת במכשיר -->
        <input type="password" id="apiKey" placeholder="הגדר מפתח API (נשמר אוטומטית)..." 
            oninput="saveKey()" class="text-[9px] text-zinc-700 bg-transparent border-none outline-none text-left font-mono px-4">

        <!-- שורת פקודות וצ'יפים -->
        <div class="tool-bar">
            <button onclick="pick('image/*')" class="chip"><i data-lucide="image" class="w-3 h-3 text-blue-500"></i>גלריה</button>
            <button onclick="pick('video/*')" class="chip"><i data-lucide="video" class="w-3 h-3 text-red-500"></i>סרטון</button>
            <button onclick="openCam('image/*')" class="chip"><i data-lucide="camera" class="w-3 h-3 text-green-500"></i>צילום</button>
            <button onclick="openCam('video/*')" class="chip"><i data-lucide="clapperboard" class="w-3 h-3 text-yellow-500"></i>הסרטה</button>
            <button onclick="openVoice()" class="chip"><i data-lucide="mic" class="w-3 h-3 text-purple-500"></i>שיבוט</button>
        </div>

        <!-- תיבת הכתיבה המרכזית -->
        <div class="input-dock">
            <button class="opacity-30"><i data-lucide="plus-circle" class="w-6 h-6"></i></button>
            <textarea id="prompt" placeholder="תאר מה ליצור או שאל שאלה..." oninput="autoGrow(this)"></textarea>
            <button onclick="runAI('text')" class="btn-send shadow-lg"><i data-lucide="arrow-up" class="w-5 h-5"></i></button>
        </div>

        <!-- כפתורי פעולה חכמים -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="runAI('media')" class="bg-[#111] border border-zinc-800 py-4 rounded-2xl text-xs font-bold active:scale-95 transition-all flex items-center justify-center gap-2">
                <i data-lucide="sparkles" class="w-4 h-4 text-purple-400"></i> יצירת מדיה 4K
            </button>
            <button onclick="alert('Persistence Engine Enabled')" class="bg-[#111] border border-zinc-800 py-4 rounded-2xl text-xs font-bold active:scale-95 transition-all">
                מנוע עקיבת דמות
            </button>
        </div>

        <div class="mt-auto">
            <button onclick="download()" class="w-full text-zinc-600 text-[10px] font-bold uppercase tracking-widest py-4 border-t border-zinc-900">
                Export to Gallery
            </button>
        </div>
    </div>

    <!-- מודל שיבוט קול -->
    <div id="voice-modal" class="modal">
        <div class="bg-[#0A0A0A] border border-zinc-800 p-8 rounded-3xl w-full max-w-xs text-center shadow-2xl">
            <h2 class="font-bold mb-6 tracking-tight">שיבוט קול</h2>
            <div id="timer" class="text-6xl font-black text-white mb-8 tracking-tighter">05:00</div>
            
            <div class="space-y-3" id="voice-actions">
                <button id="rec-btn" onclick="startRec()" class="w-full bg-red-600 py-4 rounded-xl font-bold">הקלט קול</button>
                <div id="rec-done" class="hidden space-y-3">
                    <button onclick="playRec()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold border border-zinc-700">שמע הקלטה</button>
                    <button onclick="confirmClone()" class="w-full bg-white text-black py-3 rounded-xl font-bold">אשר ושבט למערכת</button>
                </div>
                <button onclick="closeVoice()" class="text-xs opacity-30 pt-4 block w-full">ביטול</button>
            </div>
        </div>
    </div>

    <!-- מערכת קבצים מוסתרת -->
    <input type="file" id="fileInp" class="hidden" onchange="handleFile(event)">
    <input type="file" id="camInp" class="hidden" capture="environment" onchange="handleFile(event)">

    <script>
        lucide.createIcons();
        const vImg = document.getElementById('v-img');
        const vVid = document.getElementById('v-vid');
        const vTxt = document.getElementById('v-txt');
        const ldr = document.getElementById('loader');
        const plbl = document.getElementById('p-label');

        let mediaRecorder, audioChunks = [], audioUrl = null;

        // זיכרון מפתח API
        window.onload = () => {
            const key = localStorage.getItem('api_master_key');
            if(key) document.getElementById('apiKey').value = key;
        };
        function saveKey() { localStorage.setItem('api_master_key', document.getElementById('apiKey').value); }

        // הפעלת מצלמה אמיתית לפי סוג
        function openCam(type) { 
            const inp = document.getElementById('camInp');
            inp.accept = type;
            inp.click(); 
        }

        function pick(type) { 
            const inp = document.getElementById('fileInp');
            inp.accept = type;
            inp.click(); 
        }

        function handleFile(e) {
            const f = e.target.files[0];
            if(!f) return;
            const u = URL.createObjectURL(f);
            document.getElementById('placeholder').classList.add('hidden');
            vTxt.classList.add('hidden');
            if(f.type.startsWith('image/')) {
                vImg.src = u; vImg.classList.remove('hidden'); vVid.classList.add('hidden');
            } else {
                vVid.src = u; vVid.classList.remove('hidden'); vImg.classList.add('hidden');
            }
        }

        // שיבוט קול
        function openVoice() { document.getElementById('voice-modal').style.display = 'flex'; }
        function closeVoice() { document.getElementById('voice-modal').style.display = 'none'; }

        async function startRec() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioUrl = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/wav' }));
                document.getElementById('rec-btn').classList.add('hidden');
                document.getElementById('rec-done').classList.remove('hidden');
            };
            let c = 5;
            mediaRecorder.start();
            const int = setInterval(() => {
                c--; document.getElementById('timer').innerText = `0${c}:00`;
                if(c <= 0) { clearInterval(int); mediaRecorder.stop(); document.getElementById('timer').innerText = "DONE"; }
            }, 1000);
        }
        function playRec() { new Audio(audioUrl).play(); }
        function confirmClone() { alert("הקול שובט בהצלחה!"); closeVoice(); }

        // בינה מלאכותית
        async function runAI(mode) {
            const key = document.getElementById('apiKey').value.trim();
            const p = document.getElementById('prompt').value.trim();
            if(!p) return alert("הזן תיאור");

            if(mode === 'text') {
                if(!key) return alert("הזן מפתח API");
                runLoader();
                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
                    });
                    const d = await r.json();
                    vTxt.innerText = d.candidates[0].content.parts[0].text;
                    stopLoader();
                    vTxt.classList.remove('hidden'); vImg.classList.add('hidden'); vVid.classList.add('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                } catch(e) { alert("שגיאה במפתח ה-API"); stopLoader(); }
            } else {
                runLoader();
                const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=1080&height=1920&seed=${Math.floor(Math.random()*999)}&model=flux&nologo=true`;
                const test = new Image();
                test.src = url;
                test.onload = () => {
                    vImg.src = url; stopLoader();
                    vImg.classList.remove('hidden'); vVid.classList.add('hidden'); vTxt.classList.add('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                };
            }
        }

        function runLoader() {
            ldr.style.display = 'flex';
            let p = 0;
            const t = setInterval(() => {
                p += Math.floor(Math.random()*15)+2;
                if(p >= 100) { p = 100; clearInterval(t); plbl.innerText = "100%"; }
                else { plbl.innerText = p + "%"; }
            }, 250);
            window.activeLdr = t;
        }
        function stopLoader() { clearInterval(window.activeLdr); ldr.style.display = 'none'; plbl.innerText = "0%"; }
        function download() { if(vImg.src) window.open(vImg.src, '_blank'); }
        function autoGrow(element) { element.style.height = "5px"; element.style.height = (element.scrollHeight) + "px"; }
    </script>
</body>
</html>
