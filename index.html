<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio | Architect Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #7C3AED; --bg: #0A0A0B; --panel: #161618; }
        body { background-color: var(--bg); color: white; font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* אזור 1: נגן קבוע (30% גובה) */
        .viewport-top { height: 30vh; background: #000; position: fixed; top: 0; width: 100%; z-index: 100; border-bottom: 2px solid #1A1A1D; }
        
        /* אזור 2: פס תחבורה (10% גובה) */
        .transport-fixed { height: 70px; background: #111113; position: fixed; top: 30vh; width: 100%; z-index: 90; display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid #1A1A1D; }
        
        /* אזור 3: תוכן נגלל (60% גובה) */
        .scroll-panel { margin-top: calc(30vh + 70px); height: calc(70vh - 70px); overflow-y: auto; padding: 15px; padding-bottom: 150px; -webkit-overflow-scrolling: touch; }

        .render-text { font-size: 5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 40px rgba(124,58,237,0.4); }
        .card-ui { background: var(--panel); border: 1px solid #27272A; border-radius: 24px; }
        .btn-action:active { transform: scale(0.95); opacity: 0.8; }
        
        /* Scrollbar נקי */
        .scroll-panel::-webkit-scrollbar { width: 4px; }
        .scroll-panel::-webkit-scrollbar-thumb { background: #27272A; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- אזור 1: הנגן המרכזי -->
    <div class="viewport-top flex items-center justify-center relative">
        <div id="mediaPlaceholder" class="flex flex-col items-center opacity-20">
            <i data-lucide="aperture" class="w-12 h-12 mb-2 text-purple-500"></i>
            <span class="text-[9px] tracking-[0.4em] font-bold">4K AI ENGINE</span>
        </div>
        
        <img id="displayImg" class="hidden w-full h-full object-contain">
        <video id="displayVid" class="hidden w-full h-full object-contain" playsinline loop></video>

        <!-- מנדול אחוזים מרכזי -->
        <div id="renderOverlay" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-[110]">
            <div id="percent" class="render-text">0%</div>
            <div class="text-[10px] tracking-widest text-zinc-500 mt-2 uppercase">Rendering Cloud Stems</div>
        </div>

        <!-- פקדים פנימיים וסרגל זמן -->
        <div class="absolute bottom-0 w-full px-2 py-1 bg-black/40 backdrop-blur-sm flex justify-between items-center">
            <span id="timecode" class="text-[9px] font-mono">00:00:00</span>
            <div class="flex gap-3">
                <i data-lucide="repeat" class="w-3 h-3 opacity-50"></i>
                <i data-lucide="layers" class="w-3 h-3 opacity-50"></i>
            </div>
        </div>
    </div>

    <!-- אזור 2: פס תחבורה (Transport) -->
    <div class="transport-fixed px-6">
        <button onclick="control('start')" class="btn-action flex flex-col items-center"><i data-lucide="chevrons-right" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] mt-1">התחל</span></button>
        <button onclick="control('back')" class="btn-action flex flex-col items-center"><i data-lucide="rotate-ccw" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] mt-1">-2ש'</span></button>
        <button onclick="control('play')" class="btn-action flex flex-col items-center text-[#7C3AED]"><i data-lucide="play" class="w-8 h-8 fill-current"></i><span class="text-[8px] mt-1 font-bold">נגן/השהה</span></button>
        <button onclick="control('forward')" class="btn-action flex flex-col items-center"><i data-lucide="rotate-cw" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] mt-1">+2ש'</span></button>
        <button onclick="control('stop')" class="btn-action flex flex-col items-center text-red-500"><i data-lucide="square" class="w-5 h-5 fill-current"></i><span class="text-[8px] mt-1 uppercase font-bold">עצור</span></button>
    </div>

    <!-- אזור 3: ממשק עבודה נגלל -->
    <div class="scroll-panel space-y-6" dir="rtl">
        
        <!-- כרטיס יצירה -->
        <div class="card-ui p-5">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-bold text-purple-400 tracking-tighter uppercase">AI Master Generator</span>
                <button onclick="randomPrompt()" class="bg-zinc-900 px-3 py-1 rounded-full text-zinc-500 text-[10px]">הפתע אותי 🎲</button>
            </div>
            <textarea id="prompt" placeholder="תאר את הויז'ן שלך (באנגלית)..." 
                class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-sm h-28 mb-4 outline-none focus:border-[#7C3AED] text-right"></textarea>
            
            <div class="grid grid-cols-4 gap-2">
                <button onclick="generate('image')" class="col-span-3 bg-[#7C3AED] py-4 rounded-2xl font-bold text-sm btn-action shadow-lg shadow-purple-900/40">צור יצירה</button>
                <button onclick="alert('Extend +10s Mode Active')" class="bg-zinc-900 rounded-2xl border border-zinc-800 flex items-center justify-center text-[10px] font-bold">הארכה</button>
            </div>
        </div>

        <!-- העלאת מדיה Native (Galaxy Optimized) -->
        <div class="grid grid-cols-3 gap-2">
            <button onclick="triggerInput('image/*')" class="card-ui p-4 flex flex-col items-center gap-2 btn-action">
                <i data-lucide="image" class="text-blue-500"></i>
                <span class="text-[9px] font-bold">תמונות</span>
            </button>
            <button onclick="triggerInput('video/*')" class="card-ui p-4 flex flex-col items-center gap-2 btn-action">
                <i data-lucide="film" class="text-red-500"></i>
                <span class="text-[9px] font-bold">סרטונים</span>
            </button>
            <button onclick="triggerInput('camera')" class="card-ui p-4 flex flex-col items-center gap-2 btn-action border-[#7C3AED]/30">
                <i data-lucide="camera" class="text-green-500"></i>
                <span class="text-[9px] font-bold">מצלמה</span>
            </button>
        </div>

        <!-- כפתורי פונקציות נוספות מהאפיון -->
        <div class="space-y-2">
            <div onclick="alert('Voice Cloning...')" class="card-ui p-4 flex justify-between items-center cursor-pointer opacity-70">
                <span class="text-xs font-bold">🎙️ שיבוט קולי (5 שניות הקלטה)</span>
                <i data-lucide="plus" class="w-4 h-4 opacity-30"></i>
