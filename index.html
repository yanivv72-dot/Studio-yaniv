<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio Pro | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0A0A0B; --card: #161618; --accent: #7C3AED; --border: #222222; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 1. נגן (30%) */
        .viewport { height: 30dvh; background: #000; position: relative; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        /* 2. פס תחבורה סמסונג (75px) */
        .transport { height: 75px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; padding: 0 10px; }
        
        /* 3. גוף נגלל */
        .main-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 100px; }

        /* סגנון סמסונג */
        .samsung-card { background: var(--card); border-radius: 28px; padding: 20px; border: 1px solid var(--border); }
        .s-btn { width: 48px; height: 48px; border-radius: 50%; background: #1A1A1A; display: flex; align-items: center; justify-content: center; border: 1px solid #333; transition: 0.1s; }
        .s-btn:active { transform: scale(0.9); background: #222; }
        .s-btn-play { width: 56px; height: 56px; background: #fff; color: #000; border: none; }
        
        .pill { background: #1A1A1A; border-radius: 24px; padding: 10px 16px; font-size: 12px; font-weight: 600; display: flex; items: center; gap: 8px; border: 1px solid #333; }

        /* מנדול */
        .overlay { position: absolute; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pct { font-size: 5rem; font-weight: 900; color: #fff; letter-spacing: -3px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        
        /* מפתח נסתר */
        #key-box { display: none; }
    </style>
</head>
<body>

    <!-- אזור 1: הנגן -->
    <div class="viewport">
        <div id="loader" class="overlay">
            <div id="p-label" class="pct">0%</div>
            <div class="text-[10px] tracking-[0.4em] opacity-40 font-bold uppercase">Rendering AI Stems</div>
        </div>

        <!-- כפתור הגדרות נסתר -->
        <button onclick="toggleKey()" class="absolute top-4 right-4 opacity-30 z-50"><i data-lucide="settings" class="w-5 h-5"></i></button>

        <div id="placeholder" class="opacity-10 flex flex-col items-center">
            <i data-lucide="clapperboard" class="w-16 h-16 mb-2"></i>
            <span class="text-[10px] font-bold tracking-widest uppercase">Engine V6.1 Pro</span>
        </div>

        <img id="v-img" class="hidden w-full h-full object-contain">
        <video id="v-vid" class="hidden w-full h-full object-contain" playsinline loop></video>
        <div id="v-txt" class="hidden p-8 text-sm text-right overflow-y-auto max-h-full leading-relaxed"></div>

        <div class="absolute bottom-0 w-full h-1 bg-zinc-900"><div id="t-bar" class="h-full bg-white w-0"></div></div>
    </div>

    <!-- אזור 2: פס תחבורה סמסונג -->
    <div class="transport">
        <button onclick="vidCmd('back')" class="s-btn" title="-2ש'"><i data-lucide="rewind"></i></button>
        <button onclick="toggleMedia()" class="s-btn s-btn-play shadow-2xl"><i data-lucide="play" id="playIcon" class="fill-current"></i></button>
        <button onclick="vidCmd('forward')" class="s-btn" title="+2ש'"><i data-lucide="fast-forward"></i></button>
        <button onclick="vidCmd('stop')" class="s-btn text-red-500 border-red-900/20"><i data-lucide="square" class="fill-current"></i></button>
    </div>

    <!-- אזור 3: גוף נגלל -->
    <div class="main-scroll" dir="rtl">
        
        <!-- מפתח API נסתר -->
        <div id="key-box" class="mb-4">
            <input type="password" id="apiKey" placeholder="הכנס מפתח API..." oninput="saveKey()" 
                   class="w-full bg-[#111] border border-zinc-800 rounded-xl p-3 text-xs text-left font-mono">
        </div>

        <!-- כרטיס יצירה -->
        <div class="samsung-card">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-purple-500 uppercase tracking-widest">Master AI Engine</span>
                <button onclick="surpriseMe()" class="pill !py-1 !px-4 text-[10px]">🎲 הפתע אותי</button>
            </div>
            <textarea id="prompt" placeholder="תאר את הויז'ן שלך כאן..." class="w-full bg-transparent border-none outline-none text-lg text-white text-right resize-none mb-6 min-h-[100px]"></textarea>
            <div class="flex gap-3">
                <button onclick="runMedia()" class="flex-1 bg-white text-black py-4 rounded-2xl font-bold active:scale-95 transition-all">צור יצירה</button>
                <button onclick="runText()" class="flex-1 bg-[#1A1A1A] text-white py-4 rounded-2xl font-bold border border-zinc-700 active:scale-95 transition-all">שאל AI</button>
            </div>
        </div>

        <!-- העלאה (מצלמה | סרטון | תמונה) -->
        <div class="grid grid-cols-3 gap-2">
            <button onclick="pick('image/*')" class="pill flex-col py-5 h-auto gap-2">
                <i data-lucide="image" class="text-blue-500"></i><span>תמונה</span>
            </button>
            <button onclick="pick('video/*')" class="pill flex-col py-5 h-auto gap-2">
                <i data-lucide="video" class="text-red-500"></i><span>סרטון</span>
            </button>
            <button onclick="openRealCam()" class="pill flex-col py-5 h-auto gap-2 border-purple-900/30">
                <i data-lucide="camera" class="text-green-500"></i><span>מצלמה</span>
            </button>
        </div>

        <!-- פונקציות עריכה -->
        <div class="space-y-3">
            <button onclick="openModal('voice-modal')" class="w-full samsung-card !py-5 flex justify-between items-center active:scale-95">
                <div class="flex items-center gap-4"><i data-lucide="mic" class="text-purple-500"></i><span class="text-sm font-bold">שיבוט קולי (Voice Clone)</span></div>
                <i data-lucide="plus" class="w-4 h-4 opacity-20"></i>
            </button>
            <button onclick="alert('Filter Engine Ready')" class="w-full samsung-card !py-5 flex justify-between items-center active:scale-95">
                <div class="flex items-center gap-4"><i data-lucide="palette" class="text-purple-500"></i><span class="text-sm font-bold">פיל
