<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio Pro | Samsung Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #000000; --panel: #121212; --accent: #7C3AED; --samsung-border: #222222; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* אזור 1: נגן (30% קבוע) */
        .viewport { height: 30dvh; background: #000; position: relative; border-bottom: 1px solid var(--samsung-border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        /* אזור 2: פס תחבורה (סמסונג סטייל) */
        .transport { height: 75px; background: #000; border-bottom: 1px solid var(--samsung-border); display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; }
        
        /* אזור 3: גוף נגלל */
        .main-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 100px; }

        /* אלמנטים של סמסונג */
        .samsung-card { background: var(--panel); border-radius: 28px; padding: 20px; border: 1px solid var(--samsung-border); }
        .samsung-btn { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #1A1A1A; border: 1px solid #333; transition: 0.15s; }
        .samsung-btn:active { transform: scale(0.9); background: #252525; }
        .btn-play { width: 56px; height: 56px; background: #fff; color: #000; border: none; }
        
        .chip { background: #1A1A1A; border: 1px solid #333; border-radius: 20px; padding: 10px 18px; font-size: 11px; font-weight: 600; white-space: nowrap; display: flex; items: center; gap: 8px; }
        
        /* מנדול */
        .render-overlay { position: absolute; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .percent { font-size: 5rem; font-weight: 900; letter-spacing: -3px; }
        
        /* מודלים של עריכה */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- אזור 1: הנגן המרכזי -->
    <div class="viewport">
        <div id="loader" class="render-overlay">
            <div id="p-label" class="percent">0%</div>
            <div class="text-[10px] tracking-[0.3em] font-bold opacity-40 uppercase">Rendering 4K Asset</div>
        </div>
        
        <div id="placeholder" class="opacity-10 flex flex-col items-center">
            <i data-lucide="aperture" class="w-16 h-16 mb-2"></i>
            <span class="text-[10px] font-bold tracking-widest">ENGINE READY</span>
        </div>
        
        <img id="v-img" class="hidden w-full h-full object-contain">
        <video id="v-vid" class="hidden w-full h-full object-contain" controls playsinline loop></video>
        <div id="v-txt" class="hidden p-8 text-sm text-right overflow-y-auto max-h-full leading-relaxed text-zinc-300"></div>

        <!-- סרגל זמן פנימי -->
        <div class="absolute bottom-0 w-full h-1 bg-zinc-900"><div id="t-bar" class="h-full bg-purple-600 w-0"></div></div>
    </div>

    <!-- אזור 2: פס תחבורה סמסונג -->
    <div class="transport">
        <button onclick="control('start')" class="samsung-btn"><i data-lucide="skip-back" class="w-5 h-5"></i></button>
        <button onclick="control('back')" class="samsung-btn"><i data-lucide="rewind" class="w-5 h-5"></i></button>
        <button onclick="toggleMedia()" class="samsung-btn btn-play shadow-xl"><i data-lucide="play" id="playIcon" class="w-6 h-6 fill-current"></i></button>
        <button onclick="control('forward')" class="samsung-btn"><i data-lucide="fast-forward" class="w-5 h-5"></i></button>
        <button onclick="control('stop')" class="samsung-btn text-red-500"><i data-lucide="square" class="w-4 h-4 fill-current"></i></button>
    </div>

    <!-- אזור 3: גוף נגלל (כל הכפתורים) -->
    <div class="main-scroll" dir="rtl">
        
        <!-- מפתח API (נשמר במכשיר) -->
        <input type="password" id="apiKey" placeholder="הגדר מפתח API (לפעם אחת בלבד)..." 
               oninput="saveKey()" class="text-[10px] text-zinc-700 bg-transparent border-none outline-none text-left px-2 font-mono">

        <!-- כרטיס יצירה -->
        <div class="samsung-card shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-purple-500 uppercase tracking-widest">AI Master Engine</span>
                <button onclick="surpriseMe()" class="chip !py-1 !px-3">🎲 הפתע אותי</button>
            </div>
            <textarea id="prompt" placeholder="תאר את הויז'ן שלך כאן..." class="w-full bg-transparent border-none outline-none text-lg text-white text-right resize-none mb-4 min-h-[80px]"></textarea>
            <div class="flex gap-2">
                <button onclick="runAI('media')" class="flex-1 bg-white text-black py-4 rounded-2xl font-bold active:scale-95 transition-all">צור יצירה</button>
                <button onclick="runAI('text')" class="flex-1 bg-zinc-800 text-white py-4 rounded-2xl font-bold border border-zinc-700 active:scale-95 transition-all">שאל AI</button>
            </div>
            <div class="flex gap-2 mt-3">
                <button onclick="alert('Extend Mode: +10s')" class="flex-1 bg-[#1A1A1A] py-2 rounded-xl text-[10px] font-bold text-zinc-500 uppercase">הארכה +10ש'</button>
                <button onclick="togglePersist()" id="persistBtn" class="flex-1 bg-[#1A1A1A] py-2 rounded-xl text-[10px] font-bold text-zinc-500 uppercase">עקיבת דמות</button>
            </div>
        </div>

        <!-- העלאת מדיה (מצלמה אמיתית) -->
        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
            <button onclick="pick('image/*')" class="chip"><i data-lucide="image" class="text-blue-500"></i>גלריה תמונות</button>
            <button onclick="pick('video/*')" class="chip"><i data-lucide="video" class="text-red-500"></i>גלריה סרטונים</button>
            <button onclick="openRealCam()" class="chip border-zinc-700"><i data-lucide="camera" class="text-green-500"></i>מצלמה</button>
        </div>

        <!-- פונקציות עריכה מתקדמות -->
        <div class="space-y-3">
            <button onclick="openModal('voice-modal')" class="w-full samsung-card !py-4 flex justify-between items-center">
                <div class="flex items-center gap-4"><i data-lucide="mic" class="text-purple-500"></i><span class="text-sm font-bold">שיבוט קולי (Voice Clone)</span></div>
                <i data-lucide="plus" class="w-4 h-4 opacity-20"></i>
            </button>
            <button onclick="openModal('lipsync-modal')" class="w-full samsung-card !py-4 flex justify-between items-center">
                <div class="flex items-center gap-4"><i data-lucide="languages" class="text-purple-500"></i><span class="text-sm font-bold">סנכרון שפתיים (Lip-Sync)</span></div>
                <i data-lucide="plus" class="w-4 h-4 opacity-20"></i>
            </button>
            <button onclick="openModal('filter-modal')" class="w-full samsung-card !py-4 flex justify-between items-center">
                <div class="flex items-center gap-4"><i data-lucide="palette" class="text-purple-500"></i><span class="text-sm font-bold">פילטרים ומניפת צבעים</span></div>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-20"></i>
            </button>
            <button onclick="openModal('effects-modal')" class="w-full samsung-card !py-4 flex justify-between items-center">
                <div class="flex items-center gap-4"><i data-lucide="zap" class="text-purple-500"></i><span class="text-sm font-bold">עורך אפקטים (אש, גשם, מים)</span></div>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-20"></i>
            </button>
        </div>

        <!-- ספרייה אישית -->
        <div class="mt-4">
            <h3 class="text-[10px] font-black text-zinc-700 uppercase tracking-widest mb-3">Library</h3>
            <div id="gallery" class="grid grid-cols-4 gap-2"></div>
        </div>

        <!-- כפתורי ייצוא סופיים (בסוף הגלילה) -->
        <div class="grid grid-cols-2 gap-3 mt-6">
            <button onclick="download()" class="bg-white text-black py-4 rounded-3xl font-black text-xs uppercase tracking-widest active:scale-95 shadow-2xl transition-all">הורדה למכשיר</button>
            <button onclick="share()" class="bg-zinc-900 text-white py-4 rounded-3xl font-black text-xs uppercase tracking-widest border border-zinc-800">שיתוף מהיר</button>
        </div>
    </div>

    <!-- מודלים (Modals) -->
    <div id="voice-modal" class="modal">
        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-[32px] w-full max-w-xs text-center">
            <h2 class="font-bold mb-6">שיבוט קול</h2>
            <div id="v-timer" class="text-6xl font-black text-white mb-8 tracking-tighter">05:00</div>
            <div class="space-y-3">
                <button id="r-btn" onclick="startRec()" class="w-full bg-red-600 py-4 rounded-2xl font-bold">הקלטה</button>
                <div id="r-done" class="hidden space-y-2">
                    <button onclick="new Audio(audioUrl).play()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold">שמע הקלטה</button>
                    <button onclick="alert('Voice Cloned!'); closeAll()" class="w-full bg-white text-black py-3 rounded-xl font-bold">אשר ושבט</button>
                </div>
                <button onclick="closeAll()" class="text-xs opacity-30 pt-4">ביטול</button>
            </div>
        </div>
    </div>

    <div id="filter-modal" class="modal"><div class="bg-zinc-900 p-6 rounded-[32px] w-full grid grid-cols-2 gap-3">
        <button class="chip" onclick="alert('B&W Applied')">שחור לבן</button>
        <button class="chip" onclick="alert('Cinematic Applied')">סינמטי</button>
        <button class="chip" onclick="alert('Green Screen')">מסך ירוק</button>
        <button onclick="closeAll()" class="col-span-2 text-xs opacity-30 mt-4">סגור</button>
    </div></div>

    <div id="effects-modal" class="modal"><div class="bg-zinc-900 p-6 rounded-[32px] w-full grid grid-cols-2 gap-3">
        <button class="chip" onclick="alert('Fire Effect')">🔥 אש</butto
