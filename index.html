<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מחולל וידאו AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: #0b0f19;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      background-color: #121824;
      border: 1px solid #1e293b;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header Design */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }

    .user-profile {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    header h1 {
      font-size: 1.25rem;
      color: #f8fafc;
      font-weight: 600;
    }

    .settings-btn {
      color: #64748b;
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* Video / Preview Container */
    .preview-card {
      background: #090d16;
      border: 1.5px solid #22d3ee;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preview-screen {
      width: 100%;
      height: 180px;
      background-color: #000000;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .preview-screen img,
    .preview-screen video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .placeholder-text {
      color: #475569;
      font-size: 0.9rem;
    }

    /* Video Player Controls */
    .player-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #1e293b;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      width: 35%;
      height: 100%;
      background: #22d3ee;
    }

    .control-buttons {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-top: 4px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
    }

    .ctrl-btn span.icon {
      font-size: 1.1rem;
    }

    /* AI Prompt Input Section */
    .prompt-box {
      background: #0d131f;
      border: 1.5px solid #06b6d4;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .prompt-box textarea {
      width: 100%;
      height: 55px;
      background: transparent;
      border: none;
      color: #f8fafc;
      resize: none;
      outline: none;
      font-size: 0.85rem;
    }

    .surprise-btn {
      align-self: flex-end;
      background: #22d3ee;
      color: #0f172a;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Media Type Selection Buttons */
    .media-type-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .media-type-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px;
      color: #cbd5e1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .media-type-btn input {
      display: none;
    }

    /* Filter Controls Section (Scrollable & Adjustable) */
    .filters-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0d131f;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #1e293b;
    }

    .filters-grid {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 6px;
    }

    .filter-btn {
      background-color: #1e293b;
      color: #f1f5f9;
      border: 1px solid #334155;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn.active {
      border-color: #22d3ee;
      background-color: #0284c7;
    }

    .intensity-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .intensity-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .intensity-slider {
      width: 100%;
      accent-color: #22d3ee;
      cursor: pointer;
    }

    /* Main Action Buttons (Download & Share) */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-main {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-download-main {
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-share-main {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    /* Gallery Section at Bottom */
    .gallery-section {
      margin-top: 10px;
      border-top: 1px solid #1e293b;
      padding-top: 12px;
    }

    .gallery-section h3 {
      font-size: 0.9rem;
      color: #22d3ee;
      margin-bottom: 10px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .gallery-item {
      background-color: #0d131f;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 1px solid #1e293b;
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
    }

    .gallery-actions {
      display: flex;
      gap: 4px;
    }

    .btn-action {
      flex: 1;
      padding: 4px;
      font-size: 0.7rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-action-download { background-color: #10b981; color: #fff; }
    .btn-action-delete { background-color: #ef4444; color: #fff; }

    /* Scrollbar */
    .filters-grid::-webkit-scrollbar { height: 4px; }
    .filters-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="user-profile">👤</div>
      <h1>מחולל וידאו AI</h1>
      <div class="settings-btn">⚙️</div>
    </header>

    <!-- Preview Container -->
    <div class="preview-card">
      <div class="preview-screen" id="preview-screen">
        <span class="placeholder-text">אין מדיה מוצגת</span>
      </div>
      
      <!-- Video Controls -->
      <div class="player-controls">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="control-buttons">
          <button class="ctrl-btn" id="btn-play"><span class="icon">▶</span>התחל</button>
          <button class="ctrl-btn" id="btn-pause"><span class="icon">❚❚</span>השהה</button>
          <button class="ctrl-btn" id="btn-stop"><span class="icon">◼</span>עצור</button>
          <button class="ctrl-btn"><span class="icon">►►</span>קדימה</button>
          <button class="ctrl-btn"><span class="icon">◄◄</span>אחורה</button>
        </div>
      </div>
    </div>

    <!-- AI Prompt Box -->
    <div class="prompt-box">
      <textarea id="ai-prompt" placeholder="תאר את הסרטון שלך כאן... (למשל, אריה רץ בסוואנה בשעת השקיעה)"></textarea>
      <button class="surprise-btn" id="surprise-btn">הפתע אותי 🪄</button>
    </div>

    <!-- Media Source Selector -->
    <div class="media-type-selector">
      <label class="media-type-btn">
        📷 מצלמה
        <input type="file" accept="image/*" capture="environment" id="input-camera">
      </label>
      <label class="media-type-btn">
        🎥 סרטון
        <input type="file" accept="video/*" id="input-video">
      </label>
      <label class="media-type-btn">
        🖼️ תמונה
        <input type="file" accept="image/*" id="input-image">
      </label>
    </div>

    <!-- Filters and Adjustments -->
    <div class="filters-container">
      <div class="filters-grid" id="filters-grid">
        <button class="filter-btn active" data-filter="none">ללא פילטר</button>
        <button class="filter-btn" data-filter="vintage">וינטג'</button>
        <button class="filter-btn" data-filter="sepia">ספיה</button>
        <button class="filter-btn" data-filter="bw">שחור-לבן</button>
        <button class="filter-btn" data-filter="cyberpunk">סייברפאנק</button>
        <button class="filter-btn" data-filter="warm">חם</button>
        <button class="filter-btn" data-filter="cool">קר</button>
        <button class="filter-btn" data-filter="invert">נגטיב</button>
        <button class="filter-btn" data-filter="blur">טשטוש</button>
        <button class="filter-btn" data-filter="high-contrast">קונטרסט</button>
        <button class="filter-btn" data-filter="pastel">פסטל</button>
        <button class="filter-btn" data-filter="neon">ניאון</button>
        <button class="filter-btn" data-filter="cinema">קולנועי</button>
        <button class="filter-btn" data-filter="sunset">שקיעה</button>
        <button class="filter-btn" data-filter="noir">נואר</button>
      </div>

      <div class="intensity-container">
        <div class="intensity-header">
          <span>עוצמת פילטר:</span>
          <span id="intensity-value">100%</span>
        </div>
        <input type="range" id="intensity-slider" class="intensity-slider" min="1" max="100" value="100">
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn-main btn-download-main" id="download-btn">⬇ הורדה</button>
      <button class="btn-main btn-share-main" id="share-btn">🔗 שיתוף</button>
    </div>

    <!-- Processed Media Folder (Gallery) -->
    <div class="gallery-section">
      <h3>תיקיית מדיה ערוכה</h3>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </div>

  <script>
    const previewScreen = document.getElementById('preview-screen');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityValue = document.getElementById('intensity-value');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    const galleryGrid = document.getElementById('gallery-grid');
    const surpriseBtn = document.getElementById('surprise-btn');
    const aiPrompt = document.getElementById('ai-prompt');

    let currentMedia = null;
    let mediaType = null;
    let fileName = 'edited_media';
    let selectedFilter = 'none';
    let filterIntensity = 100;

    // AI Surprise Prompts
    const prompts = [
      "אריה רץ בסוואנה בשעת השקיעה בטכנולוגיית HDR",
      "עיר עתידנית בלילה עם אורות ניאון וגשם",
      "חללית חוצה גלקסיה צבעונית בסגנון קולנועי",
      "נוף מושלג באלפים עם זריחה מרהיבה"
    ];

    surpriseBtn.addEventListener('click', () => {
      const randomPrompt = prompts[Math.floor(Math.random() * prompts.length)];
      aiPrompt.value = randomPrompt;
    });

    // File Upload Handling
    ['input-camera', 'input-video', 'input-image'].forEach(id => {
      document.getElementById(id).addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        fileName = file.name;
        const fileUrl = URL.createObjectURL(file);
        previewScreen.innerHTML = '';

        if (file.type.startsWith('image/')) {
          mediaType = 'image';
          currentMedia = document.createElement('img');
          currentMedia.src = fileUrl;
        } else if (file.type.startsWith('video/')) {
          mediaType = 'video';
          currentMedia = document.createElement('video');
          currentMedia.src = fileUrl;
          currentMedia.controls = false;
          currentMedia.autoplay = true;
          currentMedia.loop = true;
          currentMedia.playsInline = true;
        }

        previewScreen.appendChild(currentMedia);
        applyFilter();
      });
    });

    // Video Control Buttons
    document.getElementById('btn-play').onclick = () => currentMedia && currentMedia.play && currentMedia.play();
    document.getElementById('btn-pause').onclick = () => currentMedia && currentMedia.pause && currentMedia.pause();
    document.getElementById('btn-stop').onclick = () => {
      if (currentMedia && currentMedia.pause) {
        currentMedia.pause();
        currentMedia.currentTime = 0;
      }
    };

    // Filter Logic
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    intensitySlider.addEventListener('input', (e) => {
      filterIntensity = e.target.value;
      intensityValue.textContent = `${filterIntensity}%`;
      applyFilter();
    });

    function getCSSFilterString() {
      if (selectedFilter === 'none') return 'none';
      const f = filterIntensity / 100;

      switch (selectedFilter) {
        case 'vintage': return `sepia(${0.5 * f}) contrast(${1 + 0.2 * f})`;
        case 'sepia': return `sepia(${f})`;
        case 'bw': return `grayscale(${f}) contrast(${1 + 0.5 * f})`;
        case 'cyberpunk': return `hue-rotate(${180 * f}deg) saturate(${1 + f})`;
        case 'warm': return `sepia(${0.3 * f}) saturate(${1 + 0.4 * f})`;
        case 'cool': return `hue-rotate(${30 * f}deg) saturate(${1 + 0.2 * f})`;
        case 'invert': return `invert(${f})`;
        case 'blur': return `blur(${5 * f}px)`;
        case 'high-contrast': return `contrast(${1 + f})`;
        case 'pastel': return `saturate(${1 - 0.5 * f}) brightness(${1 + 0.2 * f})`;
        case 'neon': return `saturate(${1 + 2 * f}) contrast(${1 + 0.5 * f})`;
        case 'cinema': return `contrast(${1 + 0.3 * f}) saturate(${1 - 0.2 * f})`;
        case 'sunset': return `sepia(${0.4 * f}) saturate(${1 + f})`;
        case 'noir': return `grayscale(${f}) contrast(${1 + f})`;
        default: return 'none';
      }
    }

    function applyFilter() {
      if (currentMedia) {
        currentMedia.style.filter = getCSSFilterString();
      }
    }

    // Process & Export Media (Physical File Generation)
    async function createProcessedBlob() {
      if (!currentMedia) return null;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      if (mediaType === 'image') {
        canvas.width = currentMedia.naturalWidth || 800;
        canvas.height = currentMedia.naturalHeight || 600;
        ctx.filter = getCSSFilterString();
        ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);

        return new Promise(resolve => {
          canvas.toBlob(blob => resolve({ blob, type: 'image', extension: 'png', mime: 'image/png' }), 'image/png');
        });
      } else if (mediaType === 'video') {
        canvas.width = currentMedia.videoWidth || 640;
        canvas.height = currentMedia.videoHeight || 360;

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);

        return new Promise(resolve => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            resolve({ blob, type: 'video', extension: 'webm', mime: 'video/webm' });
          };

          currentMedia.currentTime = 0;
          currentMedia.play();
          recorder.start();

          const renderFrame = () => {
            if (currentMedia.ended || currentMedia.paused) {
              recorder.stop();
              return;
            }
            ctx.filter = getCSSFilterString();
            ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderFrame);
          };
          renderFrame();
        });
      }
    }

    function saveFileToDevice(blob, filename) {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function addItemToFolder(blobData) {
      const url = URL.createObjectURL(blobData.blob);
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const mediaEl = blobData.type === 'image' ? document.createElement('img') : document.createElement('video');
      mediaEl.src = url;
      if (blobData.type === 'video') mediaEl.controls = true;

      const actions = document.createElement('div');
      actions.className = 'gallery-actions';

      const downloadBtnSmall = document.createElement('button');
      downloadBtnSmall.className = 'btn-action btn-action-download';
      downloadBtnSmall.textContent = 'הורד';
      downloadBtnSmall.onclick = () => saveFileToDevice(blobData.blob, `edited_${Date.now()}.${blobData.extension}`);

      const deleteBtnSmall = document.createElement('button');
      deleteBtnSmall.className = 'btn-action btn-action-delete';
      deleteBtnSmall.textContent = 'מחק';
      deleteBtnSmall.onclick = () => item.remove();

      actions.appendChild(downloadBtnSmall);
      actions.appendChild(deleteBtnSmall);
      item.appendChild(mediaEl);
      item.appendChild(actions);
      galleryGrid.prepend(item);
    }

    downloadBtn.addEventListener('click', async () => {
      if (!currentMedia) return alert('אנא העלה תמונה או סרטון תחילה.');
      const processed = await createProcessedBlob();
      if (processed) {
        saveFileToDevice(processed.blob, `edited_${fileName.split('.')[0]}.${processed.extension}`);
        addItemToFolder(processed);
      }
    });

    shareBtn.addEventListener('click', async () => {
      if (!currentMedia) return alert('אנא העלה תמונה או סרטון תחילה.');
      const processed = await createProcessedBlob();
      if (!processed) return;

      const file = new File([processed.blob], `edited_${fileName.split('.')[0]}.${processed.extension}`, { type: processed.mime });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ title: 'מדיה ערוכה', files: [file] });
      } else {
        saveFileToDevice(processed.blob, file.name);
      }
    });
  </script>
</body>
</html>
