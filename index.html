<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Ultra Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0A0A0B; color: white; font-family: system-ui, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .player-fixed { height: 30dvh; background: #000; border-bottom: 2px solid #1A1A1D; position: relative; flex-shrink: 0; }
        .transport-bar { height: 70px; background: #111; display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid #222; flex-shrink: 0; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 50px; }
        .progress-text { font-size: 5rem; font-weight: 900; color: #7C3AED; text-shadow: 0 0 30px rgba(124,58,237,0.5); }
        .btn-tool { background: #161618; border: 1px solid #222; border-radius: 20px; transition: 0.2s; }
        .btn-tool:active { transform: scale(0.95); background: #1F1F23; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- אזור 1: נגן (30%) -->
    <div class="player-fixed flex items-center justify-center relative">
        <div id="placeholder" class="opacity-30 flex flex-col items-center">
            <i data-lucide="monitor-play" class="w-12 h-12 mb-1 text-[#7C3AED]"></i>
            <span class="text-[10px] font-bold">4K AI STUDIO READY</span>
        </div>
        <img id="v-img" class="hidden w-full h-full object-contain shadow-2xl">
        <video id="v-vid" class="hidden w-full h-full object-contain" playsinline loop></video>

        <!-- מנדול 1-100% -->
        <div id="loader" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-[110]">
            <div id="p-label" class="progress-text">0%</div>
            <div class="text-[10px] text-zinc-500 mt-2 font-bold tracking-widest">RENDERING IN CLOUD...</div>
        </div>
        
        <div class="absolute bottom-0 w-full h-1 bg-zinc-800"><div id="t-bar" class="h-full bg-purple-500 w-0"></div></div>
    </div>

    <!-- אזור 2: פס תחבורה (Transport) -->
    <div class="transport-bar">
        <button onclick="control('start')" class="flex flex-col items-center"><i data-lucide="skip-back" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] font-bold uppercase">Start</span></button>
        <button onclick="control('back')" class="flex flex-col items-center"><i data-lucide="rewind" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] font-bold uppercase">-2s</span></button>
        <button onclick="control('play')" class="bg-purple-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90"><i data-lucide="play" id="playIcon" class="w-6 h-6 fill-current"></i></button>
        <button onclick="control('forward')" class="flex flex-col items-center"><i data-lucide="fast-forward" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] font-bold uppercase">+2s</span></button>
        <button onclick="control('stop')" class="flex flex-col items-center text-red-500"><i data-lucide="square" class="w-5 h-5 fill-current"></i><span class="text-[8px] font-bold uppercase">Stop</span></button>
    </div>

    <!-- אזור 3: ממשק עבודה נגלל -->
    <div class="scroll-area space-y-4">
        
        <!-- כלי יצירה AI -->
        <div class="btn-tool p-4">
            <textarea id="prompt" placeholder="תאר את הויז'ן שלך (באנגלית)..." class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm h-20 mb-3 outline-none text-right"></textarea>
            <div class="flex gap-2">
                <button onclick="generateAI()" class="flex-[3] bg-purple-600 py-4 rounded-xl font-bold active:scale-95 shadow-xl shadow-purple-900/30">צור יצירה (AI)</button>
                <button onclick="alert('Extend Mode ON')" class="flex-1 bg-zinc-900 rounded-xl text-[10px] border border-zinc-800">הארכה</button>
            </div>
        </div>

        <!-- העלאה (תמונות | סרטון | מצלמה) -->
        <div class="grid grid-cols-3 gap-2">
            <button onclick="pickFile('image/*')" class="btn-tool p-4 flex flex-col items-center gap-2">
                <i data-lucide="image" class="text-blue-500 w-6 h-6"></i>
                <span class="text-[10px] font-bold">תמונות</span>
            </button>
            <button onclick="pickFile('video/*')" class="btn-tool p-4 flex flex-col items-center gap-2">
                <i data-lucide="film" class="text-red-500 w-6 h-6"></i>
                <span class="text-[10px] font-bold">סרטונים</span>
            </button>
            <button onclick="openNativeCam()" class="btn-tool p-4 flex flex-col items-center gap-2 border-purple-900/40">
                <i data-lucide="camera" class="text-green-500 w-6 h-6"></i>
                <span class="text-[10px] font-bold">מצלמה</span>
            </button>
        </div>

        <!-- פונקציות מתקדמות -->
        <div class="space-y-2">
            <button onclick="openModal('modal-voice')" class="w-full btn-tool p-4 flex justify-between items-center">
                <span class="text-xs font-bold flex items-center gap-2"><i data-lucide="mic" class="text-purple-500"></i> שיבוט קולי (5 שניות הקלטה)</span>
                <i data-lucide="plus" class="w-4 h-4 opacity-30"></i>
            </button>
            <button onclick="openModal('modal-filters')" class="w-full btn-tool p-4 flex justify-between items-center">
                <span class="text-xs font-bold flex items-center gap-2"><i data-lucide="palette" class="text-purple-500"></i> פילטרים ומניפת צבעים</span>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-30"></i>
            </button>
        </div>

        <!-- שמירה -->
        <button onclick="save()" class="w-full bg-white text-black py-5 rounded-3xl font-black text-sm uppercase tracking-widest active:scale-95 shadow-2xl">
            Download 4K Result
        </button>
    </div>

    <!-- מודל שיבוט קולי -->
    <div id="modal-voice" class="modal">
        <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-full max-w-sm text-center">
            <h2 class="font-bold mb-4">שיבוט קולי AI</h2>
