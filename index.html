<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yaniv AI - Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0A0A0B; --card: #1A1A1D; --accent: #7C3AED; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(26, 26, 29, 0.8); backdrop-filter: blur(10px); }
        .player-container { height: 35vh; background: black; position: relative; overflow: hidden; border-bottom: 1px solid #2D2D30; }
        .scroll-area { height: calc(65vh - 70px); overflow-y: auto; padding-bottom: 100px; }
        .btn-accent { background: var(--accent); transition: all 0.2s; }
        .btn-accent:active { transform: scale(0.95); opacity: 0.8; }
        .custom-slider { width: 100%; height: 4px; background: #333; border-radius: 2px; position: relative; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        /* עיצוב כפתורי פונקציות */
        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- אזור 1: נגן וידאו מרכזי -->
    <section class="player-container flex flex-col items-center justify-center">
        <div id="mediaPlaceholder" class="flex flex-col items-center opacity-30 text-zinc-400 text-center">
            <i data-lucide="clapperboard" class="w-16 h-16 mb-2 text-[#7C3AED]"></i>
            <span class="text-sm">4K Rendering Engine</span>
        </div>
        
        <img id="mainImage" class="hidden w-full h-full object-cover">
        <video id="mainVideo" class="hidden w-full h-full object-cover" loop playsinline></video>

        <!-- פקדים צפים בתוך הנגן -->
        <div class="absolute bottom-2 left-2 flex gap-2">
            <button class="glass p-2 rounded-full text-xs" onclick="alert('Compare Mode Active')">Compare</button>
            <button class="glass p-2 rounded-full" onclick="undo()"><i data-lucide="undo" class="w-4 h-4"></i></button>
            <button class="glass p-2 rounded-full" onclick="redo()"><i data-lucide="redo" class="w-4 h-4"></i></button>
        </div>
        
        <div id="aiLoader" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-50">
            <div class="w-12 h-12 border-4 border-[#7C3AED] border-t-transparent rounded-full animate-spin"></div>
            <p id="loaderPercent" class="mt-2 font-bold text-[#7C3AED]">0%</p>
        </div>
    </section>

    <!-- אזור 2: פס תחבורה -->
    <div class="bg-zinc-900/80 p-2 border-b border-zinc-800">
        <div class="custom-slider mb-2"><div id="seekBar" class="progress-fill"></div></div>
        <div class="flex justify-around items-center px-4">
            <button onclick="seek(-2)"><i data-lucide="skip-back" class="w-5 h-5"></i></button>
            <button onclick="togglePlay()"><i data-lucide="play" id="playIcon" class="w-8 h-8 fill-current text-[#7C3AED]"></i></button>
            <button onclick="stopMedia()"><i data-lucide="square" class="w-5 h-5"></i></button>
            <button onclick="seek(2)"><i data-lucide="skip-forward" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- אזור נגלל: שאר האפליקציה -->
    <main class="flex-1 scroll-area p-4 space-y-6">
        
        <!-- אזור 3: יצירה -->
        <section class="bg-[#1A1A1D] p-4 rounded-2xl shadow-lg border border-zinc-800">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4 text-purple-500"></i> יצירת AI</h3>
                <button onclick="randomPrompt()" class="text-[10px] bg-zinc-800 px-2 py-1 rounded">הפתע אותי 🎲</button>
            </div>
            <textarea id="promptInput" placeholder="מה ה-AI יצור עבורך היום? (באנגלית)" 
                class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm h-20 mb-3 outline-none focus:border-[#7C3AED] text-right"></textarea>
            
            <div class="flex items-center gap-3">
                <button onclick="generateAI()" class="btn-accent flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                    <i data-lucide="wand-2" class="w-5 h-5"></i> צור
                </button>
                <button onclick="alert('Extend Mode: +10s')" class="bg-zinc-800 px-4 py-3 rounded-xl text-xs">הארכה +10ש'</button>
            </div>
        </section>

        <!-- אזור 4: העלאה -->
        <div class="tool-grid">
            <label class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex flex-col items-center gap-2 active:scale-95 transition-transform cursor-pointer">
                <i data-lucide="image" class="text-purple-400"></i>
                <span class="text-xs">גלריה</span>
                <input type="file" id="fileInp" class="hidden" onchange="handleUpload(event)">
            </label>
            <label class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex flex-col items-center gap-2 active:scale-95 transition-transform cursor-pointer">
                <i data-lucide="camera" class="text-purple-400"></i>
                <span class="text-xs">מצלמה</span>
                <input type="file" class="hidden" capture="environment" accept="image/*" onchange="handleUpload(event)">
            </label>
        </div>

        <!-- פונקציות עריכה (הכפתורים שביקשת) -->
        <div class="space-y-3">
            <button onclick="toggleTools('filters')" class="w-full bg-zinc-900 p-4 rounded-xl flex justify-between items-center border border-zinc-800">
                <span class="flex items-center gap-2"><i data-lucide="palette" class="w-4 h-4"></i> פילטרים (שחור-לבן, מסך ירוק...)</span>
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
            </button>
            <button onclick="toggleTools('effects')" class="w-full bg-zinc-900 p-4 rounded-xl flex justify-between items-center border border-zinc-800">
                <span class="flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> עורך אפקטים (אש, גשם, מים...)</span>
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
            </button>
            <button onclick="alert('Voice Cloning Mode Active - Record 5s')" class="w-full bg-zinc-900 p-4 rounded-xl flex justify-between items-center border border-zinc-800">
                <span class="flex items-center gap-2"><i data-lucide="mic" class="w-4 h-4"></i> שיבוט קולי (Voice Clone)</span>
                <i data-lucide="plus" class="w-4 h-4"></i>
            </button>
            <button onclick="alert('Lip Sync Mode: Select Audio File')" class="w-full bg-zinc-900 p-4 rounded-xl flex justify-between items-center border border-zinc-800">
                <span class="flex items-center gap-2"><i data-lucide="languages" class="w-4 h-4"></i> סנכרון שפתיים (Lip-Sync)</span>
                <i data-lucide="plus" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- אזור 7: ספרייה אישית -->
        <section>
            <h3 class="font-bold text-sm mb-3">היצירות שלי</h3>
            <div id="library" class="grid grid-cols-3 gap-2">
                <!-- יצירות יתווספו כאן -->
                <div class="aspect-square bg-zinc-900 rounded-lg flex items-center justify-center border border-zinc-800 opacity-20">
                    <i data-lucide="plus"></i>
                </div>
            </div>
        </section>
    </main>

    <!-- אזור 6: ייצוא קבוע למטה -->
    <footer class="fixed bottom-0 w-full glass border-t border-zinc-800 p-4 flex gap-2">
        <button onclick="downloadMedia()" class="flex-1 bg-green-600 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
            <i data-lucide="download" class="w-5 h-5"></i> הורד למכשיר
        </button>
        <button onclick="shareToWhatsApp()" class="bg-[#25D366] px-4 rounded-xl flex items-center justify-center">
            <i data-lucide="share-2" class="w-6 h-6"></i>
        </button>
    </footer>

    <script>
        lucide.createIcons();

        // לוגיקה של AI ורינדור
        async function generateAI() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return alert("אנא הזן תיאור");

            const loader = document.getElementById('aiLoader');
            const loaderPercent = document.getElementById('loaderPercent');
            const mainImage = document.getElementById('mainImage');
            const placeholder = document.getElementById('mediaPlaceholder');

            loader.classList.remove('hidden');
            let p = 0;
            const timer = setInterval(() => {
                p += Math.floor(Math.random() * 10);
                if (p > 95) clearInterval(timer);
                loaderPercent.innerText = p + "%";
            }, 200);

            try {
                const seed = Math.floor(Math.random() * 100000);
                // שימוש במנוע חזק יותר
                const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=1920&seed=${seed}&model=flux&nologo=true`;
                
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = url;
                img.onload = () => {
                    clearInterval(timer);
                    loaderPercent.innerText = "100%";
                    setTimeout(() => {
                        mainImage.src = url;
                        mainImage.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                        loader.classList.add('hidden');
                        addToLibrary(url);
                    }, 500);
                };
            } catch (err) {
                alert("שגיאת שרת AI. נסה שוב.");
                loader.classList.add('hidden');
            }
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const mainImage = document.getElementById('mainImage');
            const mainVideo = document.getElementById('mainVideo');
            const placeholder = document.getElementById('mediaPlaceholder');

            placeholder.classList.add('hidden');
            if (file.type.startsWith('image')) {
                mainImage.src = url;
                mainImage.classList.remove('hidden');
                mainVideo.classList.add('hidden');
            } else {
                mainVideo.src = url;
                mainVideo.classList.remove('hidden');
                mainImage.classList.add('hidden');
            }
        }

        function addToLibrary(url) {
            const lib = document.getElementById('library');
            const div = document.createElement('div');
            div.className = "aspect-square bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800 relative group";
            div.innerHTML = `<img src="${url}" class="w-full h-full object-cover">
                             <div class="absolute top-1 right-1 bg-black/50 p-1 rounded" onclick="this.parentElement.remove()">
                                <i data-lucide="trash-2" class="w-3 h-3 text-red-500"></i>
                             </div>`;
            lib.prepend(div);
            lucide.createIcons();
        }

        function randomPrompt() {
            const prompts = ["Neon samurai in future Tokyo", "Golden eagle flying over mountains 4k", "Cyberpunk workspace with hologram", "Cute robot cooking pasta"];
            document.getElementById('promptInput').value = prompts[Math.floor(Math.random() * prompts.length)];
        }

        function downloadMedia() {
            const img = document.getElementById('mainImage');
            if (!img.src) return alert("אין תוכן לשמירה");
            const link = document.createElement('a');
            link.href = img.src;
            link.download = "YanivAI_Studio.png";
            link.click();
        }

        function shareToWhatsApp() {
            const url = window.location.href;
            window.open(`https://wa.me/?text=ראה מה יצרתי בסטודיו AI של יניב: ${url}`, '_blank');
        }

        // פקדי וידאו
        function togglePlay() {
            const vid = document.getElementById('mainVideo');
            if (vid.classList.contains('hidden')) return;
            vid.paused ? vid.play() : vid.pause();
        }
        function seek(s) {
            const vid = document.getElementById('mainVideo');
            if (!vid.classList.contains('hidden')) vid.currentTime += s;
        }
    </script>
</body>
</html>
