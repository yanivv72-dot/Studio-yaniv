<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #7C3AED; --bg: #0A0A0B; --panel: #161618; }
        body { background-color: var(--bg); color: white; font-family: system-ui, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* אזור 1: נגן קבוע (30%) */
        .player-fixed { height: 30dvh; background: #000; position: relative; border-bottom: 2px solid #1A1A1D; flex-shrink: 0; }
        
        /* אזור 2: פס תחבורה (צורות מעוצבות) */
        .transport-bar { height: 75px; background: #111; display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid #222; flex-shrink: 0; }
        
        /* אזור 3: גוף האפליקציה נגלל (ללא הסתרות) */
        .main-scroll { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 30px; }

        .btn-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #1A1A1D; transition: 0.2s; border: 1px solid #333; }
        .btn-circle:active { background: var(--accent); transform: scale(0.9); }
        .render-text { font-size: 5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px rgba(124,58,237,0.5); }
    </style>
</head>
<body>

    <!-- אזור 1: הנגן המרכזי -->
    <div class="player-fixed flex items-center justify-center overflow-hidden">
        <div id="placeholder" class="opacity-30 flex flex-col items-center">
            <i data-lucide="monitor-play" class="w-12 h-12 mb-1 text-purple-500"></i>
            <span class="text-[10px] font-bold">4K ENGINE READY</span>
        </div>
        <img id="viewImg" class="hidden w-full h-full object-contain">
        <video id="viewVid" class="hidden w-full h-full object-contain" playsinline loop></video>

        <!-- מנדול 1-100% -->
        <div id="loader" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-[110]">
            <div id="p-label" class="render-text">0%</div>
            <div class="text-[10px] text-zinc-500 mt-2 font-bold">Cloud Rendering...</div>
        </div>
        
        <!-- סרגל זמן דק -->
        <div class="absolute bottom-0 w-full h-1 bg-zinc-800"><div id="timeFill" class="h-full bg-purple-500 w-0"></div></div>
    </div>

    <!-- אזור 2: פס תחבורה עם כפתורים מעוצבים -->
    <div class="transport-bar">
        <button onclick="control('start')" class="btn-circle" title="התחל"><i data-lucide="skip-back" class="w-5 h-5"></i></button>
        <button onclick="control('back')" class="btn-circle" title="-2 שניות"><i data-lucide="rewind" class="w-5 h-5"></i></button>
        <button onclick="control('play')" class="btn-circle bg-purple-600 border-none scale-110 shadow-lg shadow-purple-900/40"><i data-lucide="play" class="w-6 h-6 fill-current"></i></button>
        <button onclick="control('forward')" class="btn-circle" title="+2 שניות"><i data-lucide="fast-forward" class="w-5 h-5"></i></button>
        <button onclick="control('stop')" class="btn-circle border-red-900/50" title="עצור"><i data-lucide="square" class="w-4 h-4 fill-red-500 text-red-500"></i></button>
    </div>

    <!-- אזור 3: ממשק עבודה נגלל -->
    <div class="main-scroll space-y-5">
        
        <!-- תיבת יצירה -->
        <div class="bg-[#161618] p-4 rounded-3xl border border-zinc-800">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-bold text-purple-400">AI PROMPT STUDIO</span>
                <button onclick="random()" class="text-[10px] bg-zinc-900 px-3 py-1 rounded-full">🎲 הפתע אותי</button>
            </div>
            <textarea id="prompt" placeholder="מה ה-AI יצור עבורך היום?" class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-sm h-24 mb-3 outline-none focus:border-purple-500 text-right"></textarea>
            <div class="flex gap-2">
                <button onclick="generate()" class="flex-[3] bg-purple-600 py-4 rounded-2xl font-bold active:scale-95 transition-all">צור יצירה</button>
                <button onclick="alert('Extend Mode Active')" class="flex-1 bg-zinc-900 rounded-2xl text-[10px] border border-zinc-800">הארכה</button>
            </div>
        </div>

        <!-- העלאת מדיה בשורה אחת -->
        <div class="grid grid-cols-3 gap-2">
            <button onclick="pick('img')" class="bg-[#161618] p-4 rounded-2xl border border-zinc-800 flex flex-col ite
