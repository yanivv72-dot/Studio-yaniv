<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio Pro | Master Samsung Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #000000; --panel: #121212; --accent: #7C3AED; --samsung-border: #222222; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* אזור 1: נגן (30%) - Samsung Video Player Style */
        .player-viewport { height: 30dvh; background: #000; position: relative; border-bottom: 1px solid var(--samsung-border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        /* פקדים בתוך הנגן */
        .inner-play-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; position: absolute; z-index: 20; }
        .player-viewport:active .inner-play-btn { opacity: 1; }
        
        /* סרגל זמן סמסונג */
        .samsung-timeline { position: absolute; bottom: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); }
        .timeline-fill { height: 100%; background: #fff; width: 0%; transition: width 0.1s linear; }

        /* אזור 2: פס תחבורה (סמסונג One UI) */
        .transport-bar { height: 80px; background: #000; border-bottom: 1px solid var(--samsung-border); display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; }
        
        /* אזור 3: גוף נגלל */
        .main-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 100px; }

        /* כפתורי סמסונג מעוצבים */
        .s-btn-circle { width: 48px; height: 48px; border-radius: 50%; background: #1A1A1A; display: flex; align-items: center; justify-content: center; border: 1px solid #333; transition: 0.15s; }
        .s-btn-circle:active { transform: scale(0.9); background: #252525; }
        .s-btn-main { width: 56px; height: 56px; background: #fff; color: #000; border: none; box-shadow: 0 4px 20px rgba(255,255,255,0.2); }
        
        .samsung-pill { background: var(--panel); border-radius: 28px; padding: 18px; border: 1px solid var(--samsung-border); }
        .chip { background: #1A1A1A; border-radius: 24px; padding: 12px 20px; font-size: 13px; font-weight: 600; border: 1px solid #333; display: flex; items: center; gap: 10px; }

        /* מנדול */
        .loader-layer { position: absolute; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader-percent { font-size: 5.5rem; font-weight: 900; letter-spacing: -4px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- אזור 1: הנגן המקצועי -->
    <div class="player-viewport" id="viewport">
        <div id="loader" class="loader-layer">
            <div id="p-label" class="loader-percent">0%</div>
            <div class="text-[10px] tracking-[0.3em] font-bold opacity-40 uppercase">Rendering 4K Enterprise</div>
        </div>

        <button onclick="toggleMedia()" class="inner-play-btn" id="v-play-btn"><i data-lucide="play" class="w-8 h-8 fill-white"></i></button>

        <div id="placeholder" class="opacity-10 flex flex-col items-center">
            <i data-lucide="monitor-play" class="w-16 h-16 mb-2"></i>
            <span class="text-[10px] font-bold tracking-widest uppercase">Engine V6.1 Pro</span>
        </div>

        <img id="v-img" class="hidden w-full h-full object-contain">
        <video id="v-vid" class="hidden w-full h-full object-contain" playsinline loop></video>
        <div id="v-txt" class="hidden p-8 text-sm text-right overflow-y-auto max-h-full leading-relaxed"></div>

        <div class="samsung-timeline"><div id="t-bar" class="timeline-fill"></div></div>
    </div>

    <!-- אזור 2: פס תחבורה סמסונג המקורי -->
    <div class="transport-bar">
        <button onclick="ctrl('start')" class="s-btn-circle" title="התחל"><i data-lucide="skip-back"></i></button>
        <button onclick="ctrl('back')" class="s-btn-circle" title="-2ש'"><i data-lucide="rewind"></i></button>
        <button onclick="toggleMedia()" class="s-btn-circle s-btn-main"><i data-lucide="play" id="playIcon" class="fill-current"></i></button>
        <button onclick="ctrl('forward')" class="s-btn-circle" title="+2ש'"><i data-lucide="fast-forward"></i></button>
        <button onclick="ctrl('stop')" class="s-btn-circle text-red-500 border-red-900/20"><i data-lucide="square" class="fill-current"></i></button>
    </div>

    <!-- אזור 3: גוף נגלל ללא הסתרה -->
    <div class="main-scroll" dir="rtl">
        
        <input type="password" id="apiKey" placeholder="הכנס מפתח API (נשמר)..." oninput="saveKey()" 
               class="text-[10px] text-zinc-700 bg-transparent border-none outline-none text-left px-2 font-mono">

        <!-- כרטיס יצירה (Enterprise) -->
        <div class="samsung-pill">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-purple-500 uppercase tracking-widest">Master AI Generator</span>
                <button onclick="surpriseMe()" class="chip !py-1 !px-4 text-[10px]">🎲 הפתע אותי</button>
            </div>
            <textarea id="prompt" placeholder="תאר את הויז'ן שלך כאן..." class="w-full bg-transparent border-none outline-none text-lg text-white text-right resize-none mb-6 min-h-[100px]"></textarea>
            <div class="flex gap-3">
                <button onclick="runMedia()" class="flex-1 bg-white text-black py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-xl">צור יצירה</button>
                <button onclick="runText()" class="flex-1 bg-[#1A1A1A] text-white py-4 rounded-2xl font-bold border border-zinc-800 active:scale-95 transition-all">שאל AI</button>
            </div>
        </div>

        <!-- העלאת מדיה (3 כפתורים בשורה - Samsung Gallery Style) -->
        <div class="grid grid-cols-3 gap-2">
            <button onclick="pick('image/*')" class="chip flex-col py-4 h-auto gap-2">
                <i data-lucide="image" class="text-blue-500"></i><span class="text-[11px]">תמונה</span>
            </button>
            <button onclick="pick('video/*')" class="chip flex-col py-4 h-auto gap-2">
                <i data-lucide="video" class="text-red-500"></i><span class="text-[11px]">סרטון</span>
            </button>
            <button onclick="openRealCam()" class="chip flex-col py-4 h-auto gap-2 border-purple-900/30">
                <i data-lucide="camera" class="text-green-500"></i><span class="text-[11px]">מצלמה</span>
            </button>
        </div>

        <!-- פונקציות מתקדמות -->
        <div class="space-y-3">
            <button onclick="openModal('voice-modal')" class="w-full samsung-pill !py-5 flex justify-between items-center">
                <div class="flex items-center gap-4"><i data-lucide="mic" class="text-purple-500"></i><span class="text-sm font-bold">שיבוט קולי (Voice Clone)</span></div>
                <i data-lucide="plus" class="w-4 h-4 opacity-20"></i>
            </button>
            <button onclick="alert('Lip Sync Active')" class="w-full samsung-pill !py-5 flex justify-between items-center opacity-60">
                <div class="flex items-center gap-4"><i data-lucide="languages" class="text-purple-500"></i><span class="text-sm font-bold">סנכרון שפתיים (Lip-Sync)</span></div>
                <i data-lucide="plus" class="w-4 h-4 opacity-20"></i>
            </button>
            <button onclick="alert('Filter Engine Ready')" class="w-full samsung-pill !py-5 flex justify-between items-center">
                <div class="flex items-center gap-4"><i data-lucide="palette" class="text-purple-500"></i><span class="text-sm font-bold">פילטרים ומניפת צבעים</span></div>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-20"></i>
            </button>
        </div>

        <button onclick="download()" class="w-full bg-white text-black py-5 rounded-[32px] font-black text-xs uppercase tracking-widest active:scale-95 shadow-2xl transition-all mt-4">
            Download 4K Result
        </button>
    </div>

    <!-- מודל שיבוט קול -->
    <div id="voice-modal" class="modal">
        <div class="bg-zinc-900 border border-zinc-800 p-10 rounded-[40px] w-full max-w-xs text-center shadow-2xl">
            <h2 class="font-bold mb-4 uppercase tracking-tighter">Voice Clone Gen-4</h2>
            <div id="v-timer" class="text-6xl font-black text-white mb-8">05:00</div>
            <div class="space-y-4">
                <button id="r-btn" onclick="startRec()" class="w-full bg-red-600 py-4 rounded-2xl font-bold">התחל הקלטה</button>
                <div id="r-done" class="hidden space-y-3">
                    <button onclick="new Audio(audioUrl).play()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold flex items-center justify-center gap-2"><i data-lucide="play" class="w-4 h-4"></i> שמע</button>
                    <button onclick="alert('Cloned!'); closeModal()" class="w-full bg-white text-black py-3 rounded-xl font-bold">אשר ושבט</button>
                </div>
                <button onclick="closeModal()" class="text-xs opacity-30 pt-4 block w-full">ביטול</button>
            </div>
        </div>
    </div>

    <input type="file" id="fInp" class="hidden" onchange="handleAsset(event)">
    <input type="file" id="cInp" class="hidden" accept="image/*,video/*" capture="environment" onchange="handleAsset(event)">

    <script>
        lucide.createIcons();
        const vImg = document.getElementById('v-img'), vVid = document.getElementById('v-vid'), vTxt = document.getElementById('v-txt');
        const ldr = document.getElementById('loader'), plbl = document.getElementById('p-label');
        let audioUrl, mediaRecorder, audioChunks = [];

        window.onload = () => { const k = localStorage.getItem('api_ma
