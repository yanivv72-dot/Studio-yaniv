<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מחולל וידאו AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: #0b0f19;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* אפקט טשטוש ותנועה לכל האפליקציה בזמן עיבוד */
    .app-container {
      width: 100%;
      max-width: 420px;
      background-color: #121824;
      border: 1px solid #1e293b;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 95vh;
      overflow-y: auto;
      transition: transform 0.4s ease, filter 0.4s ease, opacity 0.4s ease;
    }

    .app-container.app-blur-effect {
      filter: blur(8px) brightness(0.7);
      transform: scale(0.97) translateY(-4px);
      pointer-events: none;
      user-select: none;
    }

    /* Header Design */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }

    .user-profile {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    header h1 {
      font-size: 1.25rem;
      color: #f8fafc;
      font-weight: 600;
    }

    .settings-btn {
      color: #94a3b8;
      font-size: 1.3rem;
      cursor: pointer;
      transition: color 0.2s, transform 0.2s;
    }

    .settings-btn:hover {
      color: #22d3ee;
      transform: rotate(30deg);
    }

    /* Hidden API Key Section */
    .api-key-container {
      display: none;
      background: #0d131f;
      border: 1px solid #0284c7;
      border-radius: 12px;
      padding: 10px;
      margin-top: -6px;
      flex-direction: column;
      gap: 6px;
    }

    .api-key-container.active {
      display: flex;
    }

    .api-key-container label {
      font-size: 0.75rem;
      color: #22d3ee;
    }

    .api-key-container input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      outline: none;
    }

    /* Video / Preview Container (Sticky) */
    .preview-card {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #090d16;
      border: 1.5px solid #22d3ee;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preview-header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 4px;
    }

    .delete-media-btn {
      background: #ef444422;
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .delete-media-btn:hover {
      background: #ef4444;
      color: #fff;
    }

    .preview-screen {
      width: 100%;
      height: 220px;
      background-color: #000000;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: height 0.3s, filter 0.3s;
    }

    /* התאמת התמונה והסרטון לאורך ולרוחב הפריים ללא מתיחה */
    .preview-screen img,
    .preview-screen video {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      transition: filter 0.3s;
    }

    /* AI Loading Overlay */
    .ai-loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(30, 41, 59, 0.75);
      backdrop-filter: blur(8px) grayscale(100%);
      -webkit-backdrop-filter: blur(8px) grayscale(100%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 20;
      border-radius: 10px;
    }

    .ai-loading-overlay.active {
      display: flex;
    }

    .sparkles-container {
      font-size: 2.2rem;
      animation: sparkleAnim 1.2s infinite alternate ease-in-out;
    }

    @keyframes sparkleAnim {
      0% { transform: scale(0.8) rotate(-10deg); opacity: 0.6; }
      100% { transform: scale(1.2) rotate(15deg); opacity: 1; filter: drop-shadow(0 0 10px #22d3ee); }
    }

    .ai-loading-text {
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      text-align: center;
    }

    /* Play/Pause Overlay Button */
    .samsung-play-btn {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(15, 23, 42, 0.75);
      border: 2px solid #22d3ee;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 1.3rem;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
      transition: opacity 0.3s, transform 0.2s;
      z-index: 10;
      pointer-events: none;
    }

    .preview-screen.playing .samsung-play-btn {
      opacity: 0;
    }

    .preview-screen:hover .samsung-play-btn {
      opacity: 1;
    }

    .placeholder-text {
      color: #475569;
      font-size: 0.9rem;
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      padding: 6px 0;
      cursor: pointer;
      transition: opacity 0.4s ease;
      touch-action: none;
    }

    .preview-card.is-playing .progress-container {
      opacity: 0;
    }

    .preview-card.is-playing:hover .progress-container {
      opacity: 1;
    }

    .progress-bar-thick {
      width: 100%;
      height: 10px;
      background: #1e293b;
      border-radius: 5px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #0284c7, #22d3ee);
      border-radius: 5px;
      transition: width 0.1s linear;
    }

    /* Player Controls */
    .player-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-buttons {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-top: 2px;
      direction: rtl;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
    }

    .ctrl-btn span.icon {
      font-size: 1rem;
    }

    .ctrl-btn:hover {
      color: #22d3ee;
    }

    /* Section Labels */
    .section-title {
      font-size: 0.8rem;
      color: #22d3ee;
      margin-bottom: 6px;
      font-weight: 600;
    }

    /* Aspect Ratio Selector */
    .size-selector-container {
      background: #0d131f;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 10px;
    }

    .size-buttons-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .size-btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
      padding: 6px 0;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      text-align: center;
    }

    .size-btn.active {
      background: #0284c7;
      border-color: #22d3ee;
      color: #fff;
    }

    /* Movie Styles / Genres */
    .genre-selector-container {
      background: #0d131f;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 10px;
    }

    .genre-grid {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 4px;
    }

    .genre-btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .genre-btn.active {
      background: #a855f7;
      border-color: #c084fc;
      color: #fff;
    }

    /* AI Prompt Box */
    .prompt-box {
      background: #0d131f;
      border: 1.5px solid #06b6d4;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prompt-box textarea {
      width: 100%;
      height: 55px;
      background: transparent;
      border: none;
      color: #f8fafc;
      resize: none;
      outline: none;
      font-size: 0.85rem;
    }

    .surprise-btn {
      align-self: flex-end;
      background: #22d3ee;
      color: #0f172a;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Media Selector Buttons */
    .media-type-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      direction: rtl;
    }

    .media-type-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px;
      color: #cbd5e1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .media-type-btn input {
      display: none;
    }

    /* Camera Submenu */
    .camera-options-menu {
      display: none;
      background: #0d131f;
      border: 1px solid #22d3ee;
      border-radius: 12px;
      padding: 10px;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .camera-options-menu.active {
      display: grid;
    }

    .cam-opt-btn {
      background: #1e293b;
      color: #38bdf8;
      border: 1px solid #0284c7;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Filters Section */
    .filters-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0d131f;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #1e293b;
    }

    .filters-grid {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 6px;
    }

    .filter-btn {
      background-color: #1e293b;
      color: #f1f5f9;
      border: 1px solid #334155;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn.active {
      border-color: #22d3ee;
      background-color: #0284c7;
    }

    .intensity-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .intensity-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .intensity-slider {
      width: 100%;
      accent-color: #22d3ee;
      cursor: pointer;
    }

    /* Create Edit Button Container & Status Message */
    .create-edit-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-create-edit {
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      color: #ffffff;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn-create-edit:active {
      transform: scale(0.98);
    }

    .edit-status-msg {
      display: none;
      font-size: 0.8rem;
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid #22c55e;
      padding: 8px 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
    }

    /* Action Buttons */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-main {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-download-main {
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-share-main {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    /* Gallery Section */
    .gallery-section {
      margin-top: 10px;
      border-top: 1px solid #1e293b;
      padding-top: 12px;
    }

    .gallery-section h3 {
      font-size: 0.9rem;
      color: #22d3ee;
      margin-bottom: 10px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .gallery-item {
      background-color: #0d131f;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 1px solid #1e293b;
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 90px;
      object-fit: contain;
      border-radius: 6px;
      background-color: #000;
    }

    .gallery-actions {
      display: flex;
      gap: 4px;
    }

    .btn-action {
      flex: 1;
      padding: 4px;
      font-size: 0.7rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-action-download { background-color: #10b981; color: #fff; }
    .btn-action-delete { background-color: #ef4444; color: #fff; }

    .filters-grid::-webkit-scrollbar, .genre-grid::-webkit-scrollbar { height: 4px; }
    .filters-grid::-webkit-scrollbar-thumb, .genre-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="app-container" id="app-container">
    <!-- Header -->
    <header>
      <div class="user-profile">👤</div>
      <h1>מחולל וידאו AI</h1>
      <div class="settings-btn" id="settings-btn">⚙️</div>
    </header>

    <!-- Hidden API Key Box -->
    <div class="api-key-container" id="api-key-container">
      <label for="api-key">מפתח API:</label>
      <input type="password" id="api-key" placeholder="sk-...">
    </div>

    <!-- Preview Container -->
    <div class="preview-card" id="preview-card">
      <div class="preview-header-actions">
        <span style="font-size:0.75rem; color:#64748b;">תצוגה מקדימה</span>
        <button class="delete-media-btn" id="delete-top-btn">🗑️ מחק מדיה</button>
      </div>

      <div class="preview-screen" id="preview-screen">
        <!-- AI Processing Overlay -->
        <div class="ai-loading-overlay" id="ai-loading-overlay">
          <div class="sparkles-container">✨✨⭐</div>
          <div class="ai-loading-text">מעבד עריכת AI...</div>
        </div>

        <div class="samsung-play-btn" id="samsung-play-icon">▶</div>
        <span class="placeholder-text" id="placeholder-text">אין מדיה מוצגת</span>
      </div>
      
      <!-- Video Player Controls -->
      <div class="player-controls">
        <div class="progress-container" id="progress-container">
          <div class="progress-bar-thick">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="control-buttons">
          <button class="ctrl-btn" id="btn-forward"><span class="icon">►►</span>קדימה</button>
          <button class="ctrl-btn" id="btn-play"><span class="icon">▶</span>התחל</button>
          <button class="ctrl-btn" id="btn-pause"><span class="icon">❚❚</span>השהה</button>
          <button class="ctrl-btn" id="btn-stop"><span class="icon">◼</span>עצור</button>
          <button class="ctrl-btn" id="btn-rewind"><span class="icon">◄◄</span>אחורה</button>
        </div>
      </div>
    </div>

    <!-- Aspect Ratio Selector -->
    <div class="size-selector-container">
      <div class="section-title">📐 גודל פריים / יחס תצוגה:</div>
      <div class="size-buttons-grid">
        <button class="size-btn active" data-height="220px">16:9 🖥️</button>
        <button class="size-btn" data-height="300px">9:16 📱</button>
        <button class="size-btn" data-height="250px">1:1 ⏹️</button>
        <button class="size-btn" data-height="240px">4:3 📺</button>
      </div>
    </div>

    <!-- Movie Types / Genres Selector -->
    <div class="genre-selector-container">
      <div class="section-title">🎬 סגנון קולנועי:</div>
      <div class="genre-grid">
        <button class="genre-btn active">💥 אקשן דרמטי</button>
        <button class="genre-btn">🚀 מדע בדיוני</button>
        <button class="genre-btn">🎨 אנימציה 3D</button>
        <button class="genre-btn">🎙️ דוקומנטרי</button>
        <button class="genre-btn">🧙‍♂️ פנטזיה</button>
      </div>
    </div>

    <!-- AI Prompt Box -->
    <div class="prompt-box">
      <textarea id="ai-prompt" placeholder="תאר את הסרטון שלך כאן..."></textarea>
      <button class="surprise-btn" id="surprise-btn">הפתע אותי 🪄</button>
    </div>

    <!-- Media Source Selector -->
    <div class="media-type-selector">
      <label class="media-type-btn">
        🖼️ תמונה
        <input type="file" accept="image/*" id="input-image">
      </label>
      <label class="media-type-btn">
        🎥 סרטון
        <input type="file" accept="video/*" id="input-video">
      </label>
      <button class="media-type-btn" id="cam-toggle-btn" type="button">
        📷 מצלמה
      </button>
    </div>

    <!-- Camera Choice Submenu -->
    <div class="camera-options-menu" id="camera-options-menu">
      <label class="cam-opt-btn">
        📷 צלם תמונה
        <input type="file" accept="image/*" capture="environment" id="input-camera-photo" style="display:none;">
      </label>
      <label class="cam-opt-btn">
        🎥 צלם סרטון
        <input type="file" accept="video/*" capture="environment" id="input-camera-video" style="display:none;">
      </label>
    </div>

    <!-- Filters Section -->
    <div class="filters-container">
      <div class="section-title">🎨 אפקטים ופילטרים:</div>
      <div class="filters-grid" id="filters-grid">
        <button class="filter-btn active" data-filter="none">ללא פילטר</button>
        <button class="filter-btn" data-filter="golden-hour">🌅 שעת הזהב</button>
        <button class="filter-btn" data-filter="bw-dramatic">🎬 שחור-לבן דרמטי</button>
        <button class="filter-btn" data-filter="cyberpunk">⚡ סייברפאנק</button>
        <button class="filter-btn" data-filter="emerald-night">🌃 ליל אזמרגד</button>
        <button class="filter-btn" data-filter="vintage">📜 וינטג' קלאסי</button>
        <button class="filter-btn" data-filter="infrared">🔴 אינפרא-אדום</button>

        <button class="filter-btn" data-filter="invert">🔄 נגטיב</button>
        <button class="filter-btn" data-filter="blur">🌫️ טשטוש</button>
        <button class="filter-btn" data-filter="high-contrast">🌓 קונטרסט גבוה</button>
        <button class="filter-btn" data-filter="thermal">🔥 מצלמה תרמית</button>
      </div>

      <div class="intensity-container">
        <div class="intensity-header">
          <span>עוצמת פילטר:</span>
          <span id="intensity-value">100%</span>
        </div>
        <input type="range" id="intensity-slider" class="intensity-slider" min="1" max="100" value="100">
      </div>
    </div>

    <!-- Create Edit Button & Status Message -->
    <div class="create-edit-wrapper">
      <button class="btn-create-edit" id="btn-create-edit">✨ צור עריכה</button>
      <div class="edit-status-msg" id="edit-status-msg">
        העריכה מוכנה! לחץ על "הורדה" כדי לשמור במכשיר. ✅
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn-main btn-download-main" id="download-btn">⬇ הורדה</button>
      <button class="btn-main btn-share-main" id="share-btn">🔗 שיתוף</button>
    </div>

    <!-- Processed Media Gallery -->
    <div class="gallery-section">
      <h3>תיקיית מדיה ערוכה</h3>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </div>

  <script>
    const appContainer = document.getElementById('app-container');
    const settingsBtn = document.getElementById('settings-btn');
    const apiKeyContainer = document.getElementById('api-key-container');
    const previewCard = document.getElementById('preview-card');
    const previewScreen = document.getElementById('preview-screen');
    const samsungPlayIcon = document.getElementById('samsung-play-icon');
    const placeholderText = document.getElementById('placeholder-text');
    const deleteTopBtn = document.getElementById('delete-top-btn');
    const aiLoadingOverlay = document.getElementById('ai-loading-overlay');
    
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    
    const filterButtons = document.querySelectorAll('.filter-btn');
    const sizeButtons = document.querySelectorAll('.size-btn');
    const genreButtons = document.querySelectorAll('.genre-btn');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityValue = document.getElementById('intensity-value');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    const btnCreateEdit = document.getElementById('btn-create-edit');
    const editStatusMsg = document.getElementById('edit-status-msg');
    const galleryGrid = document.getElementById('gallery-grid');
    const surpriseBtn = document.getElementById('surprise-btn');
    const aiPrompt = document.getElementById('ai-prompt');

    const camToggleBtn = document.getElementById('cam-toggle-btn');
    const cameraOptionsMenu = document.getElementById('camera-options-menu');

    let currentMedia = null;
    let mediaType = null;
    let fileName = 'edited_media';
    let selectedFilter = 'none';
    let filterIntensity = 100;
    let isDraggingProgress = false;
    let lastProcessedBlob = null;

    // Toggle Camera Menu
    camToggleBtn.addEventListener('click', () => {
      cameraOptionsMenu.classList.toggle('active');
    });

    // Toggle API Key Input
    settingsBtn.addEventListener('click', () => {
      apiKeyContainer.classList.toggle('active');
    });

    // Handle Frame Height Adjustment
    sizeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        sizeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        previewScreen.style.height = btn.dataset.height;
      });
    });

    // Handle Movie Genres
    genreButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        genreButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // AI Prompts Generator
    const prompts = [
      "אריה רץ בסוואנה בשעת השקיעה",
      "עיר עתידנית בלילה עם אורות ניאון",
      "חללית חוצה גלקסיה צבעונית",
      "נוף מושלג באלפים בשעת זריחה"
    ];

    surpriseBtn.addEventListener('click', () => {
      aiPrompt.value = prompts[Math.floor(Math.random() * prompts.length)];
    });

    // Handle File Uploads & Camera Captures
    ['input-video', 'input-image', 'input-camera-photo', 'input-camera-video'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        cameraOptionsMenu.classList.remove('active');
        fileName = file.name;
        const fileUrl = URL.createObjectURL(file);
        clearPreview();

        if (file.type.startsWith('image/')) {
          mediaType = 'image';
          currentMedia = document.createElement('img');
          currentMedia.src = fileUrl;
        } else if (file.type.startsWith('video/')) {
          mediaType = 'video';
          currentMedia = document.createElement('video');
          currentMedia.src = fileUrl;
          currentMedia.controls = false;
          currentMedia.autoplay = true;
          currentMedia.loop = true;
          currentMedia.playsInline = true;

          currentMedia.addEventListener('timeupdate', updateProgressBar);
          currentMedia.addEventListener('play', () => {
            previewCard.classList.add('is-playing');
            previewScreen.classList.add('playing');
            samsungPlayIcon.textContent = '❚❚';
          });
          currentMedia.addEventListener('pause', () => {
            previewCard.classList.remove('is-playing');
            previewScreen.classList.remove('playing');
            samsungPlayIcon.textContent = '▶';
          });
        }

        placeholderText.style.display = 'none';
        previewScreen.appendChild(currentMedia);
        applyFilter();
      });
    });

    // Clear Preview State
    function clearPreview() {
      if (currentMedia) {
        if (mediaType === 'video') {
          currentMedia.pause();
          currentMedia.removeAttribute('src');
          currentMedia.load();
        }
        currentMedia.remove();
        currentMedia = null;
      }
      previewScreen.innerHTML = '';
      previewScreen.appendChild(aiLoadingOverlay);
      previewScreen.appendChild(samsungPlayIcon);
      previewScreen.appendChild(placeholderText);
      placeholderText.style.display = 'block';
      progressFill.style.width = '0%';
      previewCard.classList.remove('is-playing');
      previewScreen.classList.remove('playing');
      samsungPlayIcon.textContent = '▶';
      editStatusMsg.style.display = 'none';
      lastProcessedBlob = null;
    }

    deleteTopBtn.addEventListener('click', clearPreview);

    // Play/Pause Tap Action
    previewScreen.addEventListener('click', (e) => {
      if (e.target === deleteTopBtn || e.target.closest('.delete-media-btn')) return;
      if (!currentMedia || mediaType !== 'video') return;
      if (currentMedia.paused) {
        currentMedia.play();
      } else {
        currentMedia.pause();
      }
    });

    // Media Control Actions
    document.getElementById('btn-play').onclick = () => currentMedia && currentMedia.play && currentMedia.play();
    document.getElementById('btn-pause').onclick = () => currentMedia && currentMedia.pause && currentMedia.pause();
    document.getElementById('btn-stop').onclick = () => {
      if (currentMedia && currentMedia.pause) {
        currentMedia.pause();
        currentMedia.currentTime = 0;
      }
    };
    document.getElementById('btn-forward').onclick = () => {
      if (currentMedia && mediaType === 'video') currentMedia.currentTime += 5;
    };
    document.getElementById('btn-rewind').onclick = () => {
      if (currentMedia && mediaType === 'video') currentMedia.currentTime -= 5;
    };

    // Progress Bar Handling
    function updateProgressBar() {
      if (!currentMedia || isDraggingProgress || !currentMedia.duration) return;
      const pct = (currentMedia.currentTime / currentMedia.duration) * 100;
      progressFill.style.width = `${pct}%`;
    }

    function seekMedia(e) {
      if (!currentMedia || mediaType !== 'video' || !currentMedia.duration) return;
      const rect = progressContainer.getBoundingClientRect();
      const clickX = e.clientX || (e.touches && e.touches[0].clientX);
      
      let posX = rect.right - clickX;
      posX = Math.max(0, Math.min(posX, rect.width));
      const percentage = posX / rect.width;
      
      currentMedia.currentTime = percentage * currentMedia.duration;
      progressFill.style.width = `${percentage * 100}%`;
    }

    progressContainer.addEventListener('mousedown', (e) => { isDraggingProgress = true; seekMedia(e); });
    window.addEventListener('mousemove', (e) => { if (isDraggingProgress) seekMedia(e); });
    window.addEventListener('mouseup', () => { isDraggingProgress = false; });

    progressContainer.addEventListener('touchstart', (e) => { isDraggingProgress = true; seekMedia(e); });
    window.addEventListener('touchmove', (e) => { if (isDraggingProgress) seekMedia(e); });
    window.addEventListener('touchend', () => { isDraggingProgress = false; });

    // Filter Selection and Intensity
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    intensitySlider.addEventListener('input', (e) => {
      filterIntensity = e.target.value;
      intensityValue.textContent = `${filterIntensity}%`;
      applyFilter();
    });

    // Unique CSS Filter Calculations
    function getCSSFilterString() {
      if (selectedFilter === 'none') return 'none';
      const f = filterIntensity / 100;

      switch (selectedFilter) {
        case 'golden-hour': return `sepia(${0.5 * f}) saturate(${1 + 0.8 * f}) brightness(${1 + 0.1 * f})`;
        case 'bw-dramatic': return `grayscale(${f}) contrast(${1 + 1.5 * f})`;
        case 'cyberpunk': return `hue-rotate(${180 * f}deg) saturate(${1 + 2 * f})`;
        case 'emerald-night': return `hue-rotate(${100 * f}deg) saturate(${1 + 1.2 * f}) brightness(${1 - 0.2 * f})`;
        case 'vintage': return `sepia(${0.6 * f}) contrast(${1 - 0.1 * f})`;
        case 'infrared': return `invert(${0.9 * f}) hue-rotate(${170 * f}deg) saturate(${1 + 2 * f})`;
        case 'invert': return `invert(${f})`;
        case 'blur': return `blur(${4 * f}px)`;
        case 'high-contrast': return `contrast(${1 + f})`;
        case 'thermal': return `invert(${f}) hue-rotate(${120 * f}deg) saturate(${1 + 2 * f})`;
        default: return 'none';
      }
    }

    function applyFilter() {
      if (currentMedia) {
        currentMedia.style.filter = getCSSFilterString();
      }
    }

    // Export Processing Engine
    async function createProcessedBlob() {
      if (!currentMedia) return null;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      if (mediaType === 'image') {
        canvas.width = currentMedia.naturalWidth || 800;
        canvas.height = currentMedia.naturalHeight || 600;

        ctx.filter = getCSSFilterString();
        ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);

        return new Promise(resolve => {
          canvas.toBlob(blob => resolve({ blob, type: 'image', extension: 'png', mime: 'image/png' }), 'image/png');
        });
      } else if (mediaType === 'video') {
        canvas.width = currentMedia.videoWidth || 640;
        canvas.height = currentMedia.videoHeight || 360;

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);

        return new Promise(resolve => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            resolve({ blob, type: 'video', extension: 'webm', mime: 'video/webm' });
          };

          currentMedia.currentTime = 0;
          currentMedia.play();
          recorder.start();

          const renderFrame = () => {
            if (currentMedia.ended || currentMedia.paused) {
              recorder.stop();
              return;
            }
            ctx.filter = getCSSFilterString();
            ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderFrame);
          };
          renderFrame();
        });
      }
    }

    function saveFileToDevice(blob, filename) {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function addItemToFolder(blobData) {
      const url = URL.createObjectURL(blobData.blob);
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const mediaEl = blobData.type === 'image' ? document.createElement('img') : document.createElement('video');
      mediaEl.src = url;
      if (blobData.type === 'video') mediaEl.controls = true;

      const actions = document.createElement('div');
      actions.className = 'gallery-actions';

      const downloadBtnSmall = document.createElement('button');
      downloadBtnSmall.className = 'btn-action btn-action-download';
      downloadBtnSmall.textContent = 'הורד';
      downloadBtnSmall.onclick = () => saveFileToDevice(blobData.blob, `edited_${Date.now()}.${blobData.extension}`);

      const deleteBtnSmall = document.createElement('button');
      deleteBtnSmall.className = 'btn-action btn-action-delete';
      deleteBtnSmall.textContent = 'מחק';
      deleteBtnSmall.onclick = () => item.remove();

      actions.appendChild(downloadBtnSmall);
      actions.appendChild(deleteBtnSmall);
      item.appendChild(mediaEl);
      item.appendChild(actions);
      galleryGrid.prepend(item);
    }

    // Button Click: Create Edit (עם אפקט טשטוש ותנועה לכל المسך)
    btnCreateEdit.addEventListener('click', async () => {
      if (!currentMedia) {
        editStatusMsg.style.display = 'block';
        editStatusMsg.style.color = '#ef4444';
        editStatusMsg.style.borderColor = '#ef4444';
        editStatusMsg.style.background = 'rgba(239, 68, 68, 0.1)';
        editStatusMsg.textContent = 'אנא העלה תמונה או סרטון להפעלת העריכה.';
        return;
      }

      // הוספת אפקט טשטוש ותנועה לאפליקציה
      appContainer.classList.add('app-blur-effect');
      aiLoadingOverlay.classList.add('active');
      const origText = btnCreateEdit.textContent;
      btnCreateEdit.textContent = 'מעבד עריכה... ⏳';
      btnCreateEdit.disabled = true;
      editStatusMsg.style.display = 'none';

      await new Promise(r => setTimeout(r, 1200));
      lastProcessedBlob = await createProcessedBlob();

      // הסרת הטשטוש והחזרת המצב
      appContainer.classList.remove('app-blur-effect');
      aiLoadingOverlay.classList.remove('active');
      btnCreateEdit.textContent = origText;
      btnCreateEdit.disabled = false;

      if (lastProcessedBlob) {
        editStatusMsg.style.display = 'block';
        editStatusMsg.style.color = '#4ade80';
        editStatusMsg.style.borderColor = '#22c55e';
        editStatusMsg.style.background = 'rgba(74, 222, 128, 0.1)';
        editStatusMsg.textContent = 'העריכה מוכנה! לחץ על "הורדה" כדי לשמור במכשיר. ✅';
      }
    });

    // Button Click: Download
    downloadBtn.addEventListener('click', async () => {
      if (!currentMedia) return;
      downloadBtn.textContent = 'מוריד...';

      let processed = lastProcessedBlob;
      if (!processed) {
        appContainer.classList.add('app-blur-effect');
        aiLoadingOverlay.classList.add('active');
        processed = await createProcessedBlob();
        aiLoadingOverlay.classList.remove('active');
        appContainer.classList.remove('app-blur-effect');
      }

      if (processed) {
        saveFileToDevice(processed.blob, `edited_${fileName.split('.')[0]}.${processed.extension}`);
        addItemToFolder(processed);
      }
      downloadBtn.textContent = '⬇ הורדה';
    });

    // Button Click: Share
    shareBtn.addEventListener('click', async () => {
      if (!currentMedia) return;
      shareBtn.textContent = 'מעבד...';
      let processed = lastProcessedBlob || await createProcessedBlob();
      shareBtn.textContent = '🔗 שיתוף';
      if (!processed) return;

      const file = new File([processed.blob], `edited_${fileName.split('.')[0]}.${processed.extension}`, { type: processed.mime });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ title: 'מדיה ערוכה', files: [file] });
      } else {
        saveFileToDevice(processed.blob, file.name);
      }
    });
  </script>
</body>
</html>
