<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מחולל וידאו AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: #0b0f19;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      background-color: #121824;
      border: 1px solid #1e293b;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 95vh;
      overflow-y: auto;
    }

    /* Header Design */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }

    .user-profile {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    header h1 {
      font-size: 1.25rem;
      color: #f8fafc;
      font-weight: 600;
    }

    .settings-btn {
      color: #94a3b8;
      font-size: 1.3rem;
      cursor: pointer;
      transition: color 0.2s, transform 0.2s;
    }

    .settings-btn:hover {
      color: #22d3ee;
      transform: rotate(30deg);
    }

    /* Hidden API Key Section */
    .api-key-container {
      display: none;
      background: #0d131f;
      border: 1px solid #0284c7;
      border-radius: 12px;
      padding: 10px;
      margin-top: -6px;
      flex-direction: column;
      gap: 6px;
    }

    .api-key-container.active {
      display: flex;
    }

    .api-key-container label {
      font-size: 0.75rem;
      color: #22d3ee;
    }

    .api-key-container input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      outline: none;
    }

    /* Video / Preview Container (Sticky) */
    .preview-card {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #090d16;
      border: 1.5px solid #22d3ee;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preview-header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 4px;
    }

    .delete-media-btn {
      background: #ef444422;
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .delete-media-btn:hover {
      background: #ef4444;
      color: #fff;
    }

    .preview-screen {
      width: 100%;
      height: 180px;
      background-color: #000000;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: height 0.3s;
    }

    /* התאמה מלאה של המדיה למסך ללא מתיחות או עיוותים */
    .preview-screen img,
    .preview-screen video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Samsung Style Play/Pause Overlay Button */
    .samsung-play-btn {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(15, 23, 42, 0.75);
      border: 2px solid #22d3ee;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 1.3rem;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
      transition: opacity 0.3s, transform 0.2s;
      z-index: 10;
      pointer-events: none;
    }

    .preview-screen.playing .samsung-play-btn {
      opacity: 0;
    }

    .preview-screen:hover .samsung-play-btn {
      opacity: 1;
    }

    .placeholder-text {
      color: #475569;
      font-size: 0.9rem;
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      padding: 6px 0;
      cursor: pointer;
      transition: opacity 0.4s ease;
      touch-action: none;
    }

    .preview-card.is-playing .progress-container {
      opacity: 0;
    }

    .preview-card.is-playing:hover .progress-container {
      opacity: 1;
    }

    .progress-bar-thick {
      width: 100%;
      height: 10px;
      background: #1e293b;
      border-radius: 5px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #0284c7, #22d3ee);
      border-radius: 5px;
      transition: width 0.1s linear;
    }

    /* Player Control Buttons */
    .player-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-buttons {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-top: 2px;
      direction: rtl;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
    }

    .ctrl-btn span.icon {
      font-size: 1rem;
    }

    .ctrl-btn:hover {
      color: #22d3ee;
    }

    /* Section Labels */
    .section-title {
      font-size: 0.8rem;
      color: #22d3ee;
      margin-bottom: 6px;
      font-weight: 600;
    }

    /* Aspect Ratio Selector */
    .size-selector-container {
      background: #0d131f;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 10px;
    }

    .size-buttons-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .size-btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
      padding: 6px 0;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      text-align: center;
    }

    .size-btn.active {
      background: #0284c7;
      border-color: #22d3ee;
      color: #fff;
    }

    /* Movie Styles / Genres */
    .genre-selector-container {
      background: #0d131f;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 10px;
    }

    .genre-grid {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 4px;
    }

    .genre-btn {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .genre-btn.active {
      background: #a855f7;
      border-color: #c084fc;
      color: #fff;
    }

    /* AI Prompt Box */
    .prompt-box {
      background: #0d131f;
      border: 1.5px solid #06b6d4;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prompt-box textarea {
      width: 100%;
      height: 55px;
      background: transparent;
      border: none;
      color: #f8fafc;
      resize: none;
      outline: none;
      font-size: 0.85rem;
    }

    .surprise-btn {
      align-self: flex-end;
      background: #22d3ee;
      color: #0f172a;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Media Selector Buttons */
    .media-type-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      direction: rtl;
    }

    .media-type-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px;
      color: #cbd5e1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .media-type-btn input {
      display: none;
    }

    /* Camera Submenu */
    .camera-options-menu {
      display: none;
      background: #0d131f;
      border: 1px solid #22d3ee;
      border-radius: 12px;
      padding: 10px;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .camera-options-menu.active {
      display: grid;
    }

    .cam-opt-btn {
      background: #1e293b;
      color: #38bdf8;
      border: 1px solid #0284c7;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Filters Section */
    .filters-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0d131f;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #1e293b;
    }

    .filters-grid {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 6px;
    }

    .filter-btn {
      background-color: #1e293b;
      color: #f1f5f9;
      border: 1px solid #334155;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn.active {
      border-color: #22d3ee;
      background-color: #0284c7;
    }

    .intensity-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .intensity-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .intensity-slider {
      width: 100%;
      accent-color: #22d3ee;
      cursor: pointer;
    }

    /* Create Edit Button Container & Status Message */
    .create-edit-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-create-edit {
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      color: #ffffff;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn-create-edit:active {
      transform: scale(0.98);
    }

    .edit-status-msg {
      display: none;
      font-size: 0.8rem;
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid #22c55e;
      padding: 8px 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
    }

    /* Action Buttons */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-main {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-download-main {
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-share-main {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    /* Gallery Section */
    .gallery-section {
      margin-top: 10px;
      border-top: 1px solid #1e293b;
      padding-top: 12px;
    }

    .gallery-section h3 {
      font-size: 0.9rem;
      color: #22d3ee;
      margin-bottom: 10px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .gallery-item {
      background-color: #0d131f;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 1px solid #1e293b;
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 80px;
      object-fit: contain;
      border-radius: 6px;
      background-color: #000;
    }

    .gallery-actions {
      display: flex;
      gap: 4px;
    }

    .btn-action {
      flex: 1;
      padding: 4px;
      font-size: 0.7rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-action-download { background-color: #10b981; color: #fff; }
    .btn-action-delete { background-color: #ef4444; color: #fff; }

    .filters-grid::-webkit-scrollbar, .genre-grid::-webkit-scrollbar { height: 4px; }
    .filters-grid::-webkit-scrollbar-thumb, .genre-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="user-profile">👤</div>
      <h1>מחולל וידאו AI</h1>
      <div class="settings-btn" id="settings-btn">⚙️</div>
    </header>

    <!-- Hidden API Key Box -->
    <div class="api-key-container" id="api-key-container">
      <label for="api-key">הכנס מפתח API מוסתר:</label>
      <input type="password" id="api-key" placeholder="sk-... או כל מפתח אחר">
    </div>

    <!-- Preview Container (Sticky) -->
    <div class="preview-card" id="preview-card">
      <div class="preview-header-actions">
        <span style="font-size:0.75rem; color:#64748b;">תצוגה מקדימה</span>
        <button class="delete-media-btn" id="delete-top-btn">🗑️ מחק סרטון</button>
      </div>

      <div class="preview-screen" id="preview-screen">
        <div class="samsung-play-btn" id="samsung-play-icon">▶</div>
        <span class="placeholder-text" id="placeholder-text">אין מדיה מוצגת</span>
      </div>
      
      <!-- Video Player Controls -->
      <div class="player-controls">
        <div class="progress-container" id="progress-container">
          <div class="progress-bar-thick">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="control-buttons">
          <button class="ctrl-btn" id="btn-forward"><span class="icon">►►</span>קדימה</button>
          <button class="ctrl-btn" id="btn-play"><span class="icon">▶</span>התחל</button>
          <button class="ctrl-btn" id="btn-pause"><span class="icon">❚❚</span>השהה</button>
          <button class="ctrl-btn" id="btn-stop"><span class="icon">◼</span>עצור</button>
          <button class="ctrl-btn" id="btn-rewind"><span class="icon">◄◄</span>אחורה</button>
        </div>
      </div>
    </div>

    <!-- Image / Video Size (Aspect Ratio Selector) -->
    <div class="size-selector-container">
      <div class="section-title">📐 גודל פריים / יחס גובה-רוחב:</div>
      <div class="size-buttons-grid">
        <button class="size-btn active" data-height="180px">16:9 🖥️</button>
        <button class="size-btn" data-height="260px">9:16 📱</button>
        <button class="size-btn" data-height="220px">1:1 ⏹️</button>
        <button class="size-btn" data-height="200px">4:3 📺</button>
      </div>
    </div>

    <!-- Movie Types / Genres Selector -->
    <div class="genre-selector-container">
      <div class="section-title">🎬 סוג הסרט / סגנון קולנועי:</div>
      <div class="genre-grid">
        <button class="genre-btn active">💥 אקשן דרמטי</button>
        <button class="genre-btn">🚀 מדע בדיוני (Sci-Fi)</button>
        <button class="genre-btn">🎨 אנימציה 3D</button>
        <button class="genre-btn">🎙️ דוקומנטרי</button>
        <button class="genre-btn">🧙‍♂️ פנטזיה קסומה</button>
        <button class="genre-btn">✏️ סרט מצויר</button>
      </div>
    </div>

    <!-- AI Prompt Box -->
    <div class="prompt-box">
      <textarea id="ai-prompt" placeholder="תאר את הסרטון שלך כאן... (למשל, אריה רץ בסוואנה בשעת השקיעה)"></textarea>
      <button class="surprise-btn" id="surprise-btn">הפתע אותי 🪄</button>
    </div>

    <!-- Media Source Selector: תמונה (ימין) | סרטון (אמצע) | מצלמה (שמאל) -->
    <div class="media-type-selector">
      <label class="media-type-btn">
        🖼️ תמונה
        <input type="file" accept="image/*" id="input-image">
      </label>
      <label class="media-type-btn">
        🎥 סרטון
        <input type="file" accept="video/*" id="input-video">
      </label>
      <!-- כפתור מצלמה שפותח תפריט צילום -->
      <button class="media-type-btn" id="cam-toggle-btn" type="button">
        📷 מצלמה
      </button>
    </div>

    <!-- Camera Choice Submenu -->
    <div class="camera-options-menu" id="camera-options-menu">
      <label class="cam-opt-btn">
        📷 צלם תמונה
        <input type="file" accept="image/*" capture="environment" id="input-camera-photo" style="display:none;">
      </label>
      <label class="cam-opt-btn">
        🎥 צלם סרטון
        <input type="file" accept="video/*" capture="environment" id="input-camera-video" style="display:none;">
      </label>
    </div>

    <!-- Filters Section -->
    <div class="filters-container">
      <div class="section-title">🎨 אפקטים ופילטרים מתקדמים:</div>
      <div class="filters-grid" id="filters-grid">
        <button class="filter-btn active" data-filter="none">ללא פילטר</button>
        
        <!-- 20 פילטרים חדשים -->
        <button class="filter-btn" data-filter="sepia-glow">✨ ספיה זוהרת</button>
        <button class="filter-btn" data-filter="emerald-night">🌃 ליל אזמרגד</button>
        <button class="filter-btn" data-filter="copper-tint">🥉 נחושת חמה</button>
        <button class="filter-btn" data-filter="soft-bloom">🌸 רכות פריחה</button>
        <button class="filter-btn" data-filter="dreamy-violet">🔮 סגול חלומי</button>
        <button class="filter-btn" data-filter="infrared">🔴 אינפרא-אדום</button>
        <button class="filter-btn" data-filter="cyber-lime">🍏 ליים סייבר</button>
        <button class="filter-btn" data-filter="deep-blue">🌊 כחול מעמקים</button>
        <button class="filter-btn" data-filter="golden-hour">🌅 שעת הזהב</button>
        <button class="filter-btn" data-filter="polaroid">📸 פולארויד קלאסי</button>
        <button class="filter-btn" data-filter="electric-cyan">⚡ ציאן החשמלי</button>
        <button class="filter-btn" data-filter="vintage-plum">🍇 שזיף וינטג'</button>

        <button class="filter-btn" data-filter="bw-dramatic">🎬 שחור-לבן דרמטי</button>
        <button class="filter-btn" data-filter="gray-neutral">🩶 אפור נייטרלי</button>
        <button class="filter-btn" data-filter="bw-high-contrast">🔳 שחור-לבן קונטרסט</button>
        <button class="filter-btn" data-filter="dark-monochrome">🖤 מונוכרום כהה</button>
        <button class="filter-btn" data-filter="gray-matte">🐘 אפור מט קלאסי</button>
        <button class="filter-btn" data-filter="silver-metallic">🥈 כסף מתכתי</button>
        <button class="filter-btn" data-filter="crt-display">📺 מסך CRT עתיק</button>
        <button class="filter-btn" data-filter="fog-mist">🌫️ ערפל עמוק</button>

        <!-- פילטרים נוספים -->
        <button class="filter-btn" data-filter="cyber-pink">💗 סייבר ורוד</button>
        <button class="filter-btn" data-filter="emerald-glow">💚 אזמרגד זוהר</button>
        <button class="filter-btn" data-filter="neon-orange">🟧 ניאון כתום</button>
        <button class="filter-btn" data-filter="xray-violet">🔮 רנטגן סגול</button>
        <button class="filter-btn" data-filter="pastel-blue">🩵 פסטל כחול</button>
        <button class="filter-btn" data-filter="retro-yellow">💛 רטרו צהוב</button>
        <button class="filter-btn" data-filter="red-alert">🚨 התרעה אדומה</button>
        <button class="filter-btn" data-filter="dark-cinema">🎞️ קולנוע אופל</button>
        <button class="filter-btn" data-filter="hollywood">הוליווד מוזהב</button>
        <button class="filter-btn" data-filter="cinema">קולנועי</button>
        <button class="filter-btn" data-filter="retro80s">רטרו 80s</button>
        <button class="filter-btn" data-filter="cyberpunk">סייברפאנק</button>
        <button class="filter-btn" data-filter="matrix">מטריקס ירוק</button>
        <button class="filter-btn" data-filter="vintage">וינטג'</button>
        <button class="filter-btn" data-filter="sepia">ספיה</button>
        <button class="filter-btn" data-filter="bw">שחור-לבן</button>
        <button class="filter-btn" data-filter="warm">חם</button>
        <button class="filter-btn" data-filter="cool">קר</button>
        <button class="filter-btn" data-filter="invert">נגטיב</button>
        <button class="filter-btn" data-filter="blur">טשטוש</button>
        <button class="filter-btn" data-filter="high-contrast">קונטרסט</button>
        <button class="filter-btn" data-filter="pastel">פסטל</button>
        <button class="filter-btn" data-filter="neon">ניאון</button>
        <button class="filter-btn" data-filter="sunset">שקיעה</button>
        <button class="filter-btn" data-filter="noir">נואר</button>
        <button class="filter-btn" data-filter="dreamy">חלום קסום</button>
        <button class="filter-btn" data-filter="thermal">מצלמה תרמית</button>
        <button class="filter-btn" data-filter="old-vhs">קלטת וידאו ישנה</button>
        <button class="filter-btn" data-filter="comic">קומיקס מוגבר</button>
        <button class="filter-btn" data-filter="frozen">קפוא כחול</button>
        <button class="filter-btn" data-filter="fire">להבה אדומה</button>
        <button class="filter-btn" data-filter="anime">אנימה יפנית</button>
        <button class="filter-btn" data-filter="tokyo-night">טוקיו בלילה</button>
        <button class="filter-btn" data-filter="gold-dust">אבק זהב</button>
        <button class="filter-btn" data-filter="ultraviolet">אולטרה-סגול</button>
        <button class="filter-btn" data-filter="pink-neon">ניאון ורוד</button>
        <button class="filter-btn" data-filter="vintage-1890">ספיה קלאסית 1890</button>
        <button class="filter-btn" data-filter="super-8">פילם Super 8</button>
        <button class="filter-btn" data-filter="film-16mm">פילם 16mm</button>
        <button class="filter-btn" data-filter="silent-movie">סרט אילם 1920</button>
      </div>

      <div class="intensity-container">
        <div class="intensity-header">
          <span>עוצמת פילטר:</span>
          <span id="intensity-value">100%</span>
        </div>
        <input type="range" id="intensity-slider" class="intensity-slider" min="1" max="100" value="100">
      </div>
    </div>

    <!-- Create Edit Button & Status Message -->
    <div class="create-edit-wrapper">
      <button class="btn-create-edit" id="btn-create-edit">✨ צור עריכה</button>
      <div class="edit-status-msg" id="edit-status-msg">
        העריכה נוצרה בהצלחה ונשמרה בתיקיית המדיה הערוכה בתחתית העמוד! ✅
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn-main btn-download-main" id="download-btn">⬇ הורדה</button>
      <button class="btn-main btn-share-main" id="share-btn">🔗 שיתוף</button>
    </div>

    <!-- Processed Media Folder (Gallery) -->
    <div class="gallery-section">
      <h3>תיקיית מדיה ערוכה</h3>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </div>

  <script>
    const settingsBtn = document.getElementById('settings-btn');
    const apiKeyContainer = document.getElementById('api-key-container');
    const previewCard = document.getElementById('preview-card');
    const previewScreen = document.getElementById('preview-screen');
    const samsungPlayIcon = document.getElementById('samsung-play-icon');
    const placeholderText = document.getElementById('placeholder-text');
    const deleteTopBtn = document.getElementById('delete-top-btn');
    
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    
    const filterButtons = document.querySelectorAll('.filter-btn');
    const sizeButtons = document.querySelectorAll('.size-btn');
    const genreButtons = document.querySelectorAll('.genre-btn');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityValue = document.getElementById('intensity-value');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    const btnCreateEdit = document.getElementById('btn-create-edit');
    const editStatusMsg = document.getElementById('edit-status-msg');
    const galleryGrid = document.getElementById('gallery-grid');
    const surpriseBtn = document.getElementById('surprise-btn');
    const aiPrompt = document.getElementById('ai-prompt');

    const camToggleBtn = document.getElementById('cam-toggle-btn');
    const cameraOptionsMenu = document.getElementById('camera-options-menu');

    let currentMedia = null;
    let mediaType = null;
    let fileName = 'edited_media';
    let selectedFilter = 'none';
    let filterIntensity = 100;
    let isDraggingProgress = false;

    // Toggle Camera Menu
    camToggleBtn.addEventListener('click', () => {
      cameraOptionsMenu.classList.toggle('active');
    });

    // Toggle API Key Input
    settingsBtn.addEventListener('click', () => {
      apiKeyContainer.classList.toggle('active');
    });

    // Handle Aspect Ratio / Screen Height
    sizeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        sizeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        previewScreen.style.height = btn.dataset.height;
      });
    });

    // Handle Movie Genres
    genreButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        genreButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // AI Prompts Generator
    const prompts = [
      "אריה רץ בסוואנה בשעת השקיעה בטכנולוגיית HDR",
      "עיר עתידנית בלילה עם אורות ניאון וגשם",
      "חללית חוצה גלקסיה צבעונית בסגנון קולנועי",
      "נוף מושלג באלפים עם זריחה מרהיבה"
    ];

    surpriseBtn.addEventListener('click', () => {
      aiPrompt.value = prompts[Math.floor(Math.random() * prompts.length)];
    });

    // Handle Uploads & Camera Captures
    ['input-video', 'input-image', 'input-camera-photo', 'input-camera-video'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        cameraOptionsMenu.classList.remove('active');
        fileName = file.name;
        const fileUrl = URL.createObjectURL(file);
        clearPreview();

        if (file.type.startsWith('image/')) {
          mediaType = 'image';
          currentMedia = document.createElement('img');
          currentMedia.src = fileUrl;
        } else if (file.type.startsWith('video/')) {
          mediaType = 'video';
          currentMedia = document.createElement('video');
          currentMedia.src = fileUrl;
          currentMedia.controls = false;
          currentMedia.autoplay = true;
          currentMedia.loop = true;
          currentMedia.playsInline = true;

          currentMedia.addEventListener('timeupdate', updateProgressBar);
          currentMedia.addEventListener('play', () => {
            previewCard.classList.add('is-playing');
            previewScreen.classList.add('playing');
            samsungPlayIcon.textContent = '❚❚';
          });
          currentMedia.addEventListener('pause', () => {
            previewCard.classList.remove('is-playing');
            previewScreen.classList.remove('playing');
            samsungPlayIcon.textContent = '▶';
          });
        }

        previewScreen.appendChild(currentMedia);
        applyFilter();
      });
    });

    // Clear Preview
    function clearPreview() {
      if (currentMedia) {
        if (mediaType === 'video') {
          currentMedia.pause();
          currentMedia.removeAttribute('src');
          currentMedia.load();
        }
        currentMedia.remove();
        currentMedia = null;
      }
      previewScreen.innerHTML = '';
      previewScreen.appendChild(samsungPlayIcon);
      previewScreen.appendChild(placeholderText);
      placeholderText.style.display = 'block';
      progressFill.style.width = '0%';
      previewCard.classList.remove('is-playing');
      previewScreen.classList.remove('playing');
      samsungPlayIcon.textContent = '▶';
      editStatusMsg.style.display = 'none';
    }

    deleteTopBtn.addEventListener('click', clearPreview);

    // Play/Pause Tap
    previewScreen.addEventListener('click', () => {
      if (!currentMedia || mediaType !== 'video') return;
      if (currentMedia.paused) {
        currentMedia.play();
      } else {
        currentMedia.pause();
      }
    });

    // Controls Logic
    document.getElementById('btn-play').onclick = () => currentMedia && currentMedia.play && currentMedia.play();
    document.getElementById('btn-pause').onclick = () => currentMedia && currentMedia.pause && currentMedia.pause();
    document.getElementById('btn-stop').onclick = () => {
      if (currentMedia && currentMedia.pause) {
        currentMedia.pause();
        currentMedia.currentTime = 0;
      }
    };
    document.getElementById('btn-forward').onclick = () => {
      if (currentMedia && mediaType === 'video') currentMedia.currentTime += 5;
    };
    document.getElementById('btn-rewind').onclick = () => {
      if (currentMedia && mediaType === 'video') currentMedia.currentTime -= 5;
    };

    // Progress Bar Handling (RTL)
    function updateProgressBar() {
      if (!currentMedia || isDraggingProgress || !currentMedia.duration) return;
      const pct = (currentMedia.currentTime / currentMedia.duration) * 100;
      progressFill.style.width = `${pct}%`;
    }

    function seekMedia(e) {
      if (!currentMedia || mediaType !== 'video' || !currentMedia.duration) return;
      const rect = progressContainer.getBoundingClientRect();
      const clickX = e.clientX || (e.touches && e.touches[0].clientX);
      
      let posX = rect.right - clickX;
      posX = Math.max(0, Math.min(posX, rect.width));
      const percentage = posX / rect.width;
      
      currentMedia.currentTime = percentage * currentMedia.duration;
      progressFill.style.width = `${percentage * 100}%`;
    }

    progressContainer.addEventListener('mousedown', (e) => { isDraggingProgress = true; seekMedia(e); });
    window.addEventListener('mousemove', (e) => { if (isDraggingProgress) seekMedia(e); });
    window.addEventListener('mouseup', () => { isDraggingProgress = false; });

    progressContainer.addEventListener('touchstart', (e) => { isDraggingProgress = true; seekMedia(e); });
    window.addEventListener('touchmove', (e) => { if (isDraggingProgress) seekMedia(e); });
    window.addEventListener('touchend', () => { isDraggingProgress = false; });

    // Filters Handling
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    intensitySlider.addEventListener('input', (e) => {
      filterIntensity = e.target.value;
      intensityValue.textContent = `${filterIntensity}%`;
      applyFilter();
    });

    // CSS Filters Calculator
    function getCSSFilterString() {
      if (selectedFilter === 'none') return 'none';
      const f = filterIntensity / 100;

      switch (selectedFilter) {
        // 20 הפילטרים החדשים
        case 'sepia-glow': return `sepia(${0.8 * f}) brightness(${1 + 0.25 * f}) contrast(${1 + 0.2 * f})`;
        case 'emerald-night': return `hue-rotate(${110 * f}deg) saturate(${1 + 1.2 * f}) brightness(${1 - 0.2 * f})`;
        case 'copper-tint': return `sepia(${0.6 * f}) hue-rotate(${-20 * f}deg) saturate(${1 + 0.8 * f})`;
        case 'soft-bloom': return `blur(${1.5 * f}px) brightness(${1 + 0.2 * f}) contrast(${1 - 0.1 * f})`;
        case 'dreamy-violet': return `hue-rotate(${240 * f}deg) saturate(${1 + 0.8 * f}) brightness(${1 + 0.1 * f})`;
        case 'infrared': return `invert(${0.9 * f}) hue-rotate(${170 * f}deg) saturate(${1 + 2 * f})`;
        case 'cyber-lime': return `hue-rotate(${70 * f}deg) saturate(${1 + 2.5 * f}) brightness(${1 + 0.1 * f})`;
        case 'deep-blue': return `hue-rotate(${190 * f}deg) saturate(${1 + 1.4 * f}) brightness(${1 - 0.25 * f})`;
        case 'golden-hour': return `sepia(${0.4 * f}) saturate(${1 + 1.2 * f}) brightness(${1 + 0.15 * f})`;
        case 'polaroid': return `contrast(${1 + 0.2 * f}) saturate(${1 - 0.2 * f}) sepia(${0.25 * f})`;
        case 'electric-cyan': return `hue-rotate(${150 * f}deg) saturate(${1 + 2 * f}) brightness(${1 + 0.1 * f})`;
        case 'vintage-plum': return `hue-rotate(${280 * f}deg) saturate(${1 + 0.6 * f}) contrast(${1 + 0.2 * f})`;

        // שחור לבן ואפור
        case 'bw-dramatic': return `grayscale(${f}) contrast(${1 + 1.8 * f}) brightness(${1 - 0.1 * f})`;
        case 'gray-neutral': return `grayscale(${f}) brightness(${1 + 0.05 * f})`;
        case 'bw-high-contrast': return `grayscale(${f}) contrast(${1 + 2.5 * f})`;
        case 'dark-monochrome': return `grayscale(${f}) brightness(${1 - 0.4 * f}) contrast(${1 + 0.8 * f})`;
        case 'gray-matte': return `grayscale(${0.9 * f}) contrast(${1 - 0.2 * f}) brightness(${1 + 0.1 * f})`;
        case 'silver-metallic': return `grayscale(${0.8 * f}) contrast(${1 + 1.2 * f}) brightness(${1 + 0.2 * f})`;
        case 'crt-display': return `contrast(${1 + 0.6 * f}) brightness(${1 + 0.2 * f}) saturate(${1 - 0.1 * f})`;
        case 'fog-mist': return `blur(${3 * f}px) brightness(${1 + 0.3 * f}) opacity(${1 - 0.2 * f})`;

        // פילטרים קודמים
        case 'cyber-pink': return `hue-rotate(${310 * f}deg) saturate(${1 + 2 * f})`;
        case 'emerald-glow': return `hue-rotate(${110 * f}deg) saturate(${1 + 1.8 * f}) brightness(${1 + 0.15 * f})`;
        case 'neon-orange': return `hue-rotate(${25 * f}deg) saturate(${1 + 2.5 * f})`;
        case 'xray-violet': return `invert(${f}) hue-rotate(${240 * f}deg) saturate(${1 + 1.5 * f})`;
        case 'pastel-blue': return `hue-rotate(${180 * f}deg) saturate(${1 - 0.3 * f}) brightness(${1 + 0.2 * f})`;
        case 'retro-yellow': return `sepia(${0.6 * f}) hue-rotate(${20 * f}deg) saturate(${1 + 0.8 * f})`;
        case 'red-alert': return `hue-rotate(${-50 * f}deg) saturate(${1 + 3 * f})`;
        case 'dark-cinema': return `contrast(${1 + 0.8 * f}) brightness(${1 - 0.3 * f}) saturate(${1 - 0.2 * f})`;
        case 'vintage': return `sepia(${0.5 * f}) contrast(${1 + 0.2 * f})`;
        case 'sepia': return `sepia(${f})`;
        case 'bw': return `grayscale(${f}) contrast(${1 + 0.5 * f})`;
        case 'cyberpunk': return `hue-rotate(${180 * f}deg) saturate(${1 + f})`;
        case 'warm': return `sepia(${0.3 * f}) saturate(${1 + 0.4 * f})`;
        case 'cool': return `hue-rotate(${30 * f}deg) saturate(${1 + 0.2 * f})`;
        case 'invert': return `invert(${f})`;
        case 'blur': return `blur(${5 * f}px)`;
        case 'high-contrast': return `contrast(${1 + f})`;
        case 'pastel': return `saturate(${1 - 0.5 * f}) brightness(${1 + 0.2 * f})`;
        case 'neon': return `saturate(${1 + 2 * f}) contrast(${1 + 0.5 * f})`;
        case 'cinema': return `contrast(${1 + 0.3 * f}) saturate(${1 - 0.2 * f})`;
        case 'sunset': return `sepia(${0.4 * f}) saturate(${1 + f})`;
        case 'noir': return `grayscale(${f}) contrast(${1 + f})`;
        case 'retro80s': return `hue-rotate(${-45 * f}deg) saturate(${1 + 1.5 * f}) contrast(${1 + 0.3 * f})`;
        case 'matrix': return `hue-rotate(${90 * f}deg) saturate(${1 + 2 * f}) brightness(${1 - 0.2 * f})`;
        case 'dreamy': return `blur(${2 * f}px) brightness(${1 + 0.25 * f}) saturate(${1 + 0.3 * f})`;
        case 'thermal': return `invert(${f}) hue-rotate(${120 * f}deg) saturate(${1 + 2 * f})`;
        case 'old-vhs': return `contrast(${1 - 0.2 * f}) sepia(${0.3 * f}) hue-rotate(${15 * f}deg)`;
        case 'hollywood': return `sepia(${0.35 * f}) contrast(${1 + 0.4 * f}) saturate(${1 + 0.3 * f})`;
        case 'comic': return `contrast(${1 + 1.2 * f}) saturate(${1 + 1.5 * f})`;
        case 'frozen': return `hue-rotate(${160 * f}deg) saturate(${1 + 0.5 * f}) brightness(${1 + 0.1 * f})`;
        case 'fire': return `hue-rotate(${-30 * f}deg) saturate(${1 + 2.5 * f})`;
        case 'anime': return `saturate(${1 + 1.8 * f}) contrast(${1 + 0.3 * f}) brightness(${1 + 0.1 * f})`;
        case 'tokyo-night': return `hue-rotate(${200 * f}deg) saturate(${1 + 1.5 * f}) brightness(${1 - 0.15 * f})`;
        case 'gold-dust': return `sepia(${0.7 * f}) brightness(${1 + 0.2 * f}) contrast(${1 + 0.3 * f})`;
        case 'ultraviolet': return `hue-rotate(${250 * f}deg) saturate(${1 + 2 * f}) invert(${0.1 * f})`;
        case 'pink-neon': return `hue-rotate(${300 * f}deg) saturate(${1 + 2.5 * f})`;
        case 'vintage-1890': return `sepia(${0.9 * f}) contrast(${1 + 0.6 * f}) brightness(${1 - 0.1 * f})`;
        case 'super-8': return `sepia(${0.4 * f}) contrast(${1 + 0.2 * f}) saturate(${1 + 0.5 * f})`;
        case 'film-16mm': return `grayscale(${0.3 * f}) sepia(${0.25 * f}) contrast(${1 + 0.35 * f})`;
        case 'silent-movie': return `grayscale(${f}) contrast(${1 + 0.8 * f}) brightness(${1 - 0.05 * f})`;
        default: return 'none';
      }
    }

    function applyFilter() {
      if (currentMedia) {
        currentMedia.style.filter = getCSSFilterString();
      }
    }

    // Process & Export Media
    async function createProcessedBlob() {
      if (!currentMedia) return null;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      if (mediaType === 'image') {
        canvas.width = currentMedia.naturalWidth || 800;
        canvas.height = currentMedia.naturalHeight || 600;

        ctx.filter = getCSSFilterString();
        ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);

        return new Promise(resolve => {
          canvas.toBlob(blob => resolve({ blob, type: 'image', extension: 'png', mime: 'image/png' }), 'image/png');
        });
      } else if (mediaType === 'video') {
        canvas.width = currentMedia.videoWidth || 640;
        canvas.height = currentMedia.videoHeight || 360;

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);

        return new Promise(resolve => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            resolve({ blob, type: 'video', extension: 'webm', mime: 'video/webm' });
          };

          currentMedia.currentTime = 0;
          currentMedia.play();
          recorder.start();

          const renderFrame = () => {
            if (currentMedia.ended || currentMedia.paused) {
              recorder.stop();
              return;
            }
            ctx.filter = getCSSFilterString();
            ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderFrame);
          };
          renderFrame();
        });
      }
    }

    function saveFileToDevice(blob, filename) {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function addItemToFolder(blobData) {
      const url = URL.createObjectURL(blobData.blob);
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const mediaEl = blobData.type === 'image' ? document.createElement('img') : document.createElement('video');
      mediaEl.src = url;
      if (blobData.type === 'video') mediaEl.controls = true;

      const actions = document.createElement('div');
      actions.className = 'gallery-actions';

      const downloadBtnSmall = document.createElement('button');
      downloadBtnSmall.className = 'btn-action btn-action-download';
      downloadBtnSmall.textContent = 'הורד';
      downloadBtnSmall.onclick = () => saveFileToDevice(blobData.blob, `edited_${Date.now()}.${blobData.extension}`);

      const deleteBtnSmall = document.createElement('button');
      deleteBtnSmall.className = 'btn-action btn-action-delete';
      deleteBtnSmall.textContent = 'מחק';
      deleteBtnSmall.onclick = () => item.remove();

      actions.appendChild(downloadBtnSmall);
      actions.appendChild(deleteBtnSmall);
      item.appendChild(mediaEl);
      item.appendChild(actions);
      galleryGrid.prepend(item);
    }

    // Action: Create Edit
    btnCreateEdit.addEventListener('click', async () => {
      if (!currentMedia) {
        editStatusMsg.style.display = 'block';
        editStatusMsg.style.color = '#ef4444';
        editStatusMsg.style.borderColor = '#ef4444';
        editStatusMsg.style.background = 'rgba(239, 68, 68, 0.1)';
        editStatusMsg.textContent = 'אנא העלה תמונה או סרטון כדי ליצור עריכה.';
        return;
      }

      const origText = btnCreateEdit.textContent;
      btnCreateEdit.textContent = 'מעבד ועורך... ⏳';
      btnCreateEdit.disabled = true;
      editStatusMsg.style.display = 'none';

      const processed = await createProcessedBlob();
      if (processed) {
        addItemToFolder(processed);
        editStatusMsg.style.display = 'block';
        editStatusMsg.style.color = '#4ade80';
        editStatusMsg.style.borderColor = '#22c55e';
        editStatusMsg.style.background = 'rgba(74, 222, 128, 0.1)';
        editStatusMsg.textContent = 'העריכה נוצרה בהצלחה ונשמרה בתיקיית המדיה הערוכה בתחתית העמוד! ✅';
      }

      btnCreateEdit.textContent = origText;
      btnCreateEdit.disabled = false;
    });

    downloadBtn.addEventListener('click', async () => {
      if (!currentMedia) return;
      downloadBtn.textContent = 'מעבד...';
      const processed = await createProcessedBlob();
      if (processed) {
        saveFileToDevice(processed.blob, `edited_${fileName.split('.')[0]}.${processed.extension}`);
        addItemToFolder(processed);
      }
      downloadBtn.textContent = '⬇ הורדה';
    });

    shareBtn.addEventListener('click', async () => {
      if (!currentMedia) return;
      shareBtn.textContent = 'מעבד...';
      const processed = await createProcessedBlob();
      shareBtn.textContent = '🔗 שיתוף';
      if (!processed) return;

      const file = new File([processed.blob], `edited_${fileName.split('.')[0]}.${processed.extension}`, { type: processed.mime });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ title: 'מדיה ערוכה', files: [file] });
      } else {
        saveFileToDevice(processed.blob, file.name);
      }
    });
  </script>
