<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yaniv AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0A0A0B; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .purple-gradient { background: linear-gradient(135deg, #7C3AED 0%, #4C1D95 100%); }
        .scroll-container { height: calc(100vh - 40vh - 140px); overflow-y: auto; }
        .active-btn:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- נגן מרכזי -->
    <div id="player" class="w-full h-[40vh] bg-black border-b border-zinc-800 flex items-center justify-center relative overflow-hidden">
        <div id="placeholder" class="text-zinc-600 flex flex-col items-center">
            <i data-lucide="play-circle" class="w-16 h-16 mb-2 opacity-20"></i>
            <span class="text-sm">הסטודיו של יניב מוכן</span>
        </div>
        <img id="outputImage" class="hidden w-full h-full object-contain shadow-[0_0_50px_rgba(124,58,237,0.2)]">
        
        <div id="loader" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-50">
            <div class="w-12 h-12 border-4 border-[#7C3AED] border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-[#7C3AED] animate-pulse">מרנדר בענן...</p>
        </div>
    </div>

    <!-- פקדי נגן -->
    <div class="flex justify-around items-center p-3 bg-zinc-900 border-b border-zinc-800 text-zinc-400">
        <i data-lucide="rewind" class="w-6 h-6 opacity-50"></i>
        <i data-lucide="play" class="w-8 h-8 text-[#7C3AED] fill-current"></i>
        <i data-lucide="fast-forward" class="w-6 h-6 opacity-50"></i>
    </div>

    <!-- אזור פקדים נגלל -->
    <div class="flex-1 scroll-container p-4 space-y-5">
        
        <!-- יצירת AI -->
        <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
            <h3 class="text-xs font-bold mb-3 flex items-center gap-2 text-purple-400">
                <i data-lucide="sparkles" class="w-4 h-4"></i> יצירת AI מהירה
            </h3>
            <textarea id="prompt" placeholder="תאר מה תרצה ליצור באנגלית (למשל: Cyberpunk city)..." 
                class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm h-20 outline-none focus:border-[#7C3AED] text-right resize-none"></textarea>
            
            <button onclick="generate()" class="w-full mt-3 purple-gradient py-4 rounded-xl font-bold active-btn flex items-center justify-center gap-2">
                <i data-lucide="wand-2" class="w-5 h-5"></i> צור יצירה
            </button>
        </div>

        <!-- העלאת קבצים (מצלמה וגלריה) -->
        <div class="grid grid-cols-2 gap-3">
            <!-- כפתור גלריה -->
            <label class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex flex-col items-center gap-2 active-btn cursor-pointer">
                <i data-lucide="image" class="text-purple-400"></i>
                <span class="text-xs font-bold">גלריה</span>
                <input type="file" class="hidden" accept="image/*" onchange="previewFile(event)">
            </label>
            
            <!-- כפתור מצלמה -->
            <label class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex flex-col items-center gap-2 active-btn cursor-pointer">
                <i data-lucide="camera" class="text-purple-400"></i>
                <span class="text-xs font-bold">מצלמה</span>
                <input type="file" class="hidden" accept="image/*" capture="environment" onchange="previewFile(event)">
            </label>
        </div>
    </div>

    <!-- כפתור שמירה סופי -->
    <div class="p-4 bg-black border-t border-zinc-800">
        <button onclick="downloadImage()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active-btn">
            <i data-lucide="download" class="w-5 h-5 text-green-500"></i> שמור לגלריה
        </button>
    </div>

    <script>
        lucide.createIcons();

        // פונקציה להצגת תמונה מהגלריה או מהמצלמה
        function previewFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('outputImage');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            }
            reader.readAsDataURL(file);
        }

        // פונקציית יצירת AI מתוקנת
        async function generate() {
            const promptInput = document.getElementById('prompt');
            const promptText = promptInput.value.trim();
            if (!promptText) return alert("אנא כתוב תיאור ליצירה");

            const loader = document.getElementById('loader');
            const outputImg = document.getElementById('outputImage');
            const placeholder = document.getElementById('placeholder');

            loader.classList.remove('hidden');
            outputImg.classList.add('hidden');
            placeholder.classList.add('hidden');

            try {
                const seed = Math.floor(Math.random() * 999999);
                // שימוש במודל FLUX דרך Pollinations
                const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(promptText)}?width=1080&height=1920&seed=${seed}&model=flux&nologo=true`;
                
                const img = new Image();
                img.crossOrigin = "anonymous"; // חשוב לשמירה
                img.src = imageUrl;
                
                img.onload = () => {
                    outputImg.src = imageUrl;
                    outputImg.classList.remove('hidden');
                    loader.classList.add('hidden');
                };
                
                img.onerror = () => {
                    alert("שגיאה בחיבור לשרת ה-AI. נסה שוב.");
                    loader.classList.add('hidden');
                    placeholder.classList.remove('hidden');
                };
            } catch (e) {
                loader.classList.add('hidden');
                alert("שגיאה כללית");
            }
        }

        // פונקציית שמירה לגלריה
        function downloadImage() {
            const img = document.getElementById('outputImage');
            if (!img.src || img.classList.contains('hidden')) return alert("אין תמונה לשמור");
            
            // פותח את התמונה בחלון חדש שמאפשר "שמור תמונה" בלחיצה ארוכה בגלקסי
            const win = window.open();
            win.document.write('<img src="' + img.src + '" style="width:100%">');
            win.document.write('<h2 style="text-align:center; font-family:sans-serif;">לחץ לחיצה ארוכה על התמונה כדי לשמור</h2>');
        }
    </script>
</body>
</html>
