<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #000000; --card: #0A0A0A; --border: #1A1A1A; --accent: #ffffff; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* נגן עליון - 30% */
        .player-area { height: 35dvh; background: #000; position: relative; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        /* אזור תוכן נגלל */
        .content-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        /* אלמנטים עיצוביים */
        .input-group { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px; }
        textarea { background: transparent; width: 100%; border: none; outline: none; resize: none; font-size: 16px; color: #fff; text-align: right; min-height: 80px; }
        
        .action-btn { background: var(--accent); color: #000; font-weight: 700; border-radius: 12px; padding: 12px; transition: 0.2s; text-align: center; }
        .action-btn:active { transform: scale(0.98); opacity: 0.9; }
        
        .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tool-item { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; color: #888; }
        .tool-item i { color: #fff; }

        .loader-screen { position: absolute; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .percent-num { font-size: 5rem; font-weight: 900; letter-spacing: -3px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- אזור הנגן -->
    <div class="player-area">
        <div id="loader" class="loader-screen">
            <div id="p-label" class="percent-num">0%</div>
            <div class="text-[10px] tracking-[0.4em] opacity-40 font-bold uppercase">Processing Asset</div>
        </div>
        
        <div id="placeholder" class="opacity-10">
            <i data-lucide="layers" class="w-16 h-16"></i>
        </div>
        
        <img id="v-img" class="hidden w-full h-full object-contain">
        <video id="v-vid" class="hidden w-full h-full object-contain" controls playsinline></video>
        <div id="v-txt" class="hidden p-8 text-sm text-right overflow-y-auto max-h-full leading-relaxed"></div>
    </div>

    <!-- גוף האפליקציה -->
    <div class="content-area">
        
        <!-- הגדרת מפתח סודית (נשמרת במכשיר) -->
        <input type="password" id="apiKey" placeholder="מפתח API (AIzaSy...)" 
            oninput="saveKey()" class="text-[10px] text-zinc-800 bg-transparent border-none outline-none text-left">

        <!-- תיבת הפרומפט -->
        <div class="input-group shadow-2xl">
            <textarea id="prompt" placeholder="מה תרצה ליצור היום?"></textarea>
            <div class="flex gap-2 mt-2">
                <button onclick="runText()" class="flex-1 action-btn">שאל AI</button>
                <button onclick="runMedia()" class="w-14 bg-zinc-800 rounded-xl flex items-center justify-center active:scale-90 transition-all"><i data-lucide="sparkles" class="w-5 h-5 text-purple-400"></i></button>
            </div>
        </div>

        <!-- פקדי מדיה Native -->
        <div class="tool-grid">
            <button onclick="pick('image/*')" class="tool-item">
                <i data-lucide="image"></i>
                <span>גלריה</span>
            </button>
            <button onclick="pick('video/*')" class="tool-item">
                <i data-lucide="video"></i>
                <span>סרטון</span>
            </button>
            <!-- מצלמה אמיתית לגלקסי -->
            <button onclick="openCamera()" class="tool-item border-zinc-700">
                <i data-lucide="camera" class="text-green-500"></i>
                <span>מצלמה</span>
            </button>
        </div>

        <!-- תוספים מתקדמים -->
        <div class="space-y-3">
            <div onclick="openVoice()" class="tool-item !flex-row !justify-between w-full">
                <div class="flex items-center gap-3">
                    <i data-lucide="mic" class="w-4 h-4"></i>
                    <span class="text-xs">שיבוט קולי (הקלטה)</span>
                </div>
                <i data-lucide="plus" class="w-3 h-3 opacity-20"></i>
            </div>
        </div>

        <button onclick="download()" class="w-full text-zinc-600 text-[10px] font-bold uppercase tracking-widest mt-4">
            Save to Device
        </button>
    </div>

    <!-- מודל שיבוט קול -->
    <div id="voice-modal" class="modal">
        <div class="bg-[#0A0A0A] border border-zinc-800 p-8 rounded-3xl w-full max-w-xs text-center">
            <h2 class="text-lg font-bold mb-6">שיבוט קול</h2>
            <div id="timer" class="text-6xl font-black text-white mb-8">05:00</div>
            
            <div class="space-y-3" id="voice-actions">
                <button id="rec-btn" onclick="startRec()" class="w-full bg-red-600 py-4 rounded-xl font-bold">הקלטה (5 שניות)</button>
                <div id="rec-done" class="hidden space-y-3">
                    <button onclick="playRec()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold">שמע הקלטה</button>
                    <button onclick="confirmClone()" class="w-full bg-white text-black py-3 rounded-xl font-bold">אשר ושבט</button>
                </div>
                <button onclick="closeVoice()" class="text-xs opacity-30 pt-4 block w-full text-center">ביטול</button>
            </div>
        </div>
    </div>

    <!-- קלטים מוסתרים -->
    <input type="file" id="fileInp" class="hidden" onchange="handleFile(event)">
    <input type="file" id="camInp" class="hidden" capture="environment" accept="image/*,video/*" onchange="handleFile(event)">

    <script>
        lucide.createIcons();
        const vImg = document.getElementById('v-img');
        const vVid = document.getElementById('v-vid');
        const vTxt = document.getElementById('v-txt');
        const ldr = document.getElementById('loader');
        const plbl = document.getElementById('p-label');

        let mediaRecorder, audioChunks = [], audioUrl = null;

        // טעינת מפתח
        window.onload = () => {
            const key = localStorage.getItem('api_key');
            if(key) document.getElementById('apiKey').value = key;
        };
        function saveKey() { localStorage.setItem('api_key', document.getElementById('apiKey').value); }

        // מצלמה וגלריה
        function openCamera() { document.getElementById('camInp').click(); }
        function pick(type) { 
            const i = document.getElementById('fileInp');
            i.accept = type;
            i.click(); 
        }

        function handleFile(e) {
            const f = e.target.files[0];
            if(!f) return;
            const u = URL.createObjectURL(f);
            document.getElementById('placeholder').classList.add('hidden');
            vTxt.classList.add('hidden');
            if(f.type.startsWith('image/')) {
                vImg.src = u; vImg.classList.remove('hidden'); vVid.classList.add('hidden');
            } else {
                vVid.src = u; vVid.classList.remove('hidden'); vImg.classList.add('hidden');
            }
        }

        // שיבוט קולי
        function openVoice() { document.getElementById('voice-modal').style.display = 'flex'; }
        function closeVoice() { document.getElementById('voice-modal').style.display = 'none'; }

        async function startRec() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioUrl = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/wav' }));
                document.getElementById('rec-btn').classList.add('hidden');
                document.getElementById('rec-done').classList.remove('hidden');
            };
            let c = 5;
            mediaRecorder.start();
            const int = setInterval(() => {
                c--; document.getElementById('timer').innerText = `0${c}:00`;
                if(c <= 0) { clearInterval(int); mediaRecorder.stop(); document.getElementById('timer').innerText = "DONE"; }
            }, 1000);
        }
        function playRec() { new Audio(audioUrl).play(); }
        function confirmClone() { alert("הקול שובט וחובר!"); closeVoice(); }

        // חיבור ל-AI
        async function runText() {
            const key = document.getElementById('apiKey').value.trim();
            const p = document.getElementById('prompt').value.trim();
            if(!key || !p) return alert("הזן מפתח ופרומפט");
            
            runLoader();
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
                });
                const d = await r.json();
                if(d.error) throw new Error(d.error.message);
                
                vTxt.innerText = d.candidates[0].content.parts[0].text;
                stopLoader();
                vTxt.classList.remove('hidden'); vImg.classList.add('hidden'); vVid.classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            } catch(e) { 
                alert("שגיאה במפתח API! וודא שהוא מתחיל ב-AIzaSy");
                stopLoader();
            }
        }

        async function runMedia() {
            const p = document.getElementById('prompt').value.trim();
            if(!p) return alert("תאר מה ליצור");
            runLoader();
            const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=1080&height=1920&seed=${Math.floor(Math.random()*999)}&model=flux&nologo=true`;
            const test = new Image();
            test.src = url;
            test.onload = () => {
                vImg.src = url; stopLoader();
                vImg.classList.remove('hidden'); vVid.classList.add('hidden'); vTxt.classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            };
        }

        function runLoader() {
            ldr.style.display = 'flex';
            let p = 0;
            const t = setInterval(() => {
                p += Math.floor(Math.random()*15)+2;
                if(p >= 100) { p = 100; clearInterval(t); plbl.innerText = "100%"; }
                else { plbl.innerText = p + "%"; }
            }, 250);
            window.activeLdr = t;
        }
        function stopLoader() { clearInterval(window.activeLdr); ldr.style.display = 'none'; plbl.innerText = "0%"; }
        function download() { if(vImg.src) window.open(vImg.src, '_blank'); }
    </script>
</body>
</html>
