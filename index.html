<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #fff; --bg: #000; --border: #27272a; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* נגן עליון 30% - סגנון Grok */
        .viewport { height: 32dvh; background: #000; position: relative; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        .grok-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        /* אלמנטים של Grok */
        .grok-input-wrapper { background: #000; border: 1px solid var(--border); border-radius: 24px; padding: 12px 20px; transition: 0.2s; }
        .grok-input-wrapper:focus-within { border-color: #555; }
        textarea { background: transparent; width: 100%; border: none; outline: none; resize: none; font-size: 16px; color: #fff; text-align: right; }
        
        .btn-send { background: #fff; color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-send:active { transform: scale(0.9); }
        
        .tool-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tool-card { background: #000; border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; font-weight: 500; }
        .tool-card:active { background: #111; }

        .render-overlay { position: absolute; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .percent { font-size: 5rem; font-weight: 900; letter-spacing: -2px; }

        /* מודלים */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- נגן Grok Pro -->
    <div class="viewport">
        <div id="loader" class="render-overlay">
            <div id="p-label" class="percent">0%</div>
            <div class="text-[10px] tracking-[0.3em] font-bold opacity-40">GENERATING</div>
        </div>
        
        <div id="placeholder" class="opacity-10">
            <i data-lucide="brain" class="w-16 h-16"></i>
        </div>
        
        <img id="v-img" class="hidden w-full h-full object-contain">
        <video id="v-vid" class="hidden w-full h-full object-contain" controls playsinline></video>
        <div id="v-txt" class="hidden p-8 text-sm text-right overflow-y-auto max-h-full leading-relaxed text-zinc-300"></div>
    </div>

    <!-- גוף האפליקציה -->
    <div class="grok-container" dir="rtl">
        
        <!-- הגדרת API - פעם אחת בלבד -->
        <input type="password" id="apiKey" placeholder="הדבק מפתח API כאן..." 
            oninput="saveKey()" class="text-[10px] text-zinc-600 bg-transparent border-none outline-none text-left font-mono">

        <!-- שורת כתיבה בסגנון גרוק -->
        <div class="grok-input-wrapper flex items-end gap-3 shadow-2xl">
            <textarea id="prompt" placeholder="שאל את גרוק משהו..." rows="2"></textarea>
            <button onclick="runGemini()" class="btn-send">
                <i data-lucide="arrow-up" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- כפתורי פעולה מהירים -->
        <div class="flex gap-2">
            <button onclick="runMedia()" class="flex-1 bg-zinc-900 text-white py-3 rounded-2xl text-xs font-bold border border-zinc-800 active:scale-95 transition-all">יצירת תמונה 4K</button>
            <button onclick="alert('Video Mode Active')" class="flex-1 bg-zinc-900 text-white py-3 rounded-2xl text-xs font-bold border border-zinc-800 active:scale-95 transition-all">יצירת וידאו</button>
        </div>

        <!-- פקדים Native (מצלמה אמיתית) -->
        <div class="tool-row">
            <button onclick="triggerInput('image/*')" class="tool-card">
                <i data-lucide="image" class="text-blue-500"></i>
                <span>גלריה</span>
            </button>
            <button onclick="triggerInput('video/*')" class="tool-card">
                <i data-lucide="video" class="text-red-500"></i>
                <span>סרטון</span>
            </button>
            <!-- הכפתור שמכריח מצלמה בגלקסי -->
            <button onclick="openRealCam()" class="tool-card border-zinc-700">
                <i data-lucide="camera" class="text-green-500"></i>
                <span>מצלמה</span>
            </button>
        </div>

        <!-- תוספים -->
        <div class="space-y-3">
            <div onclick="openVoiceModal()" class="tool-card !flex-row !justify-between w-full">
                <div class="flex items-center gap-3">
                    <i data-lucide="mic" class="text-zinc-400 w-4 h-4"></i>
                    <span class="text-xs font-bold">שיבוט קולי</span>
                </div>
                <i data-lucide="plus" class="w-3 h-3 opacity-20"></i>
            </div>
        </div>

        <button onclick="download()" class="w-full text-zinc-500 text-[10px] font-bold uppercase tracking-widest mt-2">
            Save Asset to Gallery
        </button>
    </div>

    <!-- מודל שיבוט קולי -->
    <div id="voice-modal" class="modal">
        <div class="bg-[#0a0a0a] border border-zinc-800 p-8 rounded-3xl w-full max-w-xs text-center">
            <h2 class="text-lg font-bold mb-6">שיבוט קול</h2>
            <div id="timer" class="text-6xl font-black text-white mb-8">05:00</div>
            
            <div class="space-y-3" id="rec-controls">
                <button id="rec-btn" onclick="startRecording()" class="w-full bg-red-600 py-4 rounded-xl font-bold">הקלטה</button>
                <div id="after-rec" class="hidden space-y-3">
                    <button onclick="previewAudio()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold">שמע</button>
                    <button onclick="confirmClone()" class="w-full bg-white text-black py-3 rounded-xl font-bold">שבט והדבק</button>
                </div>
                <button onclick="closeVoice()" class="text-xs opacity-30 pt-4 block w-full">ביטול</button>
            </div>
        </div>
    </div>

    <!-- כניסות מוסתרות -->
    <input type="file" id="h-inp" class="hidden" onchange="loadAsset(event)">
    <input type="file" id="c-inp" class="hidden" capture="environment" accept="image/*,video/*" onchange="loadAsset(event)">

    <script>
        lucide.createIcons();
        const vImg = document.getElementById('v-img');
        const vVid = document.getElementById('v-vid');
        const vTxt = document.getElementById('v-txt');
        const ldr = document.getElementById('loader');
        const plbl = document.getElementById('p-label');

        let mediaRecorder, audioChunks = [], audioUrl = null;

        // טעינת מפתח
        window.onload = () => {
            const key = localStorage.getItem('grok_key');
            if(key) document.getElementById('apiKey').value = key;
        };
        function saveKey() { localStorage.setItem('grok_key', document.getElementById('apiKey').value); }

        // מצלמה אמיתית
        function openRealCam() { document.getElementById('c-inp').click(); }
        function triggerInput(accept) { 
            const i = document.getElementById('h-inp');
            i.accept = accept;
            i.click(); 
        }

        function loadAsset(e) {
            const f = e.target.files[0];
            if(!f) return;
            const u = URL.createObjectURL(f);
            document.getElementById('placeholder').classList.add('hidden');
            vTxt.classList.add('hidden');
            if(f.type.startsWith('image/')) {
                vImg.src = u; vImg.classList.remove('hidden'); vVid.classList.add('hidden');
            } else {
                vVid.src = u; vVid.classList.remove('hidden'); vImg.classList.add('hidden');
            }
        }

        // שיבוט קולי
        function openVoiceModal() { document.getElementById('voice-modal').style.display = 'flex'; }
        function closeVoice() { document.getElementById('voice-modal').style.display = 'none'; }

        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioUrl = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/wav' }));
                document.getElementById('rec-btn').classList.add('hidden');
                document.getElementById('after-rec').classList.remove('hidden');
            };
            let c = 5;
            mediaRecorder.start();
            const int = setInterval(() => {
                c--; document.getElementById('timer').innerText = `0${c}:00`;
                if(c <= 0) { clearInterval(int); mediaRecorder.stop(); document.getElementById('timer').innerText = "DONE"; }
            }, 1000);
        }
        function previewAudio() { new Audio(audioUrl).play(); }
        function confirmClone() { alert("הקול שובט וחובר למערכת!"); closeVoice(); }

        // AI
        async function runGemini() {
            const key = document.getElementById('apiKey').value;
            const p = document.getElementById('prompt').value.trim();
            if(!key || !p) return alert("הזן מפתח ופרומפט");
            
            runLoader();
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
                });
                const d = await r.json();
                vTxt.innerText = d.candidates[0].content.parts[0].text;
                stopLoader();
                vTxt.classList.remove('hidden'); vImg.classList.add('hidden'); vVid.classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            } catch(e) { 
                alert("שגיאה! וודא שהמפתח תקין.");
                stopLoader();
            }
        }

        async function runMedia() {
            const p = document.getElementById('prompt').value.trim();
            if(!p) return alert("תאר מה ליצור");
            runLoader();
            const seed = Math.floor(Math.random()*99999);
            const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=1080&height=1920&seed=${seed}&model=flux&nologo=true`;
            
            const test = new Image();
            test.src = url;
            test.onload = () => {
                vImg.src = url;
                stopLoader();
                vImg.classList.remove('hidden'); vVid.classList.add('hidden'); vTxt.classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            };
        }

        function runLoader() {
            ldr.style.display = 'flex';
            let p = 0;
            const t = setInterval(() => {
                p += Math.floor(Math.random()*15)+2;
                if(p >= 100) { p = 100; clearInterval(t); plbl.innerText = "100%"; }
                else { plbl.innerText = p + "%"; }
            }, 250);
            window.activeLdr = t;
        }
        function stopLoader() { clearInterval(window.activeLdr); ldr.style.display = 'none'; plbl.innerText = "0%"; }
        function download() { if(vImg.src) window.open(vImg.src, '_blank'); }
    </script>
</body>
</html>
