<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0A0A0B; --card: #1A1A1D; --accent: #7C3AED; }
        body { background-color: var(--bg); color: white; font-family: system-ui, -apple-system, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* אזור 1: נגן וידאו (30% מובייל, 50% דסקטופ) */
        .player-viewport { height: 30dvh; background: #000; position: relative; border-bottom: 2px solid #2D2D30; flex-shrink: 0; }
        
        /* אזור 2: פס תחבורה */
        .transport-bar { height: 65px; background: #111; display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid #2D2D30; flex-shrink: 0; }
        
        /* אזור פקדים נגלל (70% הנותרים) */
        .content-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        .btn-action { background: var(--card); border: 1px solid #2D2D30; border-radius: 20px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); background: #2D2D30; }
        .btn-primary { background: var(--accent); shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.4); }
        
        .progress-number { font-size: 5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 40px rgba(124,58,237,0.5); }
        
        /* התאמה לטאבלט ומחשב */
        @media (min-width: 1024px) {
            body { flex-direction: row-reverse; }
            .player-viewport { height: 100dvh; width: 50%; border-l: 2px solid #2D2D30; border-bottom: none; }
            .transport-bar { position: absolute; bottom: 0; right: 0; width: 50%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
            .content-area { width: 50%; height: 100dvh; }
        }
    </style>
</head>
<body>

    <!-- אזור 1: נגן וידאו מרכזי -->
    <section class="player-viewport flex items-center justify-center overflow-hidden shadow-2xl">
        <div id="placeholder" class="flex flex-col items-center opacity-30">
            <i data-lucide="monitor-play" class="w-16 h-16 mb-2 text-[#7C3AED]"></i>
            <span class="text-[10px] tracking-[0.5em] font-bold">4K RENDERING ENGINE</span>
        </div>

        <img id="outImg" class="hidden w-full h-full object-cover">
        <video id="outVid" class="hidden w-full h-full object-cover" playsinline loop></video>

        <!-- פקדים צפים בתוך הנגן -->
        <div class="absolute top-4 left-4 flex gap-2 z-20">
            <button onclick="compare()" class="bg-black/50 px-3 py-1 rounded-full text-[10px] border border-white/10 backdrop-blur-md">Compare</button>
            <button onclick="undo()" class="bg-black/50 p-2 rounded-full border border-white/10"><i data-lucide="undo-2" class="w-3 h-3"></i></button>
            <button onclick="redo()" class="bg-black/50 p-2 rounded-full border border-white/10"><i data-lucide="redo-2" class="w-3 h-3"></i></button>
        </div>

        <!-- מנדול 1-100% מקצועי -->
        <div id="loader" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-[110]">
            <div id="p-count" class="progress-number tracking-tighter">0%</div>
            <div class="w-48 h-1 bg-zinc-900 rounded-full mt-4 overflow-hidden">
                <div id="p-bar" class="h-full bg-[#7C3AED] w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- סרגל זמן דק + דקות:שניות -->
        <div class="absolute bottom-0 w-full px-4 py-1 bg-black/40 backdrop-blur-sm flex justify-between items-center z-30">
            <div class="h-1 flex-1 bg-white/10 mr-4 rounded-full overflow-hidden">
                <div id="timeLine" class="h-full bg-purple-500 w-0"></div>
            </div>
            <span id="timer" class="text-[9px] font-mono tracking-tighter">00:00 / 00:00</span>
        </div>
    </section>

    <!-- אזור 2: פס תחבורה (Transport) -->
    <nav class="transport-bar px-6">
        <button onclick="seek('start')" class="flex flex-col items-center"><i data-lucide="skip-back" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] font-bold mt-1 uppercase">Start</span></button>
        <button onclick="seek(-2)" class="flex flex-col items-center"><i data-lucide="rewind" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] font-bold mt-1">-2s</span></button>
        <button onclick="togglePlay()" class="bg-purple-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90"><i data-lucide="play" id="playIcon" class="w-6 h-6 fill-current"></i></button>
        <button onclick="seek(2)" class="flex flex-col items-center"><i data-lucide="fast-forward" class="w-5 h-5 text-zinc-500"></i><span class="text-[8px] font-bold mt-1">+2s</span></button>
        <button onclick="seek('stop')" class="flex flex-col items-center text-red-500"><i data-lucide="square" class="w-5 h-5 fill-current"></i><span class="text-[8px] font-bold mt-1 uppercase">Stop</span></button>
    </nav>

    <!-- אזור 3: אזור יצירה ופקדים -->
    <main class="content-area space-y-6">
        
        <!-- כרטיס יצירה AI -->
        <div class="btn-action p-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-purple-500 tracking-[0.2em] uppercase">AI Content Creator</span>
                <button onclick="surprise()" class="text-[9px] bg-zinc-900 px-3 py-1 rounded-full text-zinc-400">הפתע אותי 🎲</button>
            </div>
            <textarea id="prompt" placeholder="תאר את הויז'ן שלך בפירוט (למשל: סייברפאנק בתל אביב)..." 
                class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-sm h-28 mb-4 outline-none focus:border-[#7C3AED] text-right"></textarea>
            
            <div class="grid grid-cols-4 gap-2">
                <button onclick="generate('image')" class="col-span-3 btn-primary py-4 rounded-2xl font-black text-sm uppercase tracking-widest active:scale-95 transition-all">צור יצירה</button>
                <button onclick="alert('Extend Mode ON')" class="btn-action rounded-2xl text-[9px] font-bold uppercase">הארכה</button>
            </div>
            <button id="persistBtn" onclick="togglePersist()" class="w-full mt-4 text-[9px] font-bold text-zinc-500 flex items-center justify-center gap-2 uppercase tracking-widest">
                <i data-lucide="lock" class="w-3 h-3"></i> מנוע עקיבה דמות (Persistence Engine)
            </button>
        </div>

        <!-- העלאה (תמונות | סרטון | מצלמה) -->
        <div class="grid grid-cols-3 gap-2">
            <button onclick="triggerInp('image/*')" class="btn-action p-5 flex flex-col items-center gap-2">
                <i data-lucide="image" class="text-blue-500 w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">תמונות</span>
            </button>
            <button onclick="triggerInp('video/*')" class="btn-action p-5 flex flex-col items-center gap-2">
                <i data-lucide="film" class="text-red-500 w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">סרטונים</span>
            </button>
            <button onclick="triggerInp('camera')" class="btn-action p-5 flex flex-col items-center gap-2 border-[#7C3AED]/30">
                <i data-lucide="camera" class="text-green-500 w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">מצלמה</span>
            </button>
        </div>

        <!-- פונקציות עריכה וסאונד -->
        <div class="space-y-3">
            <div onclick="alert('Voice Cloning Active')" class="btn-action p-4 flex justify-between items-center cursor-pointer">
                <span class="text-xs font-bold flex items-center gap-2"><i data-lucide="mic" class="w-4 h-4 text-purple-500"></i> שיבוט קולי (Voice Clone)</span>
                <i data-lucide="plus" class="w-4 h-4 opacity-30"></i>
            </div>
            <div onclick="alert('Lip Sync Active')" class="btn-action p-4 flex justify-between items-center cursor-pointer">
                <span class="text-xs font-bold flex items-center gap-2"><i data-lucide="languages" class="w-4 h-4 text-purple-500"></i> סנכרון שפתיים (Lip-Sync)</span>
                <i data-lucide="plus" class="w-4 h-4 opacity-30"></i>
            </div>
            <div onclick="alert('Filters Active')" class="btn-action p-4 flex justify-between items-center cursor-pointer">
                <span class="text-xs font-bold flex items-center gap-2"><i data-lucide="palette" class="w-4 h-4 text-purple-500"></i> פילטרים ומניפת צבעים</span>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-30"></i>
            </div>
        </div>

        <!-- ספרייה אישית -->
        <div class="space-y-4">
            <h3 class="text-[10px] font-black text-zinc-600 uppercase tracking-widest">Library</h3>
            <div id="gallery" class="grid grid-cols-4 gap-2"></div>
        </div>

        <!-- ייצוא סופי -->
        <div class="flex gap-2 pt-4">
            <button onclick="save()" class="flex-[4] bg-white text-black py-5 rounded-3xl font-black text-xs uppercase tracking-widest active:scale-95 shadow-2xl transition-all">Download 4K Result</button>
            <button onclick="location.reload()" class="flex-1 btn-action flex items-center justify-center rounded-3xl"><i data-lucide="share-2" class="w-5 h-5"></i></button>
        </div>
    </main>

    <input type="file" id="hInp" class="hidden" onchange="loadMedia(event)">

    <script>
        lucide.createIcons();
        const oImg = document.getElementById('outImg');
        const oVid = document.getElementById('outVid');
        const ldr = document.getElementById('loader');
        const pc = document.getElementById('p-count');
        const pb = document.getElementById('p-bar');
        let persistenceOn = false;

        function triggerInp(type) {
            const i = document.getElementById('hInp');
            i.value = '';
            if(type === 'camera') { i.accept = "image/*,video/*"; i.capture = "environment"; }
            else { i.accept = type; i.removeAttribute('capture'); }
            i.click();
        }

        function loadMedia(e) {
            const f = e.target.files[0];
            if(!f) return;
            const u = URL.createObjectURL(f);
            document.getElementById('placeholder').classList.add('hidden');
            if(f.type.startsWith('image/')) {
                oImg.src = u; oImg.classList.remove('hidden'); oVid.classList.add('hidden');
            } else {
                oVid.src = u; oVid.classList.remove('hidden'); oImg.classList.add('hidden');
            }
        }

        async function generate() {
            const p = document.getElementById('prompt').value.trim();
            if(!p) return alert("אנא הזן תיאור");

            ldr.classList.remove('hidden');
            let progress = 0;
            const timer = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 1;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    pc.innerText = "100%";
                    pb.style.width = "100%";
                    
                    const seed = persistenceOn ? 12345 : Math.floor(Math.random() * 9999999);
                    const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=1080&height=1920&seed=${seed}&model=flux&nologo=true`;
                    
                    const test = new Image();
                    test.src = url;
                    test.onload = () => {
                        oImg.src = url;
                        oImg.classList.remove('hidden');
                        oVid.classList.add('hidden');
                        document.getElementById('placeholder').classList.add('hidden');
                        ldr.classList.add('hidden');
                        pc.innerText = "0%"; pb.style.width = "0%";
                        addToGallery(url);
                    };
                } else {
                    pc.innerText = progress + "%";
                    pb.style.width = progress + "%";
                }
            }, 250);
        }

        function addToGallery(u) {
            const g = document.getElementById('gallery');
            const d = document.createElement('div');
            d.className = "aspect-square rounded-xl overflow-hidden border border-zinc-800 bg-zinc-900";
            d.innerHTML = `<img src="${u}" class="w-full h-full object-cover">`;
            g.prepend(d);
        }

        function togglePlay() { 
            if(!oVid.classList.contains('hidden')) {
                oVid.paused ? oVid.play() : oVid.pause();
                document.getElementById('playIcon').dataset.lucide = oVid.paused ? 'play' : 'pause';
                lucide.createIcons();
            }
        }
        function seek(c) {
            if(c === 'stop') { oVid.pause(); oVid.currentTime = 0; }
            else if(c === 'start') oVid.currentTime = 0;
            else oVid.currentTime += c;
        }

        function togglePersist() {
            persistenceOn = !persistenceOn;
            document.getElementById('persistBtn').classList.toggle('text-purple-500');
            alert(persistenceOn ? "מנוע עקיבת דמות הופעל - הדמות תישאר זהה ביצירה הבאה" : "מנוע עקיבה בוטל");
        }

        function save() { if(oImg.src) window.open(oImg.src, '_blank'); }
        function surprise() { document.getElementById('prompt').value = "Futuristic city neon car 4k cinematic lighting"; }

        oVid.ontimeupdate = () => {
            const p = (oVid.currentTime / oVid.duration) * 100;
            document.getElementById('timeLine').style.width = p + "%";
            const m = Math.floor(oVid.currentTime / 60);
            const s = Math.floor(oVid.currentTime % 60);
            document.getElementById('timer').innerText = `00:${m<10?'0':''}${m}:${s<10?'0':''}${s} / 00:00`;
        };
    </script>
</body>
</html>
