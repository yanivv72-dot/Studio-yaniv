<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עורך מדיה AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 8px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background-color: #1e293b;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .upload-section {
      border: 2px dashed #475569;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .upload-section:hover {
      border-color: #38bdf8;
      background-color: #334155;
    }

    .upload-section input {
      display: none;
    }

    .preview-container {
      width: 100%;
      min-height: 350px;
      max-height: 550px;
      background-color: #020617;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .preview-container img,
    .preview-container video {
      max-width: 100%;
      max-height: 550px;
      object-fit: contain;
      transition: filter 0.1s ease;
    }

    .placeholder-text {
      color: #64748b;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* פילטרים נגללים שלא מסתירים את התצוגה המקדימה */
    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      max-height: 140px;
      overflow-y: auto;
      padding-left: 5px;
    }

    .filter-btn {
      background-color: #334155;
      color: #f1f5f9;
      border: 2px solid transparent;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      text-align: center;
    }

    .filter-btn:hover {
      background-color: #475569;
    }

    .filter-btn.active {
      border-color: #38bdf8;
      background-color: #0284c7;
    }

    .intensity-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background-color: #0f172a;
      padding: 12px 16px;
      border-radius: 8px;
    }

    .intensity-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .intensity-slider {
      width: 100%;
      accent-color: #38bdf8;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-download {
      background-color: #10b981;
      color: #ffffff;
    }

    .btn-share {
      background-color: #0284c7;
      color: #ffffff;
    }

    /* תיקיית מדיה ערוכה בתחתית */
    .gallery-section {
      margin-top: 20px;
      border-top: 2px solid #334155;
      padding-top: 20px;
    }

    .gallery-section h3 {
      font-size: 1.2rem;
      color: #38bdf8;
      margin-bottom: 16px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .gallery-item {
      background-color: #0f172a;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 8px;
    }

    .gallery-actions {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .btn-action {
      flex: 1;
      padding: 8px;
      font-size: 0.85rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
    }

    .btn-action-download {
      background-color: #10b981;
      color: #ffffff;
    }

    .btn-action-delete {
      background-color: #ef4444;
      color: #ffffff;
    }

    /* custom scrollbar */
    .filters-grid::-webkit-scrollbar {
      width: 6px;
    }
    .filters-grid::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <header>
    <h1>עורך מדיה AI</h1>
    <p>העלאת כל סוגי התמונות והסרטונים והחלת פילטרים בזמן אמת</p>
  </header>

  <div class="container">
    <label class="upload-section" for="file-input">
      <span>לחץ כאן להעלאת תמונה או סרטון (כל הפורמטים נתמכים)</span>
      <input type="file" id="file-input" accept="image/*, video/*">
    </label>

    <div class="preview-container" id="preview-container">
      <span class="placeholder-text">אין מדיה מוצגת</span>
    </div>

    <div class="controls">
      <h3>בחר פילטר (20 סוגים):</h3>
      <div class="filters-grid" id="filters-grid">
        <!-- 20 פילטרים -->
        <button class="filter-btn active" data-filter="none">ללא פילטר</button>
        <button class="filter-btn" data-filter="vintage">וינטג'</button>
        <button class="filter-btn" data-filter="sepia">ספיה קלאסי</button>
        <button class="filter-btn" data-filter="bw">שחור-לבן דרמטי</button>
        <button class="filter-btn" data-filter="cyberpunk">סייברפאנק</button>
        <button class="filter-btn" data-filter="warm">חם</button>
        <button class="filter-btn" data-filter="cool">קר</button>
        <button class="filter-btn" data-filter="invert">אינוורס (נגטיב)</button>
        <button class="filter-btn" data-filter="hue-shift">שינוי גוון</button>
        <button class="filter-btn" data-filter="blur">טשטוש עמוק</button>
        <button class="filter-btn" data-filter="high-contrast">קונטרסט גבוה</button>
        <button class="filter-btn" data-filter="pastel">פסטל רך</button>
        <button class="filter-btn" data-filter="neon">ניאון זוהר</button>
        <button class="filter-btn" data-filter="cinema">קולנועי</button>
        <button class="filter-btn" data-filter="sunset">שקיעה רומנטית</button>
        <button class="filter-btn" data-filter="noir">פילם נואר</button>
        <button class="filter-btn" data-filter="retro-green">רפאים ירוק</button>
        <button class="filter-btn" data-filter="golden-hour">שעת הזהב</button>
        <button class="filter-btn" data-filter="hdr">אפקט HDR</button>
        <button class="filter-btn" data-filter="pop-art">פופ ארט</button>
        <button class="filter-btn" data-filter="faded">דהוי וינטג'</button>
      </div>

      <div class="intensity-container">
        <div class="intensity-header">
          <span>עוצמת פילטר:</span>
          <span id="intensity-value">100%</span>
        </div>
        <input type="range" id="intensity-slider" class="intensity-slider" min="1" max="100" value="100">
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-share" id="share-btn">שתף מדיה</button>
      <button class="btn btn-download" id="download-btn">הורד מדיה</button>
    </div>

    <!-- תיקיית מדיה ערוכה -->
    <div class="gallery-section">
      <h3>תיקיית מדיה ערוכה</h3>
      <div class="gallery-grid" id="gallery-grid">
        <!-- קבצים שנשמרו יופיעו כאן -->
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityValue = document.getElementById('intensity-value');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    const galleryGrid = document.getElementById('gallery-grid');

    let currentMedia = null; // אלמנט Image או Video
    let mediaType = null;   // 'image' או 'video'
    let fileUrl = null;
    let fileName = 'download';
    let selectedFilter = 'none';
    let filterIntensity = 100; // 1-100

    // טיפול בהעלאת קובץ
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      fileName = file.name;
      fileUrl = URL.createObjectURL(file);
      previewContainer.innerHTML = '';

      if (file.type.startsWith('image/')) {
        mediaType = 'image';
        currentMedia = document.createElement('img');
        currentMedia.src = fileUrl;
      } else if (file.type.startsWith('video/')) {
        mediaType = 'video';
        currentMedia = document.createElement('video');
        currentMedia.src = fileUrl;
        currentMedia.controls = true;
        currentMedia.autoplay = true;
        currentMedia.loop = true;
        currentMedia.playsInline = true;
      }

      if (currentMedia) {
        previewContainer.appendChild(currentMedia);
        applyFilter();
      }
    });

    // בחירת פילטר
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    // שינוי עוצמת הפילטר (1 - 100)
    intensitySlider.addEventListener('input', (e) => {
      filterIntensity = e.target.value;
      intensityValue.textContent = `${filterIntensity}%`;
      applyFilter();
    });

    // חישוב הפילטר בצורה מדויקת - משנה אך ורק את חוזק האפקט/צבע ללא החשכה
    function getCSSFilterString() {
      if (selectedFilter === 'none') return 'none';

      const f = filterIntensity / 100; // יחס 0 עד 1

      switch (selectedFilter) {
        case 'vintage':
          return `sepia(${0.5 * f}) contrast(${1 + 0.2 * f}) brightness(${1 - 0.1 * f})`;
        case 'sepia':
          return `sepia(${f})`;
        case 'bw':
          return `grayscale(${f}) contrast(${1 + 0.5 * f})`;
        case 'cyberpunk':
          return `hue-rotate(${180 * f}deg) contrast(${1 + 0.4 * f}) saturate(${1 + f})`;
        case 'warm':
          return `sepia(${0.3 * f}) saturate(${1 + 0.4 * f}) hue-rotate(${-10 * f}deg)`;
        case 'cool':
          return `hue-rotate(${30 * f}deg) saturate(${1 + 0.2 * f}) brightness(${1 + 0.1 * f})`;
        case 'invert':
          return `invert(${f})`;
        case 'hue-shift':
          return `hue-rotate(${90 * f}deg)`;
        case 'blur':
          return `blur(${5 * f}px)`;
        case 'high-contrast':
          return `contrast(${1 + f})`;
        case 'pastel':
          return `saturate(${1 - 0.5 * f}) brightness(${1 + 0.3 * f}) contrast(${1 - 0.2 * f})`;
        case 'neon':
          return `saturate(${1 + 2 * f}) contrast(${1 + 0.5 * f}) brightness(${1 + 0.2 * f})`;
        case 'cinema':
          return `contrast(${1 + 0.3 * f}) saturate(${1 - 0.2 * f}) brightness(${1 - 0.1 * f})`;
        case 'sunset':
          return `sepia(${0.4 * f}) saturate(${1 + f}) hue-rotate(${-20 * f}deg)`;
        case 'noir':
          return `grayscale(${f}) contrast(${1 + f}) brightness(${1 - 0.2 * f})`;
        case 'retro-green':
          return `grayscale(${0.5 * f}) hue-rotate(${80 * f}deg) saturate(${1 + f})`;
        case 'golden-hour':
          return `sepia(${0.3 * f}) saturate(${1 + 0.8 * f}) brightness(${1 + 0.1 * f})`;
        case 'hdr':
          return `contrast(${1 + 0.6 * f}) saturate(${1 + 0.4 * f}) brightness(${1 + 0.05 * f})`;
        case 'pop-art':
          return `saturate(${1 + 4 * f}) hue-rotate(${45 * f}deg)`;
        case 'faded':
          return `contrast(${1 - 0.2 * f}) brightness(${1 + 0.2 * f}) sepia(${0.2 * f})`;
        default:
          return 'none';
      }
    }

    function applyFilter() {
      if (!currentMedia) return;
      currentMedia.style.filter = getCSSFilterString();
    }

    // מעבד ומייצר קובץ פיזי אמיתי (Blob)
    async function createProcessedBlob() {
      if (!currentMedia) return null;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      if (mediaType === 'image') {
        canvas.width = currentMedia.naturalWidth || currentMedia.width || 800;
        canvas.height = currentMedia.naturalHeight || currentMedia.height || 600;

        ctx.filter = getCSSFilterString();
        ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);

        return new Promise(resolve => {
          canvas.toBlob(blob => {
            resolve({ blob, type: 'image', extension: 'png', mime: 'image/png' });
          }, 'image/png');
        });
      } else if (mediaType === 'video') {
        canvas.width = currentMedia.videoWidth || 640;
        canvas.height = currentMedia.videoHeight || 360;

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);

        return new Promise(resolve => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            resolve({ blob, type: 'video', extension: 'webm', mime: 'video/webm' });
          };

          currentMedia.currentTime = 0;
          currentMedia.play();
          recorder.start();

          const renderFrame = () => {
            if (currentMedia.ended || currentMedia.paused) {
              recorder.stop();
              return;
            }
            ctx.filter = getCSSFilterString();
            ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderFrame);
          };
          renderFrame();

          currentMedia.onended = () => recorder.stop();
        });
      }
    }

    // הוספת קובץ לתיקייה בתחתית העמוד
    function addItemToFolder(blobData) {
      const url = URL.createObjectURL(blobData.blob);
      const item = document.createElement('div');
      item.className = 'gallery-item';

      let mediaEl;
      if (blobData.type === 'image') {
        mediaEl = document.createElement('img');
        mediaEl.src = url;
      } else {
        mediaEl = document.createElement('video');
        mediaEl.src = url;
        mediaEl.controls = true;
      }

      const actions = document.createElement('div');
      actions.className = 'gallery-actions';

      const downloadBtnSmall = document.createElement('button');
      downloadBtnSmall.className = 'btn-action btn-action-download';
      downloadBtnSmall.textContent = 'הורד';
      downloadBtnSmall.onclick = () => saveFileToDevice(blobData.blob, `edited_${Date.now()}.${blobData.extension}`);

      const deleteBtnSmall = document.createElement('button');
      deleteBtnSmall.className = 'btn-action btn-action-delete';
      deleteBtnSmall.textContent = 'מחק';
      deleteBtnSmall.onclick = () => {
        item.remove();
        URL.revokeObjectURL(url);
      };

      actions.appendChild(downloadBtnSmall);
      actions.appendChild(deleteBtnSmall);

      item.appendChild(mediaEl);
      item.appendChild(actions);
      galleryGrid.prepend(item);
    }

    // שמירת הקובץ הפיזי למכשיר
    function saveFileToDevice(blob, filename) {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // הורדת מדיה (גם שומר למכשיר וגם מוסיף לתיקייה בתחתית)
    downloadBtn.addEventListener('click', async () => {
      if (!currentMedia) {
        alert('אנא העלה תמונה או סרטון תחילה.');
        return;
      }

      downloadBtn.disabled = true;
      downloadBtn.textContent = 'מעבד...';

      const processed = await createProcessedBlob();
      if (processed) {
        const outputName = `edited_${fileName.split('.')[0]}.${processed.extension}`;
        saveFileToDevice(processed.blob, outputName);
        addItemToFolder(processed);
      }

      downloadBtn.disabled = false;
      downloadBtn.textContent = 'הורד מדיה';
    });

    // שיתוף הקובץ עצמו (מדיה ולא קישור) למכשירים ניידים
    shareBtn.addEventListener('click', async () => {
      if (!currentMedia) {
        alert('אנא העלה תמונה או סרטון תחילה.');
        return;
      }

      const processed = await createProcessedBlob();
      if (!processed) return;

      const file = new File([processed.blob], `edited_${fileName.split('.')[0]}.${processed.extension}`, { type: processed.mime });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            title: 'מדיה ערוכה',
            files: [file]
          });
        } catch (err) {
          if (err.name !== 'AbortError') console.error(err);
        }
      } else {
        alert('שיתוף קבצים אינו נתמך בדפדפן זה. הקובץ יורד למכשיר.');
        saveFileToDevice(processed.blob, file.name);
      }
    });
  </script>
</body>
</html>
