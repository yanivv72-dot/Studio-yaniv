<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עורך מדיה AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 8px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background-color: #1e293b;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .upload-section {
      border: 2px dashed #475569;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .upload-section:hover {
      border-color: #38bdf8;
      background-color: #334155;
    }

    .upload-section input {
      display: none;
    }

    .preview-container {
      width: 100%;
      min-height: 350px;
      max-height: 550px;
      background-color: #020617;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .preview-container img,
    .preview-container video {
      max-width: 100%;
      max-height: 550px;
      object-fit: contain;
      transition: filter 0.1s ease;
    }

    .placeholder-text {
      color: #64748b;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* תיקון גלילת הפילטרים - לא מסתיר מסך */
    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
      max-height: 180px;
      overflow-y: auto;
      padding: 5px;
      background: #0f172a;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .filter-btn {
      background-color: #1e293b;
      color: #f1f5f9;
      border: 2px solid transparent;
      padding: 10px 5px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      text-align: center;
    }

    .filter-btn:hover {
      background-color: #334155;
    }

    .filter-btn.active {
      border-color: #38bdf8;
      background-color: #0284c7;
    }

    .intensity-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background-color: #0f172a;
      padding: 12px 16px;
      border-radius: 8px;
    }

    .intensity-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .intensity-slider {
      width: 100%;
      accent-color: #38bdf8;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, background-color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-download {
      background-color: #10b981;
      color: #ffffff;
    }

    .btn-share {
      background-color: #25d366;
      color: #ffffff;
    }

    .btn-danger {
      background-color: #ef4444;
      color: #ffffff;
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 0.8rem;
      background-color: #38bdf8;
      color: #0f172a;
    }

    /* תיקיית קבצים מעובדים למטה */
    .downloads-folder {
      margin-top: 30px;
      width: 100%;
      max-width: 900px;
      background-color: #1e293b;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .downloads-folder h2 {
      font-size: 1.3rem;
      color: #38bdf8;
      margin-bottom: 16px;
      border-bottom: 1px solid #334155;
      padding-bottom: 8px;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .folder-item {
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .folder-item-media {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: #020617;
      border-radius: 6px;
    }

    .folder-item-actions {
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: space-between;
    }

    /* custom scrollbar */
    .filters-grid::-webkit-scrollbar {
      width: 6px;
    }
    .filters-grid::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }

    .status-msg {
      font-size: 0.85rem;
      color: #38bdf8;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>עורך מדיה AI ומעבד פילטרים</h1>
    <p>העלאת תמונות וסרטונים, החלת פילטרים בזמן אמת ושיתוף ישיר ל-WhatsApp ולפלאפון</p>
  </header>

  <div class="container">
    <label class="upload-section" for="file-input">
      <span>לחץ כאן להעלאת תמונה או סרטון (כל הפורמטים נתמכים)</span>
      <input type="file" id="file-input" accept="image/*, video/*">
    </label>

    <div class="preview-container" id="preview-container">
      <span class="placeholder-text">אין מדיה מוצגת</span>
    </div>

    <div class="controls">
      <h3>בחר פילטר AI:</h3>
      <div class="filters-grid" id="filters-grid">
        <button class="filter-btn active" data-filter="none">ללא פילטר</button>
        <button class="filter-btn" data-filter="vintage">וינטג'</button>
        <button class="filter-btn" data-filter="sepia">ספיה קלאסי</button>
        <button class="filter-btn" data-filter="bw">שחור-לבן דרמטי</button>
        <button class="filter-btn" data-filter="cyberpunk">סייברפאנק AI</button>
        <button class="filter-btn" data-filter="warm">חם</button>
        <button class="filter-btn" data-filter="cool">קר</button>
        <button class="filter-btn" data-filter="invert">אינוורס (נגטיב)</button>
        <button class="filter-btn" data-filter="hue-shift">שינוי גוון</button>
        <button class="filter-btn" data-filter="blur">טשטוש עמוק</button>
        <button class="filter-btn" data-filter="high-contrast">קונטרסט גבוה</button>
        <button class="filter-btn" data-filter="pastel">פסטל רך</button>
        <button class="filter-btn" data-filter="neon">ניאון זוהר AI</button>
        <button class="filter-btn" data-filter="cinema">קולנועי</button>
        <button class="filter-btn" data-filter="sunset">שקיעה רומנטית</button>
        <button class="filter-btn" data-filter="noir">פילם נואר</button>
        <button class="filter-btn" data-filter="retro-green">רפאים ירוק</button>
        <button class="filter-btn" data-filter="golden-hour">שעת הזהב</button>
        <button class="filter-btn" data-filter="hdr">אפקט HDR AI</button>
        <button class="filter-btn" data-filter="pop-art">פופ ארט</button>
        <button class="filter-btn" data-filter="faded">דהוי וינטג'</button>
      </div>

      <div class="intensity-container">
        <div class="intensity-header">
          <span>עוצמת פילטר:</span>
          <span id="intensity-value">100%</span>
        </div>
        <input type="range" id="intensity-slider" class="intensity-slider" min="1" max="100" value="100">
      </div>
    </div>

    <div id="status-msg" class="status-msg"></div>

    <div class="actions">
      <button class="btn btn-share" id="share-btn">שתף לפלאפון / WhatsApp</button>
      <button class="btn btn-download" id="download-btn">עבד ושמור לתיקייה</button>
    </div>
  </div>

  <!-- תיקיית מדיה מעובדת -->
  <div class="downloads-folder">
    <h2>תיקיית מדיה מעובדת (מוכנה להורדה ומחיקה)</h2>
    <div class="folder-grid" id="folder-grid">
      <p class="placeholder-text" id="empty-folder-text">אין עדיין קבצים מעובדים. לחץ על "עבד ושמור לתיקייה".</p>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityValue = document.getElementById('intensity-value');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    const folderGrid = document.getElementById('folder-grid');
    const emptyFolderText = document.getElementById('empty-folder-text');
    const statusMsg = document.getElementById('status-msg');

    let currentMedia = null; 
    let mediaType = null;   
    let fileUrl = null;
    let fileName = 'media';
    let selectedFilter = 'none';
    let filterIntensity = 100;
    let originalFile = null;

    // העלאת קובץ
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      originalFile = file;
      fileName = file.name.split('.')[0];
      fileUrl = URL.createObjectURL(file);
      previewContainer.innerHTML = '';

      if (file.type.startsWith('image/')) {
        mediaType = 'image';
        currentMedia = document.createElement('img');
        currentMedia.src = fileUrl;
      } else if (file.type.startsWith('video/')) {
        mediaType = 'video';
        currentMedia = document.createElement('video');
        currentMedia.src = fileUrl;
        currentMedia.controls = true;
        currentMedia.autoplay = true;
        currentMedia.loop = true;
        currentMedia.muted = true;
        currentMedia.playsInline = true;
      }

      if (currentMedia) {
        previewContainer.appendChild(currentMedia);
        applyFilter();
      }
    });

    // בחירת פילטר
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    // שינוי עוצמה - משנה אך ורק את חוזק הצבע/האפקט ללא החשכת תמונה
    intensitySlider.addEventListener('input', (e) => {
      filterIntensity = e.target.value;
      intensityValue.textContent = `${filterIntensity}%`;
      applyFilter();
    });

    // חישוב מחרוזת פילטר נקייה מבוססת עוצמה
    function getFilterCSS(filter, intensity) {
      if (filter === 'none') return 'none';
      const f = intensity / 100;

      switch (filter) {
        case 'vintage': 
          return `sepia(${0.6 * f}) contrast(${1 + 0.3 * f}) brightness(${1 - 0.05 * f})`;
        case 'sepia': 
          return `sepia(${f})`;
        case 'bw': 
          return `grayscale(${f}) contrast(${1 + 0.5 * f})`;
        case 'cyberpunk': 
          return `hue-rotate(${180 * f}deg) contrast(${1 + 0.4 * f}) saturate(${1 + 1 * f})`;
        case 'warm': 
          return `sepia(${0.4 * f}) saturate(${1 + 0.5 * f}) hue-rotate(${-15 * f}deg)`;
        case 'cool': 
          return `hue-rotate(${30 * f}deg) saturate(${1 + 0.3 * f})`;
        case 'invert': 
          return `invert(${f})`;
        case 'hue-shift': 
          return `hue-rotate(${180 * f}deg)`;
        case 'blur': 
          return `blur(${8 * f}px)`;
        case 'high-contrast': 
          return `contrast(${1 + 1.2 * f})`;
        case 'pastel': 
          return `saturate(${1 - 0.4 * f}) brightness(${1 + 0.2 * f})`;
        case 'neon': 
          return `saturate(${1 + 3 * f}) contrast(${1 + 0.6 * f})`;
        case 'cinema': 
          return `contrast(${1 + 0.4 * f}) saturate(${1 - 0.3 * f})`;
        case 'sunset': 
          return `sepia(${0.5 * f}) saturate(${1 + 1.2 * f}) hue-rotate(${-25 * f}deg)`;
        case 'noir': 
          return `grayscale(${f}) contrast(${1 + 1 * f})`;
        case 'retro-green': 
          return `grayscale(${0.5 * f}) hue-rotate(${90 * f}deg) saturate(${1 + 1 * f})`;
        case 'golden-hour': 
          return `sepia(${0.4 * f}) saturate(${1 + 1 * f})`;
        case 'hdr': 
          return `contrast(${1 + 0.7 * f}) saturate(${1 + 0.6 * f})`;
        case 'pop-art': 
          return `saturate(${1 + 4 * f}) hue-rotate(${60 * f}deg)`;
        case 'faded': 
          return `contrast(${1 - 0.3 * f}) sepia(${0.3 * f})`;
        default: 
          return 'none';
      }
    }

    function applyFilter() {
      if (!currentMedia) return;
      currentMedia.style.filter = getFilterCSS(selectedFilter, filterIntensity);
    }

    // יצירת קובץ Blob מעובד מתוך קנבס
    async function generateProcessedBlob() {
      if (!currentMedia) return null;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const filterString = getFilterCSS(selectedFilter, filterIntensity);

      if (mediaType === 'image') {
        const width = currentMedia.naturalWidth || currentMedia.width;
        const height = currentMedia.naturalHeight || currentMedia.height;
        canvas.width = width;
        canvas.height = height;

        ctx.filter = filterString;
        ctx.drawImage(currentMedia, 0, 0, width, height);

        return new Promise((resolve) => {
          canvas.toBlob((blob) => resolve({ blob, type: 'image/png', ext: 'png' }), 'image/png');
        });
      } else if (mediaType === 'video') {
        statusMsg.textContent = 'מעבד סרטון בלופ... אנא המתן מספר שניות';
        
        const width = currentMedia.videoWidth || 640;
        const height = currentMedia.videoHeight || 360;
        canvas.width = width;
        canvas.height = height;

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = (e) => chunks.push(e.data);

        return new Promise((resolve) => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            statusMsg.textContent = '';
            resolve({ blob, type: 'video/webm', ext: 'webm' });
          };

          recorder.start();
          currentMedia.currentTime = 0;
          currentMedia.play();

          const drawFrame = () => {
            if (currentMedia.ended || currentMedia.paused) {
              recorder.stop();
              return;
            }
            ctx.filter = filterString;
            ctx.drawImage(currentMedia, 0, 0, width, height);
            requestAnimationFrame(drawFrame);
          };
          drawFrame();

          // עצירה כשהסרטון מסתיים פעם אחת
          currentMedia.onended = () => {
            if (recorder.state === 'recording') recorder.stop();
          };
        });
      }
    }

    // שמירה לתיקייה בתחתית
    downloadBtn.addEventListener('click', async () => {
      if (!currentMedia) {
        alert('אנא העלה תמונה או סרטון תחילה.');
        return;
      }

      const processed = await generateProcessedBlob();
      if (!processed) return;

      const itemUrl = URL.createObjectURL(processed.blob);
      addToFolderGrid(itemUrl, processed.type, `edited_${fileName}.${processed.ext}`, processed.blob);
    });

    // שיתוף ישיר ל-WhatsApp / פלאפון
    shareBtn.addEventListener('click', async () => {
      if (!currentMedia) {
        alert('אנא העלה תמונה או סרטון תחילה.');
        return;
      }

      const processed = await generateProcessedBlob();
      if (!processed) return;

      const file = new File([processed.blob], `edited_${fileName}.${processed.ext}`, { type: processed.type });

      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: 'מדיה מעובדת AI',
            text: 'הנה המדיה שערכתי בעורך AI!'
          });
        } catch (err) {
          console.log('שיתוף בוטל או נכשל', err);
        }
      } else {
        // Fallback למחשבים או דפדפנים שלא תומכים ב-Web Share
        const a = document.createElement('a');
        a.href = URL.createObjectURL(processed.blob);
        a.download = `edited_${fileName}.${processed.ext}`;
        a.click();
        alert('הקובץ הורד ישירות! בניידים נתמכים ייפתח חלון השיתוף ל-WhatsApp.');
      }
    });

    // הוספת אלמנט לתיקיית הקבצים המעובדים
    function addToFolderGrid(url, type, name, blob) {
      if (emptyFolderText) emptyFolderText.style.display = 'none';

      const itemDiv = document.createElement('div');
      itemDiv.className = 'folder-item';

      let mediaEl;
      if (type.startsWith('image/')) {
        mediaEl = document.createElement('img');
        mediaEl.src = url;
        mediaEl.className = 'folder-item-media';
      } else {
        mediaEl = document.createElement('video');
        mediaEl.src = url;
        mediaEl.controls = true;
        mediaEl.className = 'folder-item-media';
      }

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'folder-item-actions';

      const downloadLink = document.createElement('a');
      downloadLink.href = url;
      downloadLink.download = name;
      downloadLink.className = 'btn btn-small';
      downloadLink.textContent = 'הורד';

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn btn-danger';
      deleteBtn.textContent = 'מחק';
      deleteBtn.onclick = () => {
        itemDiv.remove();
        if (folderGrid.children.length === 1 && emptyFolderText) {
          emptyFolderText.style.display = 'block';
        }
      };

      actionsDiv.appendChild(downloadLink);
      actionsDiv.appendChild(deleteBtn);

      itemDiv.appendChild(mediaEl);
      itemDiv.appendChild(actionsDiv);

      folderGrid.appendChild(itemDiv);
    }
  </script>
</body>
</html>
