<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עורך מדיה AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 8px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background-color: #1e293b;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .upload-section {
      border: 2px dashed #475569;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .upload-section:hover {
      border-color: #38bdf8;
      background-color: #334155;
    }

    .upload-section input {
      display: none;
    }

    .preview-container {
      width: 100%;
      min-height: 350px;
      max-height: 550px;
      background-color: #020617;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .preview-container img,
    .preview-container video {
      max-width: 100%;
      max-height: 550px;
      object-fit: contain;
      transition: filter 0.1s ease;
    }

    .placeholder-text {
      color: #64748b;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* גלילה אופקית לפילטרים בשורה אחת/שתיים קומפקטיות כדי לא להסתיר את התצוגה המקדימה */
    .filters-grid {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 10px;
      padding: 5px 0 10px 0;
      scroll-behavior: smooth;
    }

    .filter-btn {
      background-color: #334155;
      color: #f1f5f9;
      border: 2px solid transparent;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      text-align: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn:hover {
      background-color: #475569;
    }

    .filter-btn.active {
      border-color: #38bdf8;
      background-color: #0284c7;
    }

    .intensity-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background-color: #0f172a;
      padding: 12px 16px;
      border-radius: 8px;
    }

    .intensity-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .intensity-slider {
      width: 100%;
      accent-color: #38bdf8;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-download {
      background-color: #10b981;
      color: #ffffff;
    }

    .btn-share {
      background-color: #0284c7;
      color: #ffffff;
    }

    /* תיקיית מדיה ערוכה בתחתית */
    .gallery-section {
      margin-top: 20px;
      border-top: 2px solid #334155;
      padding-top: 20px;
    }

    .gallery-section h3 {
      font-size: 1.2rem;
      color: #38bdf8;
      margin-bottom: 16px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .gallery-item {
      background-color: #0f172a;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 8px;
    }

    .gallery-actions {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .btn-action {
      flex: 1;
      padding: 8px;
      font-size: 0.85rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
    }

    .btn-action-download {
      background-color: #10b981;
      color: #ffffff;
    }

    .btn-action-delete {
      background-color: #ef4444;
      color: #ffffff;
    }

    /* custom scrollbar */
    .filters-grid::-webkit-scrollbar {
      height: 6px;
    }
    .filters-grid::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <header>
    <h1>עורך מדיה AI</h1>
    <p>העלאת כל סוגי התמונות והסרטונים והחלת פילטרים בזמן אמת</p>
  </header>

  <div class="container">
    <label class="upload-section" for="file-input">
      <span>לחץ כאן להעלאת תמונה או סרטון (כל הפורמטים נתמכים)</span>
      <input type="file" id="file-input" accept="image/*, video/*">
    </label>

    <div class="preview-container" id="preview-container">
      <span class="placeholder-text">אין מדיה מוצגת</span>
    </div>

    <div class="controls">
      <h3>בחר פילטר (20 סוגים):</h3>
      <div class="filters-grid" id="filters-grid">
        <!-- 20 פילטרים מקוריים -->
        <button class="filter-btn active" data-filter="none">ללא פילטר</button>
        <button class="filter-btn" data-filter="vintage">וינטג'</button>
        <button class="filter-btn" data-filter="sepia">ספיה קלאסי</button>
        <button class="filter-btn" data-filter="bw">שחור-לבן דרמטי</button>
        <button class="filter-btn" data-filter="cyberpunk">סייברפאנק</button>
        <button class="filter-btn" data-filter="warm">חם</button>
        <button class="filter-btn" data-filter="cool">קר</button>
        <button class="filter-btn" data-filter="invert">אינוורס (נגטיב)</button>
        <button class="filter-btn" data-filter="hue-shift">שינוי גוון</button>
        <button class="filter-btn" data-filter="blur">טשטוש עמוק</button>
        <button class="filter-btn" data-filter="high-contrast">קונטרסט גבוה</button>
        <button class="filter-btn" data-filter="pastel">פסטל רך</button>
        <button class="filter-btn" data-filter="neon">ניאון זוהר</button>
        <button class="filter-btn" data-filter="cinema">קולנועי</button>
        <button class="filter-btn" data-filter="sunset">שקיעה רומנטית</button>
        <button class="filter-btn" data-filter="noir">פילם נואר</button>
        <button class="filter-btn" data-filter="retro-green">רפאים ירוק</button>
        <button class="filter-btn" data-filter="golden-hour">שעת הזהב</button>
        <button class="filter-btn" data-filter="hdr">אפקט HDR</button>
        <button class="filter-btn" data-filter="pop-art">פופ ארט</button>
        <button class="filter-btn" data-filter="faded">דהוי וינטג'</button>
      </div>

      <div class="intensity-container">
        <div class="intensity-header">
          <span>עוצמת פילטר:</span>
          <span id="intensity-value">100%</span>
        </div>
        <input type="range" id="intensity-slider" class="intensity-slider" min="1" max="100" value="100">
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-share" id="share-btn">שתף מדיה</button>
      <button class="btn btn-download" id="download-btn">הורד מדיה</button>
    </div>

    <!-- תיקיית מדיה ערוכה -->
    <div class="gallery-section">
      <h3>תיקיית מדיה ערוכה</h3>
      <div class="gallery-grid" id="gallery-grid">
        <!-- קבצים שנשמרו יופיעו כאן -->
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityValue = document.getElementById('intensity-value');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    const galleryGrid = document.getElementById('gallery-grid');

    let currentMedia = null; // אלמנט Image או Video
    let mediaType = null;   // 'image' או 'video'
    let fileUrl = null;
    let fileName = 'download';
    let selectedFilter = 'none';
    let filterIntensity = 100; // 1-100

    // הגדרת מאפייני הפילטרים ב-CSS Filter (המקורי)
    const filterDefinitions = {
      'none': '',
      'vintage': 'sepia(0.5) contrast(1.2) brightness(0.9)',
      'sepia': 'sepia(1)',
      'bw': 'grayscale(1) contrast(1.5)',
      'cyberpunk': 'hue-rotate(180deg) contrast(1.4) saturate(2)',
      'warm': 'sepia(0.3) saturate(1.4) hue-rotate(-10deg)',
      'cool': 'hue-rotate(30deg) saturate(1.2) brightness(1.1)',
      'invert': 'invert(1)',
      'hue-shift': 'hue-rotate(90deg)',
      'blur': 'blur(5px)',
      'high-contrast': 'contrast(2)',
      'pastel': 'saturate(0.5) brightness(1.3) contrast(0.8)',
      'neon': 'saturate(3) contrast(1.5) brightness(1.2)',
      'cinema': 'contrast(1.3) saturate(0.8) brightness(0.9)',
      'sunset': 'sepia(0.4) saturate(2) hue-rotate(-20deg)',
      'noir': 'grayscale(1) contrast(2) brightness(0.8)',
      'retro-green': 'grayscale(0.5) hue-rotate(80deg) saturate(2)',
      'golden-hour': 'sepia(0.3) saturate(1.8) brightness(1.1)',
      'hdr': 'contrast(1.6) saturate(1.4) brightness(1.05)',
      'pop-art': 'saturate(5) hue-rotate(45deg)',
      'faded': 'contrast(0.8) brightness(1.2) sepia(0.2)'
    };

    // טיפול בהעלאת קובץ
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      fileName = file.name;
      fileUrl = URL.createObjectURL(file);
      previewContainer.innerHTML = '';

      if (file.type.startsWith('image/')) {
        mediaType = 'image';
        currentMedia = document.createElement('img');
        currentMedia.src = fileUrl;
      } else if (file.type.startsWith('video/')) {
        mediaType = 'video';
        currentMedia = document.createElement('video');
        currentMedia.src = fileUrl;
        currentMedia.controls = true;
        currentMedia.autoplay = true;
        currentMedia.loop = true;
        currentMedia.playsInline = true;
      }

      if (currentMedia) {
        previewContainer.appendChild(currentMedia);
        applyFilter();
      }
    });

    // בחירת פילטר
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    // שינוי עוצמת הפילטר (1 - 100)
    intensitySlider.addEventListener('input', (e) => {
      filterIntensity = e.target.value;
      intensityValue.textContent = `${filterIntensity}%`;
      applyFilter();
    });

    // החלת הפילטר המשולב עם העוצמה (פועל גם על תמונה וגם על סרטון)
    function applyFilter() {
      if (!currentMedia) return;

      if (selectedFilter === 'none') {
        currentMedia.style.filter = 'none';
        return;
      }

      const factor = filterIntensity / 100;

      // חישוב פילטר מורכב לפי עוצמה יחסית
      if (selectedFilter === 'blur') {
        currentMedia.style.filter = `blur(${5 * factor}px)`;
      } else if (selectedFilter === 'sepia') {
        currentMedia.style.filter = `sepia(${factor})`;
      } else if (selectedFilter === 'bw') {
        currentMedia.style.filter = `grayscale(${factor}) contrast(${1 + 0.5 * factor})`;
      } else if (selectedFilter === 'invert') {
        currentMedia.style.filter = `invert(${factor})`;
      } else {
        // ערבוב עוצמה עבור פילטרים כלליים באמצעות opacity/saturate/opacity
        currentMedia.style.filter = `${filterDefinitions[selectedFilter]} opacity(${0.3 + 0.7 * factor})`;
      }
    }

    // יצירת קובץ Blob פיזי מעובד (עובד בנייד ובמחשב)
    async function createProcessedBlob() {
      if (!currentMedia) return null;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      if (mediaType === 'image') {
        canvas.width = currentMedia.naturalWidth || currentMedia.width || 800;
        canvas.height = currentMedia.naturalHeight || currentMedia.height || 600;

        ctx.filter = getComputedStyle(currentMedia).filter;
        ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);

        return new Promise(resolve => {
          canvas.toBlob(blob => {
            resolve({ blob, type: 'image', extension: 'png', mime: 'image/png' });
          }, 'image/png');
        });
      } else if (mediaType === 'video') {
        canvas.width = currentMedia.videoWidth || 640;
        canvas.height = currentMedia.videoHeight || 360;

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);

        return new Promise(resolve => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            resolve({ blob, type: 'video', extension: 'webm', mime: 'video/webm' });
          };

          currentMedia.currentTime = 0;
          currentMedia.play();
          recorder.start();

          const renderFrame = () => {
            if (currentMedia.ended || currentMedia.paused) {
              recorder.stop();
              return;
            }
            ctx.filter = getComputedStyle(currentMedia).filter;
            ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderFrame);
          };
          renderFrame();

          currentMedia.onended = () => recorder.stop();
        });
      }
    }

    // הוספת פריט לתיקיית המדיה בתחתית
    function addItemToFolder(blobData) {
      const url = URL.createObjectURL(blobData.blob);
      const item = document.createElement('div');
      item.className = 'gallery-item';

      let mediaEl;
      if (blobData.type === 'image') {
        mediaEl = document.createElement('img');
        mediaEl.src = url;
      } else {
        mediaEl = document.createElement('video');
        mediaEl.src = url;
        mediaEl.controls = true;
      }

      const actions = document.createElement('div');
      actions.className = 'gallery-actions';

      const downloadBtnSmall = document.createElement('button');
      downloadBtnSmall.className = 'btn-action btn-action-download';
      downloadBtnSmall.textContent = 'הורד';
      downloadBtnSmall.onclick = () => saveFileToDevice(blobData.blob, `edited_${Date.now()}.${blobData.extension}`);

      const deleteBtnSmall = document.createElement('button');
      deleteBtnSmall.className = 'btn-action btn-action-delete';
      deleteBtnSmall.textContent = 'מחק';
      deleteBtnSmall.onclick = () => {
        item.remove();
        URL.revokeObjectURL(url);
      };

      actions.appendChild(downloadBtnSmall);
      actions.appendChild(deleteBtnSmall);

      item.appendChild(mediaEl);
      item.appendChild(actions);
      galleryGrid.prepend(item);
    }

    // שמירת קובץ למכשיר
    function saveFileToDevice(blob, filename) {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // הורדת מדיה (גם שומר למכשיר וגם מוסיף לתיקייה בתחתית)
    downloadBtn.addEventListener('click', async () => {
      if (!currentMedia) {
        alert('אנא העלה תמונה או סרטון תחילה.');
        return;
      }

      downloadBtn.disabled = true;
      downloadBtn.textContent = 'מעבד...';

      const processed = await createProcessedBlob();
      if (processed) {
        const outputName = `edited_${fileName.split('.')[0]}.${processed.extension}`;
        saveFileToDevice(processed.blob, outputName);
        addItemToFolder(processed);
      }

      downloadBtn.disabled = false;
      downloadBtn.textContent = 'הורד מדיה';
    });

    // שיתוף הקובץ עצמו לנייד
    shareBtn.addEventListener('click', async () => {
      if (!currentMedia) {
        alert('אנא העלה תמונה או סרטון תחילה.');
        return;
      }

      const processed = await createProcessedBlob();
      if (!processed) return;

      const file = new File([processed.blob], `edited_${fileName.split('.')[0]}.${processed.extension}`, { type: processed.mime });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            title: 'מדיה ערוכה',
            files: [file]
          });
        } catch (err) {
          if (err.name !== 'AbortError') console.error(err);
        }
      } else {
        alert('שיתוף קבצים אינו נתמך בדפדפן זה. הקובץ יורד למכשיר.');
        saveFileToDevice(processed.blob, file.name);
      }
    });
  </script>
</body>
</html>
