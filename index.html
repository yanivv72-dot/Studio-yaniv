<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samsung Studio AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #000000;
      color: #f4f4f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background-color: #0f0f11;
      border: 1px solid #27272a;
      border-radius: 36px;
      padding: 20px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.2rem;
      color: #ffffff;
    }

    .preview-screen {
      width: 100%;
      height: 230px;
      background-color: #000000;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 1px solid #27272a;
    }

    .preview-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 10s ease-in-out;
    }

    /* אפקט תנועת וידאו דינמי (Ken Burns) לתמונות AI */
    .preview-screen img.video-mode {
      animation: kenburns 12s infinite alternate ease-in-out;
    }

    @keyframes kenburns {
      0% { transform: scale(1) translate(0, 0); }
      50% { transform: scale(1.15) translate(-2%, -2%); }
      100% { transform: scale(1.05) translate(2%, 1%); }
    }

    .ai-loading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }

    .ai-loading.active {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #27272a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .prompt-box {
      background: #141417;
      border: 1px solid #27272a;
      border-radius: 18px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      height: 60px;
      background: transparent;
      border: none;
      color: #fff;
      resize: none;
      outline: none;
      font-size: 0.9rem;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 12px;
      border-radius: 14px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      transition: opacity 0.2s;
    }

    button:active {
      opacity: 0.8;
    }

    .btn-secondary {
      background: #27272a;
      color: #38bdf8;
    }

    .placeholder-text {
      color: #52525b;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Samsung Studio AI</h1>
      <button class="btn-secondary" style="padding: 6px 12px; font-size: 0.8rem;" id="btn-delete">🗑️ מחק</button>
    </header>

    <div class="preview-screen" id="preview-screen">
      <div class="ai-loading" id="ai-loading">
        <div class="spinner"></div>
        <span id="loading-text">יוצר תוכן ב-AI...</span>
      </div>
      <span class="placeholder-text" id="placeholder">הכנס תיאור ולחץ על צור</span>
    </div>

    <div class="prompt-box">
      <textarea id="prompt-input" placeholder="לדוגמה: צור בלונים צבעוניים עפים בשמיים..."></textarea>
    </div>

    <div class="btn-grid">
      <button id="btn-gen-image">🖼️ צור תמונה</button>
      <button id="btn-gen-video" class="btn-secondary">🎥 צור וידאו</button>
    </div>
  </div>

  <script>
    const previewScreen = document.getElementById('preview-screen');
    const aiLoading = document.getElementById('ai-loading');
    const loadingText = document.getElementById('loading-text');
    const placeholder = document.getElementById('placeholder');
    const promptInput = document.getElementById('prompt-input');
    const btnDelete = document.getElementById('btn-delete');

    btnDelete.addEventListener('click', () => {
      previewScreen.querySelectorAll('img, video').forEach(el => el.remove());
      placeholder.style.display = 'block';
    });

    async function generateAI(isVideo) {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        alert('אנא הקלד תיאור בתיבת הטקסט');
        return;
      }

      placeholder.style.display = 'none';
      aiLoading.classList.add('active');
      loadingText.textContent = isVideo ? "מעבד ומנפיש וידאו..." : "יוצר תמונה ב-AI...";

      // הסרת מדיה קודמת
      previewScreen.querySelectorAll('img, video').forEach(el => el.remove());

      // יצירת תמונה נקייה דרך שירות מבוסס AI מהיר
      const seed = Math.floor(Math.random() * 999999);
      const encodedPrompt = encodeURIComponent(prompt);
      const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=800&height=450&seed=${seed}&nologo=true`;

      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = imageUrl;

      img.onload = () => {
        aiLoading.classList.remove('active');
        if (isVideo) {
          img.classList.add('video-mode'); // הוספת אפקט תנועת וידאו
        }
        previewScreen.appendChild(img);
      };

      img.onerror = () => {
        aiLoading.classList.remove('active');
        placeholder.style.display = 'block';
        alert('שגיאה שטעינת התמונת AI. אנא נסה שוב.');
      };
    }

    document.getElementById('btn-gen-image').addEventListener('click', () => generateAI(false));
    document.getElementById('btn-gen-video').addEventListener('click', () => generateAI(true));
  </script>
</body>
</html>
