<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok 4 Pro Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #7C3AED; --bg: #000000; --card: #0D0D0D; --border: #1F1F1F; }
        body { background-color: var(--bg); color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* נגן עליון 30% - Grok Style */
        .viewport { height: 32dvh; background: #000; position: relative; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        /* אזור פקדים נגלל */
        .grok-container { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 40px; }

        .grok-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
        .grok-input { background: transparent; border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; outline: none; transition: 0.2s; font-size: 15px; color: white; }
        .grok-input:focus { border-color: var(--accent); }
        
        .btn-primary { background: var(--accent); border-radius: 12px; padding: 14px; width: 100%; font-weight: 700; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.97); opacity: 0.8; }
        
        .tool-btn { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 10px; color: #A1A1AA; }
        
        .render-digit { font-size: 5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px rgba(124,58,237,0.3); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- נגן Grok 4 -->
    <div class="viewport">
        <div id="loader" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-50">
            <div id="p-label" class="render-digit">0%</div>
            <div class="text-[10px] tracking-[0.4em] text-zinc-500 font-bold">RENDERING GEN-4</div>
        </div>
        
        <div id="placeholder" class="opacity-10 flex flex-col items-center">
            <i data-lucide="zap" class="w-12 h-12 mb-2"></i>
            <span class="text-[10px] font-bold tracking-widest">GROK ENGINE 4.0</span>
        </div>
        
        <img id="v-img" class="hidden w-full h-full object-contain">
        <video id="v-vid" class="hidden w-full h-full object-contain" controls playsinline></video>
        <div id="v-txt" class="hidden p-8 text-sm text-center overflow-y-auto max-h-full leading-relaxed text-zinc-200"></div>
    </div>

    <!-- גוף האפליקציה -->
    <div class="grok-container" dir="rtl">
        
        <!-- הגדרת API (נשמר בזיכרון) -->
        <div class="mb-4">
            <input type="password" id="apiKey" placeholder="הזן מפתח API (פעם אחת בלבד)" 
                oninput="saveKey()" class="grok-input text-left font-mono text-[10px] py-2 border-zinc-900 opacity-40 focus:opacity-100">
        </div>

        <!-- תיבת הפרומפט המקצועית -->
        <div class="grok-card shadow-xl">
            <textarea id="prompt" placeholder="שאל את גרוק או תאר מדיה..." 
                class="grok-input h-24 text-right resize-none placeholder-zinc-700 mb-4 border-none p-0"></textarea>
            
            <div class="grid grid-cols-4 gap-2">
                <button onclick="runGemini()" class="col-span-3 btn-primary">שאל AI</button>
                <button onclick="runMedia()" class="bg-zinc-900 rounded-12 rounded-[12px] flex items-center justify-center active:scale-90"><i data-lucide="sparkles" class="w-5 h-5 text-purple-400"></i></button>
            </div>
        </div>

        <!-- כפתורי שליטה Native (מצלמה אמיתית) -->
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="triggerInput('image/*')" class="tool-btn">
                <i data-lucide="image" class="text-blue-500 w-5 h-5"></i>
                <span>גלריה</span>
            </button>
            <button onclick="triggerInput('video/*')" class="tool-btn">
                <i data-lucide="film" class="text-red-500 w-5 h-5"></i>
                <span>סרטון</span>
            </button>
            <button onclick="openCamera()" class="tool-btn border-purple-900/30">
                <i data-lucide="camera" class="text-green-500 w-5 h-5"></i>
                <span>מצלמה</span>
            </button>
        </div>

        <!-- שיבוט קולי ופילטרים -->
        <div class="space-y-2">
            <div onclick="openVoiceModal()" class="grok-card flex justify-between items-center py-4 cursor-pointer active:bg-zinc-900">
                <div class="flex items-center gap-3">
                    <i data-lucide="mic" class="text-purple-500 w-5 h-5"></i>
                    <span class="text-sm font-bold">שיבוט קולי (Voice Clone)</span>
                </div>
                <i data-lucide="plus" class="w-4 h-4 opacity-20"></i>
            </div>
            
            <div onclick="alert('Filter Menu')" class="grok-card flex justify-between items-center py-4 cursor-pointer active:bg-zinc-900">
                <div class="flex items-center gap-3">
                    <i data-lucide="palette" class="text-purple-500 w-5 h-5"></i>
                    <span class="text-sm font-bold">פילטרים ומניפת צבעים</span>
                </div>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-20"></i>
            </div>
        </div>

        <button onclick="download()" class="w-full bg-white text-black py-4 rounded-xl font-black text-xs uppercase tracking-widest mt-6 active:scale-95">
            Download 4K
        </button>
    </div>

    <!-- מודל הקלטה ושיבוט -->
    <div id="voice-modal" class="modal">
        <div class="bg-[#0A0A0B] border border-zinc-800 p-8 rounded-3xl w-full max-w-xs text-center">
            <h2 class="text-lg font-bold mb-1">שיבוט קול</h2>
            <p class="text-[9px] text-zinc-500 mb-6 uppercase tracking-widest">RECORD 5 SECONDS</p>
            
            <div id="timer" class="text-6xl font-black text-purple-600 mb-8 tracking-tighter">05:00</div>
            
            <div class="space-y-3">
                <button id="rec-btn" onclick="startRecording()" class="w-full bg-red-600 py-4 rounded-xl font-bold">הקלט עכשיו</button>
                <div id="after-rec" class="hidden space-y-3">
                    <button onclick="previewAudio()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold flex items-center justify-center gap-2 border border-zinc-700">
                        <i data-lucide="play" class="w-4 h-4"></i> שמע הקלטה
                    </button>
                    <button onclick="confirmClone()" class="w-full bg-purple-600 py-3 rounded-xl font-bold">בצע שיבוט והדבק</button>
                </div>
                <button onclick="closeVoice()" class="text-xs opacity-30 pt-4 block w-full">סגור</button>
            </div>
        </div>
    </div>

    <!-- קלטים מוסתרים -->
    <input type="file" id="h-inp" class="hidden" onchange="loadMedia(event)">
    <input type="file" id="c-inp" class="hidden" capture="environment" accept="image/*,video/*" onchange="loadMedia(event)">

    <script>
        lucide.createIcons();
        const vImg = document.getElementById('v-img');
        const vVid = document.getElementById('v-vid');
        const vTxt = document.getElementById('v-txt');
        const ldr = document.getElementById('loader');
        const plbl = document.getElementById('p-label');

        let mediaRecorder;
        let audioChunks = [];
        let audioUrl = null;

        // שמירה וטעינה של המפתח
        window.onload = () => {
            const saved = localStorage.getItem('grok_key');
            if(saved) document.getElementById('apiKey').value = saved;
        };
        function saveKey() { localStorage.setItem('grok_key', document.getElementById('apiKey').value); }

        // מצלמה וגלריה
        function openCamera() { document.getElementById('c-inp').click(); }
        function triggerInput(accept) { 
            const i = document.getElementById('h-inp');
            i.accept = accept;
            i.click(); 
        }

        function loadMedia(e) {
            const f = e.target.files[0];
            if(!f) return;
            const u = URL.createObjectURL(f);
            document.getElementById('placeholder').classList.add('hidden');
            vTxt.classList.add('hidden');
            if(f.type.startsWith('image/')) {
                vImg.src = u; vImg.classList.remove('hidden'); vVid.classList.add('hidden');
            } else {
                vVid.src = u; vVid.classList.remove('hidden'); vImg.classList.add('hidden');
            }
        }

        // שיבוט קולי
        function openVoiceModal() { document.getElementById('voice-modal').style.display = 'flex'; }
        function closeVoice() { document.getElementById('voice-modal').style.display = 'none'; }

        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                audioUrl = URL.createObjectURL(blob);
                document.getElementById('rec-btn').classList.add('hidden');
                document.getElementById('after-rec').classList.remove('hidden');
            };

            let count = 5;
            const t = document.getElementById('timer');
            const btn = document.getElementById('rec-btn');
            btn.disabled = true; btn.innerText = "מקליט...";
            mediaRecorder.start();

            const int = setInterval(() => {
                count--;
                t.innerText = `0${count}:00`;
                if(count <= 0) {
                    clearInterval(int);
                    mediaRecorder.stop();
                    t.innerText = "בוצע ✅";
                }
            }, 1000);
        }
        function previewAudio() { new Audio(audioUrl).play(); }
        function confirmClone() { alert("הקול שובט וחובר ל-AI!"); closeVoice(); }

        // AI
        async function runGemini() {
            const key = document.getElementById('apiKey').value;
            const p = document.getElementById('prompt').value.trim();
            if(!key || !p) return alert("הזן מפתח ופרומפט");
            runLoader();
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
                });
                const d = await r.json();
                vTxt.innerText = d.candidates[0].content.parts[0].text;
                stopLoader();
                vTxt.classList.remove('hidden'); vImg.classList.add('hidden'); vVid.classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            } catch(e) { alert("שגיאה במפתח!"); stopLoader(); }
        }

        async function runMedia() {
            const p = document.getElementById('prompt').value.trim();
            if(!p) return alert("תאר מה ליצור");
            runLoader();
            const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=1080&height=1920&seed=${Math.floor(Math.random()*9999)}&model=flux&nologo=true`;
            const test = new Image();
            test.src = url;
            test.onload = () => {
                vImg.src = url;
                stopLoader();
                vImg.classList.remove('hidden'); vVid.classList.add('hidden'); vTxt.classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            };
        }

        function runLoader() {
            ldr.classList.remove('hidden');
            let p = 0;
            const t = setInterval(() => {
                p += Math.floor(Math.random()*15)+2;
                if(p >= 100) { p = 100; clearInterval(t); plbl.innerText = "100%"; }
                else { plbl.innerText = p + "%"; }
            }, 250);
            window.activeLdr = t;
        }
        function stopLoader() { clearInterval(window.activeLdr); ldr.classList.add('hidden'); plbl.innerText = "0%"; }
        function download() { if(vImg.src) window.open(vImg.src, '_blank'); }
    </script>
</body>
</html>
