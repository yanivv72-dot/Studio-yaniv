<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok 4 AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #7C3AED; --bg: #000; --card: #0A0A0A; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* נגן 30% קבוע */
        .viewport { height: 32dvh; background: #000; position: relative; border-bottom: 1px solid #1A1A1A; flex-shrink: 0; }
        
        /* אזור עבודה נגלל */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 50px; }

        .grok-input { background: #000; border: 1px solid #222; border-radius: 16px; padding: 12px; font-size: 14px; outline: none; transition: 0.3s; }
        .grok-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(124, 58, 237, 0.2); }
        
        .btn-grok { background: var(--accent); color: white; font-weight: 700; border-radius: 16px; padding: 16px; transition: 0.2s; border: none; }
        .btn-grok:active { transform: scale(0.96); opacity: 0.9; }
        
        .tool-btn { background: #0A0A0A; border: 1px solid #1A1A1A; border-radius: 16px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 10px; font-weight: 600; }
        
        .render-text { font-size: 5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px rgba(124,58,237,0.5); }
    </style>
</head>
<body>

    <!-- אזור 1: הנגן המרכזי -->
    <div class="viewport flex items-center justify-center relative">
        <img id="resImg" class="hidden w-full h-full object-contain">
        <div id="resText" class="p-6 text-sm text-center hidden overflow-y-auto max-h-full leading-relaxed"></div>
        <div id="placeholder" class="opacity-20 flex flex-col items-center">
            <i data-lucide="sparkles" class="w-12 h-12 mb-2 text-purple-500"></i>
            <span class="text-[10px] font-bold tracking-[0.5em]">GROK 4 ENGINE</span>
        </div>

        <!-- מנדול 1-100% -->
        <div id="loader" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-[110]">
            <div id="p-label" class="render-text">0%</div>
        </div>
    </div>

    <!-- אזור 2: ממשק עבודה (Grok Look) -->
    <div class="main-content space-y-5" dir="rtl">
        
        <!-- הגדרת מפתח API (נשמר אוטומטית) -->
        <div id="keyBox" class="space-y-2">
            <div class="text-[10px] text-zinc-500 font-bold px-2 tracking-widest uppercase">API CONFIGURATION</div>
            <input type="password" id="geminiKey" placeholder="הדבק כאן את המפתח (AIzaSy...)" 
                oninput="saveKey()" class="w-full grok-input text-left font-mono">
        </div>

        <!-- תיבת פרומפט -->
        <div class="space-y-2">
            <textarea id="prompt" placeholder="מה תרצה לשאול או ליצור היום?" 
                class="w-full grok-input h-32 text-right resize-none placeholder-zinc-700"></textarea>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="askAI()" class="btn-grok shadow-lg shadow-purple-900/20">שאל את ה-AI</button>
                <button onclick="generateMedia()" class="bg-zinc-900 border border-zinc-800 font-bold rounded-16 rounded-[16px] py-4 text-sm active:scale-95 transition-all">צור תמונה 4K</button>
            </div>
        </div>

        <!-- העלאה (שורה אחת) -->
        <div class="grid grid-cols-3 gap-2">
            <button onclick="pick('img')" class="tool-btn active:bg-zinc-900">
                <i data-lucide="image" class="text-blue-500"></i>
                <span>גלריה</span>
            </button>
            <button onclick="pick('vid')" class="tool-btn active:bg-zinc-900">
                <i data-lucide="film" class="text-red-500"></i>
                <span>סרטון</span>
            </button>
            <button onclick="pick('cam')" class="tool-btn border-purple-900/30">
                <i data-lucide="camera" class="text-green-500"></i>
                <span>מצלמה</span>
            </button>
        </div>

        <!-- פונקציות מתקדמות -->
        <div class="grid grid-cols-2 gap-2">
            <button onclick="alert('Voice Clone: הקלט 5 שניות')" class="tool-btn flex-row h-12 py-0"><i data-lucide="mic" class="w-4 h-4 text-purple-500"></i><span>שיבוט קולי</span></button>
            <button onclick="alert('Filter Active')" class="tool-btn flex-row h-12 py-0"><i data-lucide="palette" class="w-4 h-4 text-purple-500"></i><span>פילטרים</span></button>
        </div>

        <!-- ייצוא -->
        <button onclick="save()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">
            Download 4K Content
        </button>
    </div>

    <!-- קלטים מוסתרים -->
    <input type="file" id="f-inp" class="hidden" onchange="processFile(event)">
    <input type="file" id="c-inp" class="hidden" capture="environment" onchange="processFile(event)">

    <script>
        lucide.createIcons();
        const vImg = document.getElementById('resImg');
        const vTxt = document.getElementById('resText');
        const ldr = document.getElementById('loader');
        const plbl = document.getElementById('p-label');

        // טעינת המפתח מהזיכרון של הטלפון מיד עם הפתיחה
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('geminiKey').value = savedKey;
                // אפשר להחביא את תיבת המפתח אם הוא קיים (אופציונלי)
                // document.getElementById('keyBox').classList.add('opacity-40');
            }
        };

        function saveKey() {
            const key = document.getElementById('geminiKey').value;
            localStorage.setItem('gemini_api_key', key);
        }

        async function askAI() {
            const key = document.getElementById('geminiKey').value;
            const prompt = document.getElementById('prompt').value.trim();
            if(!key || !prompt) return alert("הזן מפתח API ותיאור");

            runLoader();
            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await resp.json();
                const text = data.candidates[0].content.parts[0].text;
                
                stopLoader();
                vTxt.innerText = text;
                vTxt.classList.remove('hidden');
                vImg.classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            } catch (err) {
                alert("שגיאת API: וודא שהמפתח תקין ומתחיל ב-AIzaSy");
                stopLoader();
            }
        }

        async function generateMedia() {
            const p = document.getElementById('prompt').value.trim();
            if(!p) return alert("אנא הזן תיאור");
            runLoader();
            const url = `https://pollinations.ai/p/${encodeURIComponent(p)}?width=1080&height=1920&seed=${Math.floor(Math.random()*9999)}&model=flux&nologo=true`;
            const test = new Image();
            test.src = url;
            test.onload = () => {
                vImg.src = url;
                vImg.classList.remove('hidden');
                vTxt.classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
                stopLoader();
            };
        }

        function runLoader() {
            ldr.classList.remove('hidden');
            let p = 0;
            const t = setInterval(() => {
                p += Math.floor(Math.random()*15)+2;
                if(p >= 100) { p = 100; clearInterval(t); plbl.innerText = "100%"; }
                else { plbl.innerText = p + "%"; }
            }, 200);
            window.activeLdr = t;
        }

        function stopLoader() { clearInterval(window.activeLdr); ldr.classList.add('hidden'); plbl.innerText = "0%"; }

        function pick(type) {
            if(type === 'cam') { document.getElementById('c-inp').click(); }
            else { 
                const inp = document.getElementById('f-inp');
                inp.accept = type === 'img' ? "image/*" : "video/*";
                inp.click(); 
            }
        }

        function processFile(e) {
            const f = e.target.files[0];
            if(!f) return;
            const u = URL.createObjectURL(f);
            document.getElementById('placeholder').classList.add('hidden');
            vImg.src = u; vImg.classList.remove('hidden'); vTxt.classList.add('hidden');
        }

        function save() { if(vImg.src) window.open(vImg.src, '_blank'); }
    </script>
</body>
</
