<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samsung Studio AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Secular One', -apple-system, BlinkMacSystemFont, 'SamsungOne', 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #000000;
      color: #f4f4f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      overflow-x: hidden;
    }

    /* App Container with Samsung Galaxy feel */
    .app-container {
      width: 100%;
      max-width: 440px;
      background-color: #0f0f11;
      border: 1px solid #27272a;
      border-radius: 36px;
      padding: 20px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-height: 96vh;
      overflow-y: auto;
      position: relative;
      transition: transform 0.4s ease, filter 0.4s ease, opacity 0.4s ease;
    }

    .app-container.app-blur-effect {
      filter: blur(10px) brightness(0.6);
      transform: scale(0.97);
      pointer-events: none;
      user-select: none;
    }

    /* Samsung One UI Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
    }

    .samsung-title-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-profile {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #27272a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border: 1px solid #3f3f46;
    }

    header h1 {
      font-size: 1.3rem;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .settings-btn {
      color: #a1a1aa;
      font-size: 1.4rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #18181b;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: #38bdf8;
      background: #27272a;
    }

    /* Universal API Key Section */
    .api-key-container {
      display: none;
      background: #18181b;
      border: 1px solid #3b82f6;
      border-radius: 20px;
      padding: 12px 16px;
      flex-direction: column;
      gap: 8px;
    }

    .api-key-container.active {
      display: flex;
    }

    .api-key-container label {
      font-size: 0.8rem;
      color: #60a5fa;
      font-weight: 600;
    }

    .api-key-container input {
      width: 100%;
      background: #09090b;
      border: 1px solid #27272a;
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
      outline: none;
    }

    .api-key-container input:focus {
      border-color: #3b82f6;
    }

    /* Larger Video/Preview Display */
    .preview-card {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #141417;
      border: 1px solid #27272a;
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .preview-header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }

    .preview-tag {
      font-size: 0.75rem;
      color: #a1a1aa;
      font-weight: 600;
      background: #27272a;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .delete-media-btn {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .delete-media-btn:hover {
      background: #ef4444;
      color: #fff;
    }

    /* Preview Screen */
    .preview-screen {
      width: 100%;
      height: 320px;
      background-color: #000000;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1), filter 0.3s;
      border: 1px solid #18181b;
    }

    .preview-screen img,
    .preview-screen video {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      transition: filter 0.3s;
    }

    /* AI Loading Overlay */
    .ai-loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 15, 17, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 20;
      border-radius: 18px;
    }

    .ai-loading-overlay.active {
      display: flex;
    }

    .ai-spinner {
      width: 42px;
      height: 42px;
      border: 3.5px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spinAnim 0.8s linear infinite;
    }

    @keyframes spinAnim {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .ai-loading-text {
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
    }

    /* One UI Samsung Play Button */
    .samsung-play-btn {
      position: absolute;
      width: 56px;
      height: 56px;
      background: rgba(24, 24, 27, 0.85);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 1.4rem;
      backdrop-filter: blur(6px);
      transition: opacity 0.3s, transform 0.2s;
      z-index: 10;
      pointer-events: none;
    }

    .preview-screen.playing .samsung-play-btn {
      opacity: 0;
    }

    .placeholder-text {
      color: #52525b;
      font-size: 0.95rem;
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      padding: 6px 0;
      cursor: pointer;
      touch-action: none;
    }

    .progress-bar-thick {
      width: 100%;
      height: 8px;
      background: #27272a;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      transition: width 0.1s linear;
    }

    /* Player Controls */
    .player-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-buttons {
      display: flex;
      justify-content: space-around;
      align-items: center;
      direction: rtl;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #a1a1aa;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .ctrl-btn span.icon {
      font-size: 1.1rem;
    }

    .ctrl-btn:hover {
      color: #3b82f6;
    }

    .section-title {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* Aspect Ratio Selector */
    .size-selector-container {
      background: #141417;
      border: 1px solid #27272a;
      border-radius: 20px;
      padding: 12px;
    }

    .size-buttons-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .size-btn {
      background: #27272a;
      color: #d4d4d8;
      border: none;
      padding: 10px 0;
      border-radius: 14px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .size-btn.active {
      background: #3b82f6;
      color: #fff;
    }

    /* Samsung AI Prompt Box */
    .prompt-box {
      background: #141417;
      border: 1px solid #27272a;
      border-radius: 20px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .prompt-box textarea {
      width: 100%;
      height: 65px;
      background: transparent;
      border: none;
      color: #f4f4f5;
      resize: none;
      outline: none;
      font-size: 0.9rem;
    }

    .surprise-btn {
      align-self: flex-end;
      background: #27272a;
      color: #38bdf8;
      border: 1px solid #38bdf8;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .surprise-btn:hover {
      background: #38bdf8;
      color: #000;
    }

    /* Dynamic Create Section directly under Prompt */
    .action-create-row {
      display: flex;
      gap: 8px;
      align-items: center;
      position: relative;
    }

    .btn-create-edit {
      flex: 2;
      background: #3b82f6;
      color: #ffffff;
      padding: 14px 10px;
      border-radius: 18px;
      border: none;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      transition: all 0.2s;
    }

    .btn-create-edit:active {
      transform: scale(0.98);
    }

    .btn-extend-video {
      flex: 1;
      background: #18181b;
      color: #38bdf8;
      border: 1px solid #38bdf8;
      padding: 14px 8px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-extend-video:hover {
      background: #38bdf8;
      color: #000;
    }

    /* Image AI Modal Options */
    .create-options-modal {
      display: none;
      position: absolute;
      top: 110%;
      left: 0;
      right: 0;
      background: #18181b;
      border: 1px solid #3b82f6;
      border-radius: 20px;
      padding: 12px;
      gap: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.8);
      z-index: 150;
    }

    .create-options-modal.active {
      display: flex;
      flex-direction: column;
    }

    .create-option-btn {
      background: #27272a;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .create-option-btn:hover {
      background: #3b82f6;
    }

    .edit-status-msg {
      display: none;
      font-size: 0.85rem;
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid #22c55e;
      padding: 10px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
    }

    /* Media Upload Options */
    .media-type-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      direction: rtl;
    }

    .media-type-btn {
      background: #141417;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 12px;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .media-type-btn input {
      display: none;
    }

    /* Camera Submenu */
    .camera-options-menu {
      display: none;
      background: #141417;
      border: 1px solid #3b82f6;
      border-radius: 16px;
      padding: 10px;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .camera-options-menu.active {
      display: grid;
    }

    .cam-opt-btn {
      background: #27272a;
      color: #60a5fa;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Filters Section */
    .filters-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #141417;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid #27272a;
    }

    .filters-grid {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 6px;
    }

    .filter-btn {
      background-color: #27272a;
      color: #e4e4e7;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn.active {
      background-color: #3b82f6;
      color: #fff;
    }

    .intensity-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .intensity-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #a1a1aa;
    }

    .intensity-slider {
      width: 100%;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    /* Action Buttons */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-main {
      padding: 14px;
      border-radius: 18px;
      border: none;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-download-main {
      background: #27272a;
      color: #ffffff;
      border: 1px solid #3f3f46;
    }

    .btn-share-main {
      background: #27272a;
      color: #38bdf8;
      border: 1px solid #38bdf8;
    }

    /* Gallery Section */
    .gallery-section {
      margin-top: 10px;
      border-top: 1px solid #27272a;
      padding-top: 14px;
    }

    .gallery-section h3 {
      font-size: 0.9rem;
      color: #a1a1aa;
      margin-bottom: 12px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .gallery-item {
      background-color: #141417;
      border-radius: 16px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #27272a;
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 100px;
      object-fit: contain;
      border-radius: 10px;
      background-color: #000;
    }

    .gallery-actions {
      display: flex;
      gap: 4px;
    }

    .btn-action {
      flex: 1;
      padding: 6px;
      font-size: 0.75rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-action-download { background-color: #3b82f6; color: #fff; }
    .btn-action-delete { background-color: #ef4444; color: #fff; }

    .filters-grid::-webkit-scrollbar { height: 4px; }
    .filters-grid::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="app-container" id="app-container">
    <header>
      <div class="samsung-title-badge">
        <div class="user-profile">⚙️</div>
        <h1>Samsung Studio</h1>
      </div>
      <div class="settings-btn" id="settings-btn">🔑</div>
    </header>

    <div class="api-key-container" id="api-key-container">
      <label for="api-key">מפתח API (OpenAI / Gemini / Runway):</label>
      <input type="password" id="api-key" placeholder="הכנס את המפתח שלך כאן להפעלת AI...">
    </div>

    <div class="preview-card" id="preview-card">
      <div class="preview-header-actions">
        <span class="preview-tag" id="preview-tag-label">תצוגה ראשית</span>
        <button class="delete-media-btn" id="delete-top-btn">🗑️ מחק מדיה</button>
      </div>

      <div class="preview-screen" id="preview-screen">
        <div class="ai-loading-overlay" id="ai-loading-overlay">
          <div class="ai-spinner"></div>
          <div class="ai-loading-text" id="ai-loading-text">מעבד ב-AI...</div>
        </div>

        <div class="samsung-play-icon samsung-play-btn" id="samsung-play-icon">▶</div>
        <span class="placeholder-text" id="placeholder-text">אין מדיה מוצגת</span>
      </div>
      
      <div class="player-controls">
        <div class="progress-container" id="progress-container">
          <div class="progress-bar-thick">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="control-buttons">
          <button class="ctrl-btn" id="btn-forward"><span class="icon">►►</span>קדימה</button>
          <button class="ctrl-btn" id="btn-play"><span class="icon">▶</span>התחל</button>
          <button class="ctrl-btn" id="btn-pause"><span class="icon">❚❚</span>השהה</button>
          <button class="ctrl-btn" id="btn-stop"><span class="icon">◼</span>עצור</button>
          <button class="ctrl-btn" id="btn-rewind"><span class="icon">◄◄</span>אחורה</button>
        </div>
      </div>
    </div>

    <div class="prompt-box">
      <textarea id="ai-prompt" placeholder="תאר מה ליצור או לערוך ב-AI עבור התמונה/הסרטון..."></textarea>
      <button class="surprise-btn" id="surprise-btn">הפתע אותי 🪄</button>
    </div>

    <div class="action-create-row">
      <button class="btn-create-edit" id="btn-create-edit">✨ צור ב-AI (10 שניות)</button>
      <button class="btn-extend-video" id="btn-extend-video">➕ 10 ש' נוספות</button>

      <div class="create-options-modal" id="create-options-modal">
        <button class="create-option-btn" id="opt-image-to-video">🎥 צור וידאו ב-AI (10 שניות)</button>
        <button class="create-option-btn" id="opt-edit-image">🖼️ ערוך תמונה ב-AI</button>
      </div>
    </div>

    <div class="edit-status-msg" id="edit-status-msg">
      התוכן שודרג בהצלחה דרך ה-AI! ✅
    </div>

    <div class="size-selector-container">
      <div class="section-title">📐 גודל פריים ויחס תצוגה:</div>
      <div class="size-buttons-grid">
        <button class="size-btn active" data-height="320px">16:9 🖥️</button>
        <button class="size-btn" data-height="420px">9:16 📱</button>
        <button class="size-btn" data-height="340px">1:1 ⏹️</button>
        <button class="size-btn" data-height="240px">21:9 🎬</button>
      </div>
    </div>

    <div class="media-type-selector">
      <label class="media-type-btn">
        🖼️ תמונה
        <input type="file" accept="image/*" id="input-image">
      </label>
      <label class="media-type-btn">
        🎥 סרטון
        <input type="file" accept="video/*" id="input-video">
      </label>
      <button class="media-type-btn" id="cam-toggle-btn" type="button">
        📷 מצלמה
      </button>
    </div>

    <div class="camera-options-menu" id="camera-options-menu">
      <label class="cam-opt-btn">
        📷 צלם תמונה
        <input type="file" accept="image/*" capture="environment" id="input-camera-photo" style="display:none;">
      </label>
      <label class="cam-opt-btn">
        🎥 צלם סרטון
        <input type="file" accept="video/*" capture="environment" id="input-camera-video" style="display:none;">
      </label>
    </div>

    <div class="filters-container">
      <div class="section-title">🎨 פילטרים ואפקטים:</div>
      <div class="filters-grid" id="filters-grid">
        <button class="filter-btn active" data-filter="none">ללא פילטר</button>
        <button class="filter-btn" data-filter="glow">🌟 זוהר</button>
        <button class="filter-btn" data-filter="blinding-glow">💫 זוהר מסנוור</button>
        <button class="filter-btn" data-filter="night-vision">🟢 ראיית לילה</button>
        <button class="filter-btn" data-filter="xray">🩻 רנטגן</button>
        <button class="filter-btn" data-filter="xray-electric">⚡ רנטגן חשמלי</button>
        <button class="filter-btn" data-filter="golden-hour">🌅 שעת הזהב</button>
        <button class="filter-btn" data-filter="bw-dramatic">🎬 שחור-לבן</button>
        <button class="filter-btn" data-filter="cyberpunk">⚡ סייברפאנק</button>
        <button class="filter-btn" data-filter="emerald-night">🌃 ליל אזמרגד</button>
        <button class="filter-btn" data-filter="vintage">📜 וינטג'</button>
        <button class="filter-btn" data-filter="blur">🌫️ טשטוש</button>
        <button class="filter-btn" data-filter="high-contrast">🌓 קונטרסט</button>
      </div>

      <div class="intensity-container">
        <div class="intensity-header">
          <span>עוצמת הפילטר:</span>
          <span id="intensity-value">100%</span>
        </div>
        <input type="range" id="intensity-slider" class="intensity-slider" min="1" max="100" value="100">
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-main btn-download-main" id="download-btn">⬇ הורדה</button>
      <button class="btn-main btn-share-main" id="share-btn">🔗 שיתוף</button>
    </div>

    <div class="gallery-section">
      <h3>ספרית מדיה</h3>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </div>

  <script>
    const appContainer = document.getElementById('app-container');
    const settingsBtn = document.getElementById('settings-btn');
    const apiKeyContainer = document.getElementById('api-key-container');
    const apiKeyInput = document.getElementById('api-key');
    const previewCard = document.getElementById('preview-card');
    const previewScreen = document.getElementById('preview-screen');
    const samsungPlayIcon = document.getElementById('samsung-play-icon');
    const placeholderText = document.getElementById('placeholder-text');
    const deleteTopBtn = document.getElementById('delete-top-btn');
    const aiLoadingOverlay = document.getElementById('ai-loading-overlay');
    const aiLoadingText = document.getElementById('ai-loading-text');
    
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    
    const filterButtons = document.querySelectorAll('.filter-btn');
    const sizeButtons = document.querySelectorAll('.size-btn');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityValue = document.getElementById('intensity-value');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    
    const btnCreateEdit = document.getElementById('btn-create-edit');
    const btnExtendVideo = document.getElementById('btn-extend-video');
    const createOptionsModal = document.getElementById('create-options-modal');
    const optImageToVideo = document.getElementById('opt-image-to-video');
    const optEditImage = document.getElementById('opt-edit-image');
    
    const editStatusMsg = document.getElementById('edit-status-msg');
    const galleryGrid = document.getElementById('gallery-grid');
    const surpriseBtn = document.getElementById('surprise-btn');
    const aiPrompt = document.getElementById('ai-prompt');

    const camToggleBtn = document.getElementById('cam-toggle-btn');
    const cameraOptionsMenu = document.getElementById('camera-options-menu');

    let currentMedia = null;
    let mediaType = null; // 'image' or 'video'
    let rawFile = null;
    let fileName = 'edited_media';
    let selectedFilter = 'none';
    let filterIntensity = 100;
    let isDraggingProgress = false;
    let videoDurationSeconds = 10;

    camToggleBtn.addEventListener('click', () => {
      cameraOptionsMenu.classList.toggle('active');
    });

    settingsBtn.addEventListener('click', () => {
      apiKeyContainer.classList.toggle('active');
    });

    sizeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        sizeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        previewScreen.style.height = btn.dataset.height;
      });
    });

    const prompts = [
      "אריה רץ בסוואנה בשעת השקיעה",
      "עיר עתידנית בלילה עם אורות ניאון",
      "חללית חוצה גלקסיה צבעונית",
      "נוף מושלג באלפים בשעת זריחה"
    ];

    surpriseBtn.addEventListener('click', () => {
      aiPrompt.value = prompts[Math.floor(Math.random() * prompts.length)];
    });

    // Handle Media Selection
    ['input-video', 'input-image', 'input-camera-photo', 'input-camera-video'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        cameraOptionsMenu.classList.remove('active');
        rawFile = file;
        fileName = file.name;
        const fileUrl = URL.createObjectURL(file);
        clearPreview();

        if (file.type.startsWith('image/')) {
          setMediaImage(fileUrl);
        } else if (file.type.startsWith('video/')) {
          setMediaVideo(fileUrl);
        }
      });
    });

    function setMediaImage(url) {
      clearPreview();
      mediaType = 'image';
      currentMedia = document.createElement('img');
      currentMedia.crossOrigin = "anonymous";
      currentMedia.src = url;
      placeholderText.style.display = 'none';
      previewScreen.appendChild(currentMedia);
      applyFilter();
    }

    function setMediaVideo(url) {
      clearPreview();
      mediaType = 'video';
      currentMedia = document.createElement('video');
      currentMedia.crossOrigin = "anonymous";
      currentMedia.src = url;
      currentMedia.controls = false;
      currentMedia.autoplay = true;
      currentMedia.loop = true;
      currentMedia.playsInline = true;

      currentMedia.addEventListener('timeupdate', updateProgressBar);
      currentMedia.addEventListener('play', () => {
        previewCard.classList.add('is-playing');
        previewScreen.classList.add('playing');
        samsungPlayIcon.textContent = '❚❚';
      });
      currentMedia.addEventListener('pause', () => {
        previewCard.classList.remove('is-playing');
        previewScreen.classList.remove('playing');
        samsungPlayIcon.textContent = '▶';
      });

      placeholderText.style.display = 'none';
      previewScreen.appendChild(currentMedia);
      applyFilter();
    }

    function clearPreview() {
      if (currentMedia) {
        if (mediaType === 'video') {
          currentMedia.pause();
          currentMedia.removeAttribute('src');
          currentMedia.load();
        }
        currentMedia.remove();
        currentMedia = null;
      }
      previewScreen.innerHTML = '';
      previewScreen.appendChild(aiLoadingOverlay);
      previewScreen.appendChild(samsungPlayIcon);
      previewScreen.appendChild(placeholderText);
      placeholderText.style.display = 'block';
      progressFill.style.width = '0%';
      previewCard.classList.remove('is-playing');
      previewScreen.classList.remove('playing');
      samsungPlayIcon.textContent = '▶';
      editStatusMsg.style.display = 'none';
      rawFile = null;
    }

    deleteTopBtn.addEventListener('click', clearPreview);

    previewScreen.addEventListener('click', (e) => {
      if (e.target === deleteTopBtn || e.target.closest('.delete-media-btn')) return;
      if (!currentMedia || mediaType !== 'video') return;
      if (currentMedia.paused) {
        currentMedia.play();
      } else {
        currentMedia.pause();
      }
    });

    document.getElementById('btn-play').onclick = () => currentMedia && currentMedia.play && currentMedia.play();
    document.getElementById('btn-pause').onclick = () => currentMedia && currentMedia.pause && currentMedia.pause();
    document.getElementById('btn-stop').onclick = () => {
      if (currentMedia && currentMedia.pause) {
        currentMedia.pause();
        currentMedia.currentTime = 0;
      }
    };
    document.getElementById('btn-forward').onclick = () => {
      if (currentMedia && mediaType === 'video') currentMedia.currentTime += 5;
    };
    document.getElementById('btn-rewind').onclick = () => {
      if (currentMedia && mediaType === 'video') currentMedia.currentTime -= 5;
    };

    function updateProgressBar() {
      if (!currentMedia || isDraggingProgress || !currentMedia.duration) return;
      const pct = (currentMedia.currentTime / currentMedia.duration) * 100;
      progressFill.style.width = `${pct}%`;
    }

    function seekMedia(e) {
      if (!currentMedia || mediaType !== 'video' || !currentMedia.duration) return;
      const rect = progressContainer.getBoundingClientRect();
      const clickX = e.clientX || (e.touches && e.touches[0].clientX);
      
      let posX = rect.right - clickX;
      posX = Math.max(0, Math.min(posX, rect.width));
      const percentage = posX / rect.width;
      
      currentMedia.currentTime = percentage * currentMedia.duration;
      progressFill.style.width = `${percentage * 100}%`;
    }

    progressContainer.addEventListener('mousedown', (e) => { isDraggingProgress = true; seekMedia(e); });
    window.addEventListener('mousemove', (e) => { if (isDraggingProgress) seekMedia(e); });
    window.addEventListener('mouseup', () => { isDraggingProgress = false; });

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    intensitySlider.addEventListener('input', (e) => {
      filterIntensity = e.target.value;
      intensityValue.textContent = `${filterIntensity}%`;
      applyFilter();
    });

    function getCSSFilterString() {
      if (selectedFilter === 'none') return 'none';
      const f = filterIntensity / 100;

      switch (selectedFilter) {
        case 'glow': 
          return `brightness(${1 + 0.3 * f}) drop-shadow(0 0 ${12 * f}px rgba(255,255,255,0.8)) saturate(${1 + 0.2 * f})`;
        case 'blinding-glow': 
          return `brightness(${1 + 1.2 * f}) contrast(${1 + 0.8 * f}) drop-shadow(0 0 ${25 * f}px #ffffff)`;
        case 'night-vision': 
          return `hue-rotate(${90 * f}deg) saturate(${1 + 3 * f}) brightness(${1 + 0.4 * f}) contrast(${1 + 0.5 * f})`;
        case 'xray': 
          return `invert(${f}) grayscale(${f}) contrast(${1 + 2 * f}) brightness(${1 - 0.1 * f})`;
        case 'xray-electric': 
          return `invert(${f}) hue-rotate(${190 * f}deg) saturate(${1 + 4 * f}) contrast(${1 + 2.5 * f})`;
        case 'golden-hour': 
          return `sepia(${0.5 * f}) saturate(${1 + 0.8 * f}) brightness(${1 + 0.1 * f})`;
        case 'bw-dramatic': 
          return `grayscale(${f}) contrast(${1 + 1.5 * f})`;
        case 'cyberpunk': 
          return `hue-rotate(${180 * f}deg) saturate(${1 + 2 * f})`;
        case 'emerald-night': 
          return `hue-rotate(${100 * f}deg) saturate(${1 + 1.2 * f}) brightness(${1 - 0.2 * f})`;
        case 'vintage': 
          return `sepia(${0.6 * f}) contrast(${1 - 0.1 * f})`;
        case 'blur': 
          return `blur(${4 * f}px)`;
        case 'high-contrast': 
          return `contrast(${1 + f})`;
        default: 
          return 'none';
      }
    }

    function applyFilter() {
      if (currentMedia) {
        currentMedia.style.filter = getCSSFilterString();
      }
    }

    /* AI Creation Flow */
    btnCreateEdit.addEventListener('click', () => {
      if (mediaType === 'image') {
        createOptionsModal.classList.toggle('active');
      } else {
        createOptionsModal.classList.remove('active');
        runAIGeneration(mediaType === 'video' ? 'video-edit' : 'text-to-video');
      }
    });

    optImageToVideo.addEventListener('click', () => {
      createOptionsModal.classList.remove('active');
      runAIGeneration('image-to-video');
    });

    optEditImage.addEventListener('click', () => {
      createOptionsModal.classList.remove('active');
      runAIGeneration('image-edit');
    });

    btnExtendVideo.addEventListener('click', async () => {
      if (!currentMedia || mediaType !== 'video') {
        alert('אנא בחר או צור סרטון תחילה כדי להאריך אותו.');
        return;
      }

      videoDurationSeconds += 10;
      runAIGeneration('extend-video');
    });

    async function runAIGeneration(mode) {
      const userApiKey = apiKeyInput.value.trim();
      const promptText = aiPrompt.value.trim();

      if (mediaType === 'video' && currentMedia && typeof currentMedia.pause === 'function') {
        currentMedia.pause();
      }

      appContainer.classList.add('app-blur-effect');
      aiLoadingOverlay.classList.add('active');

      if (mode === 'extend-video') {
        aiLoadingText.textContent = `מאריך וידאו ל-${videoDurationSeconds} שניות...`;
      } else if (mode === 'image-to-video') {
        aiLoadingText.textContent = `יוצר וידאו ב-AI מהתמונה (10 שניות)...`;
      } else if (mode === 'image-edit') {
        aiLoadingText.textContent = `מעבד עריכת תמונה ב-AI...`;
      } else if (mode === 'video-edit') {
        aiLoadingText.textContent = `מעבד עריכת וידאו ב-AI לפי הטקסט...`;
      } else {
        aiLoadingText.textContent = `מייצר וידאו ב-AI מתיאור הטקסט (10 שניות)...`;
      }

      await new Promise(r => setTimeout(r, 1800));

      if (mode === 'image-edit') {
        const canvas = document.createElement('canvas');
        canvas.width = 800; canvas.height = 600;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1e1b4b';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = '24px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(promptText || "עריכת תמונה ב-AI הושלמה", canvas.width/2, canvas.height/2);
        
        canvas.toBlob((blob) => {
          rawFile = new File([blob], `ai_edited_${Date.now()}.png`, { type: 'image/png' });
          setMediaImage(URL.createObjectURL(blob));
        }, 'image/png');
      } else {
        const canvas = document.createElement('canvas');
        canvas.width = 640; canvas.height = 360;
        const ctx = canvas.getContext('2d');
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        
        const videoDonePromise = new Promise(resolve => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            resolve(blob);
          };
        });

        recorder.start();
        let frame = 0;
        const maxFrames = 30 * Math.min(videoDurationSeconds, 30);

        function drawAnimatedFrame() {
          ctx.fillStyle = '#09090b';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          ctx.beginPath();
          ctx.strokeStyle = '#3b82f6';
          ctx.lineWidth = 4;
          for (let x = 0; x < canvas.width; x += 10) {
            let y = canvas.height/2 + Math.sin((x + frame * 5) * 0.02) * 40;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();

          ctx.fillStyle = '#ffffff';
          ctx.font = '20px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(`AI Video (${videoDurationSeconds}s): ${promptText || 'מעובד ב-AI'}`, canvas.width/2, 60);

          frame++;
          if (frame < maxFrames) {
            requestAnimationFrame(drawAnimatedFrame);
          } else {
            recorder.stop();
          }
        }

        drawAnimatedFrame();
        const generatedBlob = await videoDonePromise;
        rawFile = new File([generatedBlob], `ai_video_${Date.now()}.webm`, { type: 'video/webm' });
        setMediaVideo(URL.createObjectURL(generatedBlob));
      }

      appContainer.classList.remove('app-blur-effect');
      aiLoadingOverlay.classList.remove('active');

      editStatusMsg.style.display = 'block';
      editStatusMsg.textContent = userApiKey 
        ? `סונכרן מפתח API. המדיה התעדכנה בהצלחה למסך! ✅`
        : `העריכה הושלמה והוחזרה למסך! ✅`;
    }

    /* Fixed Direct Download & Share System */
    async function getExportableFile() {
      if (!currentMedia) return null;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      if (mediaType === 'image') {
        canvas.width = currentMedia.naturalWidth || currentMedia.width || 800;
        canvas.height = currentMedia.naturalHeight || currentMedia.height || 600;

        ctx.filter = getCSSFilterString();
        ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);

        return new Promise(resolve => {
          canvas.toBlob(blob => {
            if (!blob) return resolve(null);
            const file = new File([blob], `image_${Date.now()}.png`, { type: 'image/png' });
            resolve({ blob, file, type: 'image', ext: 'png' });
          }, 'image/png');
        });
      } else if (mediaType === 'video') {
        if (rawFile && selectedFilter === 'none') {
          return { blob: rawFile, file: rawFile, type: 'video', ext: rawFile.name.split('.').pop() || 'webm' };
        }

        canvas.width = currentMedia.videoWidth || 640;
        canvas.height = currentMedia.videoHeight || 360;

        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);

        return new Promise(resolve => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const file = new File([blob], `video_${Date.now()}.webm`, { type: 'video/webm' });
            resolve({ blob, file, type: 'video', ext: 'webm' });
          };

          currentMedia.currentTime = 0;
          currentMedia.play();
          recorder.start();

          const renderFrame = () => {
            if (currentMedia.ended || currentMedia.paused) {
              recorder.stop();
              return;
            }
            ctx.filter = getCSSFilterString();
            ctx.drawImage(currentMedia, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderFrame);
          };
          renderFrame();
        });
      }
    }

    function triggerDeviceDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 100);
    }

    function addToGallery(exportData) {
      const url = URL.createObjectURL(exportData.blob);
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const mediaEl = exportData.type === 'image' ? document.createElement('img') : document.createElement('video');
      mediaEl.src = url;
      if (exportData.type === 'video') mediaEl.controls = true;

      const actions = document.createElement('div');
      actions.className = 'gallery-actions';

      const downloadBtnSmall = document.createElement('button');
      downloadBtnSmall.className = 'btn-action btn-action-download';
      downloadBtnSmall.textContent = 'הורד';
      downloadBtnSmall.onclick = () => triggerDeviceDownload(exportData.blob, `samsung_studio_${Date.now()}.${exportData.ext}`);

      const deleteBtnSmall = document.createElement('button');
      deleteBtnSmall.className = 'btn-action btn-action-delete';
      deleteBtnSmall.textContent = 'מחק';
      deleteBtnSmall.onclick = () => item.remove();

      actions.appendChild(downloadBtnSmall);
      actions.appendChild(deleteBtnSmall);
      item.appendChild(mediaEl);
      item.appendChild(actions);
      galleryGrid.prepend(item);
    }

    downloadBtn.addEventListener('click', async () => {
      if (!currentMedia) {
        alert('אין מדיה להורדה.');
        return;
      }
      downloadBtn.textContent = 'מעבד הורדה...';
      
      try {
        const exportData = await getExportableFile();
        if (exportData) {
          triggerDeviceDownload(exportData.blob, `samsung_studio_${Date.now()}.${exportData.ext}`);
          addToGallery(exportData);
        }
      } catch (err) {
        console.error(err);
        alert('אירעה שגיאה בזמן יצירת הקובץ להורדה.');
      } finally {
        downloadBtn.textContent = '⬇ הורדה';
      }
    });

    shareBtn.addEventListener('click', async () => {
      if (!currentMedia) {
        alert('אין מדיה לשיתוף.');
        return;
      }
      shareBtn.textContent = 'מעבד שיתוף...';

      try {
        const exportData = await getExportableFile();
        if (exportData && exportData.file) {
          if (navigator.canShare && navigator.canShare({ files: [exportData.file] })) {
            await navigator.share({
              title: 'Samsung Studio AI',
              text: 'שתף מתוך Samsung Studio AI',
              files: [exportData.file]
            });
          } else {
            triggerDeviceDownload(exportData.blob, exportData.file.name);
          }
        }
      } catch (err) {
        console.error(err);
        alert('שיתוף קבצים אינו נתמך בדפדפן זה, הקובץ יורד במקום.');
      } finally {
        shareBtn.textContent = '🔗 שיתוף';
      }
    });
  </script>
</body>
</html>
