<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0A0A0B; --card: #1A1A1D; --accent: #7C3AED; }
        body { background-color: var(--bg); color: white; font-family: system-ui, sans-serif; margin: 0; overflow: hidden; }
        
        /* נגן קבוע למעלה - 40% גובה */
        .player-fixed { 
            height: 40vh; width: 100%; background: #000; 
            position: fixed; top: 0; left: 0; z-index: 50;
            border-bottom: 1px solid #2D2D30; 
        }
        
        /* אזור פקדים נגלל מתחת לנגן */
        .scrollable-content { 
            margin-top: 40vh; height: 60vh; 
            overflow-y: auto; padding: 20px; padding-bottom: 150px; 
        }

        .progress-circle-text { font-size: 4rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px rgba(124,58,237,0.6); }
        .tool-btn { background: var(--card); border: 1px solid #2D2D30; border-radius: 18px; transition: all 0.2s; }
        .tool-btn:active { transform: scale(0.95); background: #2D2D30; }
        .purple-gradient { background: linear-gradient(135deg, #7C3AED 0%, #4C1D95 100%); }
        
        /* התאמה לטאבלט ומחשב */
        @media (min-width: 1024px) {
            .player-fixed { width: 50%; height: 100vh; left: auto; right: 0; border-l: 1px solid #2D2D30; }
            .scrollable-content { margin-top: 0; width: 50%; height: 100vh; margin-right: 50%; }
        }
    </style>
</head>
<body>

    <!-- אזור 1: נגן וידאו/תמונה 4K -->
    <div class="player-fixed flex flex-col items-center justify-center relative">
        <div id="placeholder" class="flex flex-col items-center opacity-20">
            <i data-lucide="aperture" class="w-16 h-16 mb-2"></i>
            <span class="text-xs tracking-[0.4em]">4K RENDERING ENGINE</span>
        </div>
        
        <img id="mainImage" class="hidden w-full h-full object-contain">
        <video id="mainVideo" class="hidden w-full h-full object-contain" controls playsinline loop></video>

        <!-- מנדול אחוזים מרכזי - תיקון בעיית הנתקע -->
        <div id="loader" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-[60]">
            <div id="percentText" class="progress-circle-text tracking-tighter">0%</div>
            <div class="mt-4 text-xs text-zinc-500 font-bold uppercase tracking-widest">Cloud Rendering</div>
        </div>

        <!-- פקדים צפים בנגן -->
        <div class="absolute bottom-4 left-4 flex gap-2">
            <button class="bg-black/50 p-2 rounded-full border border-white/10" onclick="undo()"><i data-lucide="undo-2" class="w-4 h-4"></i></button>
            <button class="bg-black/50 p-2 rounded-full border border-white/10" onclick="redo()"><i data-lucide="redo-2" class="w-4 h-4"></i></button>
        </div>
    </div>

    <!-- אזור פקדים נגלל -->
    <div class="scrollable-content space-y-6" dir="rtl">
        
        <!-- אזור 2: פס תחבורה -->
        <div class="flex justify-around items-center py-4 border-b border-zinc-800">
            <button class="active:scale-90" onclick="seek(-2)"><i data-lucide="rewind" class="w-6 h-6"></i></button>
            <button class="active:scale-90" onclick="togglePlay()"><i data-lucide="play" id="playIcon" class="w-10 h-10 fill-current text-[#7C3AED]"></i></button>
            <button class="active:scale-90" onclick="seek(2)"><i data-lucide="fast-forward" class="w-6 h-6"></i></button>
        </div>

        <!-- אזור 3: יצירה -->
        <div class="tool-btn p-5 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4 text-purple-500"></i> יצירה ועריכה</h3>
                <button onclick="randomPrompt()" class="text-[10px] bg-zinc-800 px-3 py-1 rounded-full border border-zinc-700">הפתע אותי 🎲</button>
            </div>
            <textarea id="promptInp" placeholder="תאר את הוידאו או התמונה שלך (באנגלית)..." 
                class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-sm h-28 mb-4 outline-none focus:border-[#7C3AED] text-right"></textarea>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="generateAI('image')" class="purple-gradient py-4 rounded-2xl font-bold active:scale-95 transition-transform flex items-center justify-center gap-2 shadow-lg shadow-purple-900/40">
                    <i data-lucide="wand-2" class="w-5 h-5"></i> צור תמונה
                </button>
                <button onclick="generateAI('video')" class="bg-zinc-800 py-4 rounded-2xl font-bold active:scale-95 border border-zinc-700 flex items-center justify-center gap-2">
                    <i data-lucide="video" class="w-5 h-5"></i> צור וידאו
                </button>
            </div>
            
            <div class="flex gap-2 mt-3">
                <button onclick="alert('Extend +10s')" class="flex-1 bg-zinc-900 py-2 rounded-xl text-[10px] border border-zinc-800">הארכה +10ש'</button>
                <button onclick="alert('Persistence Engine Enabled')" class="flex-1 bg-zinc-900 py-2 rounded-xl text-[10px] border border-zinc-800">מנוע עקיבה דמות</button>
            </div>
        </div>

        <!-- אזור 4: העלאה נפרדת (תמונות | סרטון | מצלמה) -->
        <div class="grid grid-cols-3 gap-2">
            <label class="tool-btn p-4 flex flex-col items-center gap-2 cursor-pointer">
                <i data-lucide="image" class="text-blue-400"></i>
                <span class="text-[10px] font-bold">תמונות</span>
                <input type="file" class="hidden" accept="image/*" onchange="handleUpload(event, 'img')">
            </label>
            <label class="tool-btn p-4 flex flex-col items-center gap-2 cursor-pointer">
                <i data-lucide="clapperboard" class="text-red-400"></i>
                <span class="text-[10px] font-bold">סרטון</span>
                <input type="file" class="hidden" accept="video/*" onchange="handleUpload(event, 'vid')">
            </label>
            <label class="tool-btn p-4 flex flex-col items-center gap-2 cursor-pointer">
                <i data-lucide="camera" class="text-green-400"></i>
                <span class="text-[10px] font-bold">מצלמה</span>
                <input type="file" class="hidden" accept="image/*,video/*" capture="environment" onchange="handleUpload(event, 'cam')">
            </label>
        </div>

        <!-- אזור 5: עריכה מתקדמת -->
        <div class="space-y-3">
            <button onclick="toggleSheet('filters')" class="w-full tool-btn p-4 flex justify-between items-center">
                <span class="text-sm font-bold flex items-center gap-3"><i data-lucide="palette" class="w-5 h-5 text-purple-400"></i> פילטרים וצבעים</span>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-30"></i>
            </button>
            <button onclick="toggleSheet('effects')" class="w-full tool-btn p-4 flex justify-between items-center">
                <span class="text-sm font-bold flex items-center gap-3"><i data-lucide="zap" class="w-5 h-5 text-purple-400"></i> עורך אפקטים (אש, גשם, מים)</span>
                <i data-lucide="chevron-left" class="w-4 h-4 opacity-30"></i>
            </button>
            <button onclick="alert('שיבוט קולי: הקלט 5 שניות עכשיו...')" class="w-full tool-btn p-4 flex justify-between items-center">
                <span class="text-sm font-bold flex items-center gap-3"><i data-lucide="mic" class="w-5 h-5 text-purple-400"></i> שיבוט קולי (Voice Clone)</span>
                <i data-lucide="plus" class="w-4 h-4 opacity-30"></i>
            </button>
            <button onclick="alert('סנכרון שפתיים: בחר קובץ שמע לדיבור')" class="w-full tool-btn p-4 flex justify-between items-center">
                <span class="text-sm font-bold flex items-center gap-3"><i data-lucide="languages" class="w-5 h-5 text-purple-400"></i> סנכרון שפתיים (Lip-Sync)</span>
                <i data-lucide="plus" class="w-4 h-4 opacity-30"></i>
            </button>
        </div>

        <!-- אזור 7: ספרייה אישית -->
        <section>
            <h3 class="font-bold text-xs mb-4 opacity-50 tracking-widest uppercase">My Gallery</h3>
            <
