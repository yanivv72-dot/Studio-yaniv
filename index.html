<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yaniv AI Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0A0A0B; color: white; font-family: system-ui, sans-serif; margin: 0; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* נגן קבוע - 30% מהמסך */
        .player-container { height: 30vh; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1A1A1D; flex-shrink: 0; }
        
        /* פס תחבורה קבוע - מתחת לנגן */
        .transport-bar { height: 60px; background: #1A1A1D; display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid #2D2D30; flex-shrink: 0; }
        
        /* אזור פקדים נגלל - ללא הסתרות */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 50px; }

        .progress-text { font-size: 5rem; font-weight: 900; color: #7C3AED; text-shadow: 0 0 20px rgba(124,58,237,0.5); }
        .time-bar { height: 4px; background: rgba(255,255,255,0.1); width: 100%; position: absolute; bottom: 0; }
        .time-fill { height: 100%; background: #7C3AED; width: 0%; }
        
        .tool-card { background: #161618; border: 1px solid #242427; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .active-click:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body>

    <!-- אזור 1: נגן וידאו (30%) -->
    <div class="player-container flex flex-col items-center justify-center relative">
        <img id="mainImage" class="hidden w-full h-full object-contain">
        <video id="mainVideo" class="hidden w-full h-full object-contain" playsinline loop></video>
        
        <div id="placeholder" class="opacity-30 flex flex-col items-center">
            <i data-lucide="monitor-play" class="w-12 h-12 mb-1 text-[#7C3AED]"></i>
            <span class="text-[10px] tracking-widest font-bold">READY TO GENERATE</span>
        </div>

        <!-- פקדים פנימיים בנגן -->
        <div class="absolute inset-0 flex items-center justify-center gap-6 bg-black/10 opacity-0 active:opacity-100 transition-opacity">
            <button onclick="togglePlay()"><i data-lucide="play" class="w-10 h-10 fill-white"></i></button>
        </div>

        <!-- סרגל זמן וטעינה -->
        <div id="loader" class="hidden absolute inset-0 bg-black flex items-center justify-center z-[110]">
            <div id="percentText" class="progress-text">0%</div>
        </div>
        <div class="time-bar"><div id="timeFill" class="time-fill"></div></div>
    </div>

    <!-- אזור 2: פס תחבורה (קבוע) -->
    <div class="transport-bar">
        <button onclick="seek(0)" class="flex flex-col items-center active-click"><i data-lucide="skip-back" class="w-5 h-5"></i><span class="text-[8px] mt-1 text-zinc-500 font-bold">התחל</span></button>
        <button onclick="seek(-2)" class="flex flex-col items-center active-click"><i data-lucide="rewind" class="w-5 h-5"></i><span class="text-[8px] mt-1 text-zinc-500 font-bold">-2ש'</span></button>
        <button onclick="togglePlay()" class="flex flex-col items-center active-click text-[#7C3AED]"><i data-lucide="pause" class="w-6 h-6"></i><span class="text-[8px] mt-1 font-bold">השהה</span></button>
        <button onclick="seek(2)" class="flex flex-col items-center active-click"><i data-lucide="fast-forward" class="w-5 h-5"></i><span class="text-[8px] mt-1 text-zinc-500 font-bold">+2ש'</span></button>
        <button onclick="stopMedia()" class="flex flex-col items-center active-click text-red-500"><i data-lucide="square" class="w-5 h-5"></i><span class="text-[8px] mt-1 font-bold uppercase">עצור</span></button>
    </div>

    <!-- אזור 3: ממשק נגלר (ללא הסתרות) -->
    <div class="main-content">
        
        <!-- אזור יצירה -->
        <div class="tool-card shadow-lg">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-xs font-bold flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4 text-purple-500"></i> יצירת AI</h3>
                <button onclick="randomPrompt()" class="text-[9px] bg-zinc-800 px-3 py-1 rounded-full text-zinc-400">הפתע אותי 🎲</button>
            </div>
            <textarea id="prompt" placeholder="תאר מה ה-AI יצור עבורך..." 
                class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm h-20 mb-3 outline-none focus:border-[#7C3AED] text-right"></textarea>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="generateAI()" class="col-span-3 bg-[#7C3AED] py-4 rounded-xl font-bold active-click text-white">צור יצירה</button>
                <button onclick="alert('Extend Mode')" class="bg-zinc-900 rounded-xl text-[10px] text-zinc-500 border border-zinc-800">הארכה</button>
            </div>
        </div>

        <!-- העלאה (תמונות | סרטון | מצלמה) -->
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="triggerFile('img')" class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex flex-col items-center gap-2 active-click">
                <i data-lucide="image" class="text-blue-400"></i>
                <span class="text-[9px] font-bold">תמונות</span>
            </button>
            <button onclick="triggerFile('vid')" class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex flex-col items-center gap-2 active-click">
                <i data-lucide="film" class="text-red-400"></i>
                <span class="text-[9px] font-bold">סרטון</span>
            </button>
            <button onclick="triggerFile('any')" class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex flex-col items-center gap-2 active-click">
                <i data-lucide="camera" class="text-green-400"></i>
                <span class="text-[9px] font-bold">מצלמה</span>
            </button>
        </div>

        <!-- פילטרים ואפקטים -->
        <div class="space-y-2 mb-6">
            <button class="w-full bg-[#161618] p-4 rounded-xl border border-zinc-800 flex justify-between items-center opacity-60">
                <span class="text-xs font-bold">🎨 פילטרים (שחור-לבן, מסך ירוק...)</span>
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
            </button>
            <button class="w-full bg-[#161618] p-4 rounded-xl border border-zinc-800 flex justify-between items-center opacity-60">
                <span class="text-xs font-bold">🎙️ שיבוט קולי וסנכרון שפתיים</span>
                <i data-lucide="mic" class="w-4 h-4 text-purple-500"></i>
            </button>
        </div>

        <!-- כפתורי שמירה וייצוא (בסוף הגלילה) -->
        <div class="grid grid-cols-5 gap-2">
            <button onclick="saveResult()" class="col-span-4 bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active-click">
                <i data-lucide="download" class="w-5 h-5"></i> שמור לגלריה
            </button>
            <button onclick="location.reload()" class="bg-zinc-900 rounded-2xl flex items-center justify-center active-click">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- קלט מוסתר לקבצים -->
        <input type="file" id="fileInput" class="hidden" onchange="processFile(event)">
    </div>

    <script>
        lucide.createIcons();
        const mainImg = document.getElementById('mainImage');
        const mainVid = document.getElementById('mainVideo');
        const loader = document.getElementById('loader');
        const percentText = document.getElementById('percentText');

        function triggerFile(type) {
            const input = document.getElementById('fileInput');
            if (type === 'img') input.accept = "image/*";
            else if (type === 'vid') input.accept = "video/*";
            else input.accept = "image/*,video/*";
            input.click();
        }

        function processFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            document.getElementById('placeholder').classList.add('hidden');
            if (file.type.startsWith('image/')) {
                mainImg.src = url; mainImg.classList.remove('hidden'); mainVid.classList.add('hidden');
            } else {
                mainVid.src = url; mainVid.classList.remove('hidden'); mainImg.classList.add('hidden');
            }
        }

        async function generateAI() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) return alert("רשום תיאור");

            loader.classList.remove('hidden');
            let p = 0;
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 15) + 1;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    percentText.innerText = "100%";
                    
                    const seed = Math.floor(Math.random() * 999999);
                    // שימוש במנוע Flux החדש ביותר
                    const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=1920&seed=${seed}&model=flux&nologo=true`;
                    
                    const testImg = new Image();
                    testImg.src = url;
                    testImg.onload = () => {
                        mainImg.src = url;
                        mainImg.classList.remove('hidden');
                        mainVid.classList.add('hidden');
                        document.getElementById('placeholder').classList.add('hidden');
                        loader.classList.add('hidden');
                        percentText.innerText = "0%";
                    };
                } else {
                    percentText.innerText = p + "%";
                }
            }, 300);
        }

        function togglePlay() { if(!mainVid.classList.contains('hidden')) mainVid.paused ? mainVid.play() : mainVid.pause(); }
        function stopMedia() { mainVid.pause(); mainVid.currentTime = 0; }
        function seek(s) { if(s === 0) mainVid.currentTime = 0; else mainVid.currentTime += s; }
        function saveResult() { if(mainImg.src) window.open(mainImg.src, '_blank'); }
        function randomPrompt() { document.getElementById
